function parseDateNaturelle(texte){
  const t=(texte||'').toLowerCase().trim();
  const today=new Date(); today.setHours(0,0,0,0);
  if(t.includes('après-demain')||t.includes('apres-demain')){ const d=new Date(today); d.setDate(d.getDate()+2); return d; }
  if(t.includes('demain')){ const d=new Date(today); d.setDate(d.getDate()+1); return d; }
  if(t.includes("aujourd'hui")||t.includes('aujourdhui')) return today;
  const jours=['dimanche','lundi','mardi','mercredi','jeudi','vendredi','samedi'];
  for(let i=0;i<jours.length;i++){
    if(t.includes(jours[i])){
      const d=new Date(today);
      let diff=(i-d.getDay()+7)%7;
      if(diff===0) diff=7;
      d.setDate(d.getDate()+diff);
      return d;
    }
  }
  const mDate=t.match(/(\d{1,2})[\/\-](\d{1,2})(?:[\/\-](\d{2,4}))?/);
  if(mDate){
    const j=parseInt(mDate[1]),mo=parseInt(mDate[2])-1;
    const an=mDate[3]?(mDate[3].length===2?2000+parseInt(mDate[3]):parseInt(mDate[3])):today.getFullYear();
    return new Date(an,mo,j);
  }
  const nombresMots={'un':1,'une':1,'deux':2,'trois':3,'quatre':4,'cinq':5,'six':6,'sept':7,'huit':8,'neuf':9,'dix':10};
  const mDelai=t.match(/dans\s+(\d+|un|une|deux|trois|quatre|cinq|six|sept|huit|neuf|dix)\s*(jour|semaine|mois)/);
  if(mDelai){
    const n=isNaN(parseInt(mDelai[1]))?(nombresMots[mDelai[1]]||1):parseInt(mDelai[1]);
    const d=new Date(today);
    if(mDelai[2].startsWith('jour')) d.setDate(d.getDate()+n);
    else if(mDelai[2].startsWith('semaine')) d.setDate(d.getDate()+n*7);
    else d.setMonth(d.getMonth()+n);
    return d;
  }
  return null;
}

function parseHeureNaturelle(texte){
  const m=(texte||'').match(/(\d{1,2})\s*[h:]\s*(\d{2})?/i);
  if(!m) return null;
  const h=String(parseInt(m[1])).padStart(2,'0');
  const min=m[2]||'00';
  return `${h}:${min}`;
}

async function creerContactDepuisTexte(query){
  if(!S.clients.length){ alert('Aucun client enregistré — créez d\'abord une fiche client.'); return; }
  if(!getApiKey()){ alert('Configurez d\'abord votre clé API Anthropic dans Paramètres pour utiliser cette commande.'); return; }

  // L'email est extrait par regex — fiable à 100%, jamais par l'IA
  const emailMatch=query.match(/[\w.+-]+@[\w-]+\.[\w.-]+/);
  const emailDetecte=emailMatch?emailMatch[0]:'';

  showModal(`<h3>👤 Nouveau contact</h3>
    <div style="text-align:center;padding:40px 0;color:var(--text2)">
      <i class="ti ti-loader-2" style="font-size:28px;display:block;margin-bottom:10px;animation:spin 1s linear infinite"></i>
      Analyse de la phrase…
    </div>`);

  const clientsListe=S.clients.map(c=>`${c.id}:${c.nom}`).join(', ');
  const prompt=`Extrait les informations d'un nouveau contact à créer, à partir d'une phrase dictée par un chasseur de têtes.

PHRASE : "${query}"

CLIENTS EXISTANTS (choisis l'ID EXACT parmi cette liste, ou null si aucun ne correspond clairement — n'invente jamais un ID) :
${clientsListe}

Réponds UNIQUEMENT en JSON sans markdown :
{
  "clientId": "ID exact du client choisi dans la liste ci-dessus, ou null",
  "prenom": "prénom du contact",
  "nom": "nom de famille du contact",
  "fonction": "fonction/poste du contact (ex: DRH, Directeur Commercial...), vide si non mentionné"
}`;

  let rawTextDebug='';
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':getApiKey(),'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:500,messages:[{role:'user',content:prompt}]})
    });
    const data=await res.json();
    if(data.error) throw new Error(data.error.message||'Erreur API Anthropic');
    if(!data.content||!data.content[0]) throw new Error('Réponse API vide ou inattendue');
    const text=data.content[0].text;
    rawTextDebug=text;
    let json;
    try{ json=JSON.parse(text.replace(/```json|```/g,'').trim()); }
    catch(e){ const mm=text.match(/\{[\s\S]*\}/); if(mm) json=JSON.parse(mm[0]); else throw new Error('Réponse IA invalide'); }

    // Sécurité : le clientId doit être un vrai client existant, sinon on le laisse vide (jamais d'invention)
    if(json.clientId && !S.clients.find(c=>c.id===json.clientId)) json.clientId=null;

    afficherConfirmationContact(json,emailDetecte);
  }catch(e){
    showModal(`<h3>👤 Nouveau contact</h3>
      <div class="empty" style="padding:24px 0">Erreur lors de l'analyse : ${esc(e.message)}</div>
      ${rawTextDebug?`<details style="margin:0 0 16px;font-size:11px;color:var(--text3)"><summary style="cursor:pointer">Voir la réponse brute de l'IA (debug)</summary><pre style="white-space:pre-wrap;background:var(--bg2);padding:10px;border-radius:8px;margin-top:6px">${esc(rawTextDebug)}</pre></details>`:''}
      <div class="modal-footer"><button class="btn" onclick="closeModal()">Fermer</button></div>`);
  }
}

let pendingStatutChange=null;
function commandeMarquerStatut(nomTexte,statutTexte,clientTexte){
  const candidats=trouverCandidatsParNom(nomTexte);
  if(!candidats.length){ alert(`Candidat "${nomTexte}" introuvable.`); return; }
  if(candidats.length>1){

    showModal(`<h3>Quel candidat ?</h3><div style="margin-bottom:10px;color:var(--text2);font-size:13px">Plusieurs candidats correspondent :</div>${opts}<div class="modal-footer"><button class="btn" onclick="closeModal()">Annuler</button></div>`);
    return;
  }
  commandeMarquerStatutPourCandidat(candidats[0].id,statutTexte,clientTexte);
}

function commandeMarquerStatutPourCandidat(candidatId,statutTexte,clientTexte){
  const c=S.candidats.find(x=>x.id===candidatId);
  if(!c) return;
  const st=statutTexte.toLowerCase();
  let nouveauStatut='Actif',nouvelleEtape=null;
  if(st.startsWith('placé')||st.startsWith('placée')){ nouveauStatut='Placé'; nouvelleEtape='Retenu'; }
  else if(st.startsWith('retenu')){ nouveauStatut='En process'; nouvelleEtape='Retenu'; }
  else if(st.startsWith('refusé')||st.startsWith('refusée')){ nouveauStatut='Refus client'; nouvelleEtape='Refusé'; }
  else if(st.startsWith('en process')){ nouveauStatut='En process'; }
  else if(st.startsWith('inactif')||st.startsWith('en veille')){ nouveauStatut='En veille'; }

  let pipelines=S.pipeline.filter(p=>p.candidatId===c.id&&!['Refusé','Abandonné'].includes(p.etape));
  if(clientTexte&&clientTexte.trim()){
    const clientsMatch=trouverClientsParNom(clientTexte);
    if(clientsMatch.length){
      const clientIds=new Set(clientsMatch.map(cl=>cl.id));
      const filtre=pipelines.filter(p=>{const m=S.missions.find(x=>x.id===p.missionId);return m&&clientIds.has(m.clientId);});
      if(filtre.length) pipelines=filtre;
    }
  }

  pendingStatutChange={candidatId:c.id,nouveauStatut,nouvelleEtape,pipelineIds:pipelines.map(p=>p.id)};
  const pipelineHtml=pipelines.length?pipelines.map(p=>{const m=getMission(p.missionId);const cl=getClient(m.clientId);return `<div style="font-size:12px;padding:4px 0;color:var(--text2)">${esc(m.poste)} · ${esc(cl.nom)} — étape actuelle : ${p.etape}</div>`;}).join(''):'<div style="font-size:12px;color:var(--text3)">Aucune mission active liée trouvée pour ce candidat.</div>';
  showModal(`<h3>Confirmer le changement</h3>
    <div style="font-size:13px;margin-bottom:10px"><strong>${esc(c.prenom)} ${esc(c.nom)}</strong> → statut <span class="badge ${STATUT_CD[nouveauStatut]||'b-gray'}">${nouveauStatut}</span></div>
    ${nouvelleEtape?`<div style="font-size:12px;color:var(--text2);margin-bottom:6px">Mission(s) concernée(s) → étape "${nouvelleEtape}" :</div>${pipelineHtml}`:''}
    <div class="modal-footer">
      <button class="btn" onclick="pendingStatutChange=null;closeModal()">Annuler</button>
      <button class="btn primary" onclick="confirmerChangementStatut()">✓ Confirmer</button>
    </div>`);
}

function confirmerChangementStatut(){
  if(!pendingStatutChange) return;
  const {candidatId,nouveauStatut,nouvelleEtape,pipelineIds}=pendingStatutChange;
  const c=S.candidats.find(x=>x.id===candidatId);
  if(c) c.statut=nouveauStatut;
  let missionAGagner=null;
  pipelineIds.forEach(pid=>{
    const p=S.pipeline.find(x=>x.id===pid);
    if(p&&nouvelleEtape){ p.etape=nouvelleEtape; missionAGagner=p.missionId; }
  });
  saveData();
  closeModal();
  showToast(c?`${c.prenom} ${c.nom} → ${nouveauStatut}`:'Statut mis à jour');
  pendingStatutChange=null;
  render();
  if(nouvelleEtape==='Retenu'&&missionAGagner){
    const m=S.missions.find(x=>x.id===missionAGagner);
    if(m&&m.statut==='En cours'){
      setTimeout(()=>{
        if(confirm(`Passer la mission "${m.poste}" en statut "Gagnée" ?`)){
          m.statut='Gagnée'; m.dateCloture=new Date().toISOString().slice(0,10); saveData(); render();
        }
      },300);
    }
  }
}

// ── 2. Planifier un RDV par langage naturel ──────────────────────────────
let pendingRdvNaturel=null;
function commandeCreerRdvNaturel(nomTexte,resteTexte){
  const dateParsee=parseDateNaturelle(resteTexte);
  const heureParsee=parseHeureNaturelle(resteTexte);
  if(!dateParsee){ alert(`Je n'ai pas compris la date dans "${resteTexte}". Précisez (ex: "mardi", "demain", "15/07").`); return; }

  // 1. Essayer d'abord un candidat direct (comportement existant)
  const candidats=trouverCandidatsParNom(nomTexte);
  if(candidats.length===1){
    afficherConfirmationRdv({candidatId:candidats[0].id,titre:`Entretien ${candidats[0].prenom} ${candidats[0].nom}`},dateParsee,heureParsee,nomTexte);
    return;
  }

  // 2. Sinon, chercher un contact client : "le CFO du client X" / "le DRH de X" / "Nathalie Dupont chez X"
  const roleClientMatch=nomTexte.match(/(?:du\s+client\s+|de\s+|d['’]|chez\s+)(.+)$/i);
  if(roleClientMatch){
    const clientTexte=roleClientMatch[1].trim();
    const roleOuNomTexte=nomTexte.slice(0,roleClientMatch.index).replace(/^(le|la|l['’])\s+/i,'').trim();
    const clients=trouverClientsParNom(clientTexte);
    if(clients.length){
      const cl=clients[0];
      const contacts=(cl.contacts||[]).filter(ct=>
        texteContientMot((ct.fonction||'').toLowerCase(),roleOuNomTexte.toLowerCase())||
        ct.nom.toLowerCase().includes(roleOuNomTexte.toLowerCase())
      );
      const contact=contacts[0]||null;
      const titre=contact?`RDV ${contact.fonction||roleOuNomTexte} — ${contact.nom} (${cl.nom})`:`RDV ${roleOuNomTexte} — ${cl.nom}`;
      afficherConfirmationRdv({clientId:cl.id,titre},dateParsee,heureParsee,'',cl,contact,roleOuNomTexte);
      return;
    }
  }

  // 3. Rien de concluant -> saisie manuelle générique
  afficherConfirmationRdv({titre:`RDV ${nomTexte}`},dateParsee,heureParsee,nomTexte);
}

function commandeQuestionFactuelle(query){
  const ql=query.toLowerCase();
  const clientTexte=(query.match(/(?:chez|pour|à|sur)\s+(.+)$/i)||[])[1];
  const clientsMatch=clientTexte?trouverClientsParNom(clientTexte):[];
  const villeTexte=(query.match(/(?:sur|à)\s+([a-zàâäéèêëïîôöùûüç\-]+)$/i)||[])[1];

  if(ql.includes('mission')){
    let missions=S.missions.filter(m=>m.statut==='En cours');
    let label='missions en cours';
    if(clientsMatch.length){ const ids=new Set(clientsMatch.map(c=>c.id)); missions=missions.filter(m=>ids.has(m.clientId)); label+=` chez ${clientsMatch[0].nom}`; }
    showToast(`${missions.length} ${label}`);
    return true;
  }
  if(ql.includes('candidat')){
    let candidats=S.candidats.filter(c=>c.statut==='Actif');
    let label='candidats actifs';
    if(villeTexte&&!clientsMatch.length){ candidats=candidats.filter(c=>mobiliteMatch(c,villeTexte.toLowerCase())); label+=` mobiles sur ${villeTexte}`; }
    showToast(`${candidats.length} ${label}`);
    return true;
  }
  if(ql.includes('client')){
    showToast(`${S.clients.filter(c=>c.statut==='Actif').length} clients actifs`);
    return true;
  }
  return false;
}

function commandeCreerRappel(nomTexte,delaiTexte){
  const candidats=trouverCandidatsParNom(nomTexte);
  const dateParsee=parseDateNaturelle(delaiTexte);
  if(!candidats.length){ alert(`Candidat "${nomTexte}" introuvable.`); return; }
  if(!dateParsee){ alert(`Je n'ai pas compris le délai dans "${delaiTexte}" (ex: "dans une semaine", "mardi", "15/07").`); return; }
  if(candidats.length>1){
    const opts=candidats.map(c=>`<button class="btn" style="width:100%;text-align:left;margin-bottom:6px" onclick="closeModal();afficherConfirmationRappel('${c.id}','${dateParsee.toISOString().slice(0,10)}')">${esc(c.prenom)} ${esc(c.nom)} <small style="color:var(--text2)">· ${esc(c.poste||'')}</small></button>`).join('');
    showModal(`<h3>Quel candidat ?</h3>${opts}<div class="modal-footer"><button class="btn" onclick="closeModal()">Annuler</button></div>`);
    return;
  }
  afficherConfirmationRappel(candidats[0].id,dateParsee.toISOString().slice(0,10));
}

const ORDINAUX_ENTRETIEN={
  'premier':1,'1er':1,
  'deuxième':2,'deuxieme':2,'2e':2,'2ème':2,'2eme':2,'2nd':2,'seconde':2,
  'troisième':3,'troisieme':3,'3e':3,'3ème':3,'3eme':3,
  'quatrième':4,'quatrieme':4,'4e':4,'4ème':4,'4eme':4,
  'cinquième':5,'cinquieme':5,'5e':5,'5ème':5,'5eme':5,
  'sixième':6,'sixieme':6,'6e':6,'6ème':6,'6eme':6,
  'septième':7,'septieme':7,'7e':7,'7ème':7,'7eme':7,
  'huitième':8,'huitieme':8,'8e':8,'8ème':8,'8eme':8,
  'neuvième':9,'neuvieme':9,'9e':9,'9ème':9,'9eme':9,
  'dixième':10,'dixieme':10,'10e':10,'10ème':10,'10eme':10,
};

function detecterNumeroEntretien(q){
  const ql=q.toLowerCase();
  const m=ql.match(/entretien\s*(?:n[°o]?)?\s*(\d+)/);
  if(m) return parseInt(m[1]);
  for(const mot in ORDINAUX_ENTRETIEN){
    if(ql.includes(mot+' entretien')) return ORDINAUX_ENTRETIEN[mot];
  }
  return null;
}

async function commandeEntretienNaturel(q){
  const numero=detecterNumeroEntretien(q);
  if(numero===null) return false;

  if(!getApiKey()){ alert('Configurez d\'abord votre clé API Anthropic dans Paramètres pour utiliser cette commande.'); return true; }

  showModal(`<h3>Entretien ${numero}</h3>
    <div style="text-align:center;padding:40px 0;color:var(--text2)">
      <i class="ti ti-loader-2" style="font-size:28px;display:block;margin-bottom:10px;animation:spin 1s linear infinite"></i>
      Analyse de la phrase…
    </div>`);

  const candidatsListe=S.candidats.map(c=>`${c.id}:${c.prenom} ${c.nom}`).join(', ');
  const missionsListe=S.missions.filter(m=>m.statut==='En cours').map(m=>`${m.id}:${m.poste} chez ${getClient(m.clientId).nom}`).join(', ');

  const prompt=`Un chasseur de têtes veut placer un candidat à une étape d'entretien sur une mission. Identifie le candidat et la mission concernés à partir de cette phrase (elle peut mentionner un nom de candidat, un poste, et/ou un client — utilise tous les indices disponibles).

PHRASE : "${q}"

CANDIDATS EXISTANTS (choisis l'ID EXACT dans cette liste, ou null si aucun ne correspond clairement — n'invente jamais un ID) :
${candidatsListe}

MISSIONS EN COURS (choisis l'ID EXACT dans cette liste, ou null si ambigu ou si aucune ne correspond — n'invente jamais un ID) :
${missionsListe}

Réponds UNIQUEMENT en JSON sans markdown :
{
  "candidatId": "ID exact ou null",
  "missionId": "ID exact ou null"
}`;

  let rawTextDebug='';
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':getApiKey(),'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:400,messages:[{role:'user',content:prompt}]})
    });
    const data=await res.json();
    if(data.error) throw new Error(data.error.message||'Erreur API Anthropic');
    if(!data.content||!data.content[0]) throw new Error('Réponse API vide ou inattendue');
    const text=data.content[0].text;
    rawTextDebug=text;
    let json;
    try{ json=JSON.parse(text.replace(/```json|```/g,'').trim()); }
    catch(e){ const mm=text.match(/\{[\s\S]*\}/); if(mm) json=JSON.parse(mm[0]); else throw new Error('Réponse IA invalide'); }

    // Sécurité anti-hallucination : on ne garde l'ID que s'il existe vraiment
    const candidatId=(json.candidatId&&S.candidats.find(c=>c.id===json.candidatId))?json.candidatId:'';
    const missionId=(json.missionId&&S.missions.find(m=>m.id===json.missionId))?json.missionId:'';

    afficherConfirmationEntretien(candidatId,missionId,numero,'','');
  }catch(e){
    afficherConfirmationEntretien('','',numero,'','');
  }
  return true;
}

function confirmerEntretienNaturel(){
  const candidatId=v('etn-can');
  const missionId=v('etn-mis');
  const numero=parseInt(v('etn-num'));
  if(!candidatId||!missionId||!numero){ alert('Candidat, mission et numéro d\'entretien sont obligatoires.'); return; }
  let p=S.pipeline.find(x=>x.candidatId===candidatId&&x.missionId===missionId);
  if(!p){
    p={id:uid('P'),missionId,candidatId,etape:'Identifié',priorite:'Moyenne',decClient:'En attente',decCand:'En attente',entretienStep:0};
    S.pipeline.push(p);

  p.entretienStep=numero;
  p.etape='Entretien client';
  saveData();
  closeModal();
  const c=S.candidats.find(x=>x.id===candidatId);
  const m=S.missions.find(x=>x.id===missionId);
  showToast(`${c.prenom} ${c.nom} → Entretien ${numero} (${m.poste})`);
  render();

function setEntretienStep(pipelineId,step){

  saveData();
  const tab=document.getElementById('mission-tab-pipeline-'+p.missionId);
  if(tab) tab.innerHTML=renderMissionPipelineTabContent(p.missionId);
  render();
}

function candidatPickerFilterEntStep(missionId,q){
  const ql=(q||'').toLowerCase().trim();
  const dejaSuivis=new Set(S.pipeline.filter(p=>p.missionId===missionId&&p.entretienStep>0).map(p=>p.candidatId));
  const candsMission=S.pipeline.filter(p=>p.missionId===missionId&&!dejaSuivis.has(p.candidatId));
  const results=(ql?candsMission.filter(p=>getCandidatName(p.candidatId).toLowerCase().includes(ql)):candsMission).slice(0,8);
  const fieldId='entstep-add-'+missionId;
  const dd=document.getElementById(fieldId+'-dropdown');
  if(!dd) return;
  if(!results.length){
    let msg='Aucun résultat';
    if(!candsMission.length) msg=S.pipeline.some(p=>p.missionId===missionId)?'Tous les candidats du pipeline sont déjà suivis':'Ajoutez d\'abord un candidat au pipeline ci-dessous';
    dd.innerHTML=`<div class="candidat-picker-item" style="color:var(--text3);cursor:default">${msg}</div>`;
    dd.classList.add('show');
    return;
  }
  dd.innerHTML=results.map((p,i)=>`<div class="candidat-picker-item${i===0?' sel':''}" onmousedown="setEntretienStep('${p.id}',1);document.getElementById('${fieldId}-search').value=''">
    ${getCandidatName(p.candidatId)}
  </div>`).join('');
  dd.classList.add('show');
}

async function analyserCRMemoire(missionId, silent){
  if(!getApiKey()){ if(!silent) alert('Configurez d\'abord votre clé API Anthropic.'); return; }
  const m=S.missions.find(x=>x.id===missionId);
  if(!m) return;
  const acts=S.actions.filter(a=>a.missionId===missionId && a.cr && a.cr.trim());
  if(!acts.length){ if(!silent) alert('Aucun compte-rendu trouvé pour cette mission.'); return; }

  const btn=silent?null:document.querySelector(`button[onclick="analyserCRMemoire('${missionId}')"]`);
  if(btn){ btn.disabled=true; btn.innerHTML='<i class="ti ti-loader-2"></i> Analyse…'; }

  const crText=acts.map(a=>`[${fmtDate(a.date)} — ${getCandidatName(a.candidatId)}] ${a.cr}`).join('\n\n');
  const cl=getClient(m.clientId);

  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':getApiKey(),'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({
        model:'claude-sonnet-4-6',
        max_tokens:1500,
        messages:[{role:'user',content:`Tu es un chasseur de têtes expert. Analyse ces comptes-rendus d'une mission de recrutement et extrait des insights structurés.

MISSION : ${m.poste} chez ${cl.nom} (${m.ville||''})
BRIEF : ${m.notes||'Non renseigné'}

COMPTES-RENDUS :
${crText}

Extrait les insights suivants et réponds UNIQUEMENT en JSON sans markdown :
{
  "implicites": ["critère implicite 1", "critère implicite 2"...],
  "refus": ["Candidat X refusé — raison", ...],
  "objections": ["objection candidat 1", ...],
  "adn": ["trait commun aux bons profils 1", ...]
}

Sois concis, factuel, basé uniquement sur les CR. Maximum 5 items par catégorie. Ne mets rien si tu n'as pas d'éléments solides.`}]
      })
    });
    const data=await res.json();
    const text=data.content[0].text;
    let json;
    try{ json=JSON.parse(text.replace(/```json|```/g,'').trim()); }
    catch(e){ const match=text.match(/\{[\s\S]*\}/); if(match) json=JSON.parse(match[0]); else throw new Error('Réponse IA invalide'); }

    if(!m.memory) m.memory={implicites:[],refus:[],objections:[],adn:[]};
    // Fusionner sans doublons
    let nbAjout=0;
    ['implicites','refus','objections','adn'].forEach(k=>{
      if(json[k]) json[k].forEach(item=>{ if(!m.memory[k].includes(item)){ m.memory[k].push(item); nbAjout++; } });
    });
    saveData();

    if(silent){
      if(nbAjout>0) notifyMemoireEnrichie(`🧠 Mémoire mission "${m.poste}" enrichie (+${nbAjout})`);
      return;
    }

    openMissionDetail(missionId);
    setTimeout(()=>{
      switchMissionTab(missionId,'memoire',null);
      document.querySelectorAll(`#mission-main-tabs-${missionId} .stab`)[1]?.classList.add('active');
      document.querySelectorAll(`#mission-main-tabs-${missionId} .stab`)[0]?.classList.remove('active');
    },10);
    const total=(json.implicites||[]).length+(json.refus||[]).length+(json.objections||[]).length+(json.adn||[]).length;
    if(total===0) alert('Aucun insight extrait — les CR sont peut-être trop courts.');
  }catch(e){
    if(btn){ btn.disabled=false; btn.innerHTML='<i class="ti ti-sparkles"></i> Analyser les CR'; }
    if(!silent) alert('Erreur : '+e.message);
  }
}

let cvAttachmentTemp=null;

function renderCvDropzoneContent(existing){
  if(cvAttachmentTemp&&cvAttachmentTemp.removed) return 'Glissez un PDF/Word ici, ou cliquez pour parcourir';
  const filename=cvAttachmentTemp?.filename||existing?.cvFilename;
  if(filename) return `<div class="cv-dropzone-file"><span>📄 ${esc(filename)}</span><button class="mem-del" onclick="event.stopPropagation();retirerCvAttachment()">×</button></div>`;
  return 'Glissez un PDF/Word ici, ou cliquez pour parcourir';
}

function handleCvDrop(e){
  e.preventDefault();
  e.currentTarget.classList.remove('dragover');
  const file=e.dataTransfer.files&&e.dataTransfer.files[0];
  if(file) lireFichierCv(file);
}

function handleCvFileSelected(file){
  if(file) lireFichierCv(file);
}

function lireFichierCv(file){
  const reader=new FileReader();
  reader.onload=function(ev){
    const base64=String(ev.target.result).split(',')[1];
    cvAttachmentTemp={filename:file.name, base64, mediaType:file.type||guessMediaType(file.name)};
    const zone=document.getElementById('cv-dropzone-content');
    if(zone) zone.innerHTML=renderCvDropzoneContent(null);
  };
  reader.readAsDataURL(file);
}

function retirerCvAttachment(){
  cvAttachmentTemp={removed:true};
  const zone=document.getElementById('cv-dropzone-content');
  if(zone) zone.innerHTML=renderCvDropzoneContent(null);
}

// Point d'entrée unique pour créer un candidat : garantit que la date d'ajout est toujours tracée
function ajouterCandidat(cand){
  if(!cand.dateAjout) cand.dateAjout=new Date().toISOString().slice(0,10);
  S.candidats.push(cand);
}

function saveCandidat(id){
  const deptEls=document.querySelectorAll('.dept-chk:checked');
  const mobiliteDepts=deptEls.length?Array.from(deptEls).map(e=>e.value):[];
  const existing=id?S.candidats.find(x=>x.id===id):null;
  const d={id:id||uid('CAN'),nom:v('f-nom'),prenom:v('f-pre'),poste:v('f-pos'),societe:v('f-soc'),email:v('f-email'),tel:v('f-tel'),ville:v('f-vil'),exp:v('f-exp'),spe:v('f-spe'),pretentions:v('f-pret'),dispo:v('f-dis'),statut:v('f-sta'),linkedin:v('f-linkedin'),apec:v('f-apec'),mobilite:v('f-mob'),mobiliteDepts,cvUrl:v('f-cv'),notes:v('f-not'),dateAjout:existing?.dateAjout};
  if(cvAttachmentTemp&&cvAttachmentTemp.removed){
    d.cvBase64=null; d.cvMediaType=null; d.cvFilename=null;
  } else if(cvAttachmentTemp&&cvAttachmentTemp.filename){
    d.cvBase64=cvAttachmentTemp.base64; d.cvMediaType=cvAttachmentTemp.mediaType; d.cvFilename=cvAttachmentTemp.filename;
  } else {
    d.cvBase64=existing?.cvBase64; d.cvMediaType=existing?.cvMediaType; d.cvFilename=existing?.cvFilename;
  }
  if(!d.nom)return alert('Le nom est obligatoire');
  if(id){const i=S.candidats.findIndex(x=>x.id===id);S.candidats[i]=d;}else ajouterCandidat(d);
  cvAttachmentTemp=null;
  saveData();closeModal();render();
}

async function profilsSimilaires(candidatId){
  if(!getApiKey()){ alert('Configurez d\'abord votre clé API Anthropic.'); return; }
  const c=S.candidats.find(x=>x.id===candidatId);
  if(!c) return;

  // Afficher un loader dans la modale
  const footer=document.querySelector('.modal-footer');
  const btn=footer?.querySelector('button[onclick*="profilsSimilaires"]');
  if(btn){ btn.disabled=true; btn.innerHTML='<i class="ti ti-loader-2"></i> Analyse…'; }

  const profil=`${c.prenom} ${c.nom} — ${c.poste||''}, ${c.exp||'?'} ans exp, spé: ${c.spe||'non précisée'}, ville: ${c.ville||'?'}, mobilité: ${mobiliteLabel(c)}, prétentions: ${c.pretentions||'?'}, dispo: ${c.dispo||'?'}, notes: ${c.notes||''}`;

  const autresCandidats=S.candidats.filter(x=>x.id!==candidatId).map(x=>
    `ID:${x.id} | ${x.prenom} ${x.nom} | ${x.poste||''} | ${x.exp||'?'} ans | ${x.spe||''} | ${x.ville||''} | mobilité: ${x.mobilite||'?'} | dispo: ${x.dispo||'?'} | prétentions: ${x.pretentions||'?'}`
  ).join('\n');

  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':getApiKey(),'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({
        model:'claude-sonnet-4-6',
        max_tokens:800,
        messages:[{role:'user',content:`Tu es un chasseur de têtes expert. Voici un candidat de référence et une liste de candidats. Trouve les 3 profils les plus similaires au candidat de référence et explique pourquoi en 1 phrase.

CANDIDAT DE RÉFÉRENCE :
${profil}

AUTRES CANDIDATS :
${autresCandidats}

Réponds UNIQUEMENT en JSON sans markdown :
{"similaires":[{"id":"ID_EXACT","score":8.5,"justification":"..."},...]}`}]
      })
    });
    const data=await res.json();
    const text=data.content[0].text;
    let json;
    try{ json=JSON.parse(text.replace(/```json|```/g,'').trim()); }
    catch(e){ const m=text.match(/\{[\s\S]*\}/); if(m) json=JSON.parse(m[0]); else throw new Error('Réponse invalide'); }

    const resultats=json.similaires||[];

    // Afficher dans une section sous les onglets
    let existingResult=document.getElementById('similaires-result');
    if(!existingResult){
      const modalContent=document.querySelector('.modal-footer');

    existingResult.innerHTML=`<div style="font-size:12px;font-weight:600;color:var(--text2);margin-bottom:10px"><i class="ti ti-sparkles"></i> Profils similaires à ${esc(c.prenom)} ${esc(c.nom)}</div>
    ${resultats.map((r,i)=>{
      const cand=S.candidats.find(x=>x.id===r.id);
      if(!cand) return '';
      const stars='⭐'.repeat(Math.round(r.score/2));
      return`<div style="display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);cursor:pointer" onclick="closeModal();setTimeout(()=>openCandidatDetail('${cand.id}'),50)">
        <div style="font-size:18px;font-weight:700;color:var(--text3);width:20px;flex-shrink:0">${i+1}</div>
        <div style="flex:1">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:2px">
            <strong style="font-size:13px">${esc(cand.prenom)} ${esc(cand.nom)}</strong>
            <span style="font-size:11px;background:var(--green-bg);color:var(--green-t);padding:1px 7px;border-radius:10px;font-weight:600">${r.score}/10</span>
            <span class="badge ${STATUT_CD[cand.statut]||'b-gray'}">${cand.statut}</span>

          <div style="font-size:12px;color:var(--text)">${esc(r.justification)}</div>

// ── Débrief vocal ──────────────────────────────────────────────────────────
let debriefVocalRec={};
function toggleDebriefVocal(textareaId, btnId){
  if(!('webkitSpeechRecognition' in window||'SpeechRecognition' in window)){
    alert('Utilisez Chrome pour la dictée vocale.');return;
  }
  const btn=document.getElementById(btnId);
  if(debriefVocalRec[textareaId]){
    debriefVocalRec[textareaId].stop();
    delete debriefVocalRec[textareaId];
    if(btn) btn.classList.remove('listening');
    return;
  }
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  const rec=new SR();
  rec.lang='fr-FR'; rec.continuous=true; rec.interimResults=true;
  const ta=document.getElementById(textareaId);
  let finalTranscript=ta?ta.value:'';
  if(btn) btn.classList.add('listening');
  rec.onresult=(e)=>{
    let interim='';
    for(let i=e.resultIndex;i<e.results.length;i++){
      const transcript=e.results[i][0].transcript;
      if(e.results[i].isFinal) finalTranscript+=(finalTranscript?' ':'')+transcript.trim();
      else interim+=transcript;
    }
    const el=document.getElementById(textareaId);
    if(el) el.value=(finalTranscript+' '+interim).trim();
  };
  rec.onend=()=>{ if(btn) btn.classList.remove('listening'); delete debriefVocalRec[textareaId]; };
  rec.onerror=()=>{ if(btn) btn.classList.remove('listening'); delete debriefVocalRec[textareaId]; };
  rec.start();
  debriefVocalRec[textareaId]=rec;
}

async function structurerCRVocal(candidatId){
  const ta=document.getElementById(`cr-rapide-${candidatId}`);
  const texteBrut=ta?.value.trim();
  if(!texteBrut){ alert('Dictez ou tapez d\'abord un compte-rendu.'); return; }
  if(!getApiKey()){ alert('Configurez d\'abord votre clé API Anthropic dans Paramètres.'); return; }

  const c=S.candidats.find(x=>x.id===candidatId);
  const note=document.getElementById(`cr-ia-note-${candidatId}`);
  if(note) note.textContent='✨ Structuration en cours…';

  const prompt=`Tu structures un compte-rendu de recrutement dicté à voix haute par un chasseur de têtes, sur le candidat ${c.prenom} ${c.nom} (${c.poste||'?'}).

TEXTE DICTÉ BRUT :
${texteBrut}

Réponds UNIQUEMENT en JSON sans markdown :
{
  "cr": "le texte reformulé en compte-rendu clair et professionnel, en gardant TOUTES les informations factuelles du texte dicté — juste mieux formulé, sans oralité (\\"euh\\", répétitions, etc.)",
  "type": "un type parmi : Call sortant, Call entrant, Visio, Rencontre physique, Email, SMS, Note interne — déduit du contexte, Call sortant par défaut si ambigu",
  "resultat": "un résultat parmi : Positif, Neutre, À suivre, Négatif — déduit du ton du texte",
  "prochaineAction": "si le texte mentionne ou implique clairement une suite à donner (relancer, présenter au client, revoir dans X temps...), décris cette action en 3-4 mots ; sinon renvoie null",
  "delaiJours": nombre de jours avant cette prochaine action si applicable (ex: 7 pour 'dans une semaine'), sinon null
}`;

  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':getApiKey(),'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1200,messages:[{role:'user',content:prompt}]})
    });
    const data=await res.json();
    if(data.error) throw new Error(data.error.message||'Erreur API Anthropic');
    if(!data.content||!data.content[0]) throw new Error('Réponse API vide ou inattendue');
    const text=data.content[0].text;
    let json;
    try{ json=JSON.parse(text.replace(/```json|```/g,'').trim()); }
    catch(e){ const mm=text.match(/\{[\s\S]*\}/); if(mm) json=JSON.parse(mm[0]); else throw new Error('Réponse IA invalide'); }

    if(ta&&json.cr) ta.value=json.cr;
    if(json.type){ const sel=document.getElementById(`cr-type-${candidatId}`); if(sel) sel.value=json.type; }
    if(json.resultat){ const sel=document.getElementById(`cr-res-${candidatId}`); if(sel) sel.value=json.resultat; }

    if(json.prochaineAction){
      const prochSel=document.getElementById(`cr-prochaine-${candidatId}`);
      if(prochSel) prochSel.value=PROCHAINES.includes('Call')?'Call':(PROCHAINES.find(p=>p!=='Aucune')||'Aucune');
      const dateInp=document.getElementById(`cr-datepro-${candidatId}`);
      if(dateInp){
        const delai=json.delaiJours&&!isNaN(json.delaiJours)?parseInt(json.delaiJours):7;
        const d=new Date(); d.setDate(d.getDate()+delai);
        dateInp.value=d.toISOString().slice(0,10);
      }
      if(note) note.textContent=`✓ Structuré — suivi suggéré : ${json.prochaineAction}`;
    } else if(note){
      note.textContent='✓ Compte-rendu structuré.';
    }
  }catch(e){
    if(note) note.textContent='Erreur : '+e.message;
  }
}

      if(!m.memory) m.memory={implicites:[],refus:[],objections:[],adn:[]};
      let n=0;
      ['implicites','refus','objections','adn'].forEach(k=>{(json.mission[k]||[]).forEach(item=>{ if(!m.memory[k].includes(item)){ m.memory[k].push(item); n++; } });});
      if(n>0) notifyMemoireEnrichie(`🧠 Mémoire mission "${m.poste}" enrichie (+${n})`);
    }
    if(json.client && cl && cl.id){
      if(!cl.memory) cl.memory={implicites:[],style:[],refus:[],preferences:[],concurrents:[]};
      let n=0;
      ['implicites','style','refus','preferences'].forEach(k=>{(json.client[k]||[]).forEach(item=>{ if(!cl.memory[k].includes(item)){ cl.memory[k].push(item); n++; } });});
      if(n>0) notifyMemoireEnrichie(`🧠 Mémoire client "${cl.nom}" enrichie (+${n})`);
    }
    saveData();
  }catch(e){ /* enrichissement en fond : échec silencieux, non bloquant */ }
}

function savePipeline(id){
  const ancien=id?S.pipeline.find(x=>x.id===id):null;
  const decClientAvant=ancien?ancien.decClient:null;
  const decCandAvant=ancien?ancien.decCand:null;

  const d={id:id||uid('P'),missionId:v('f-mis'),candidatId:v('f-can'),etape:v('f-et'),priorite:v('f-pri'),dateEtape:v('f-de'),rdv:v('f-rdv'),decClient:v('f-dc'),decCand:v('f-dca'),commentaire:v('f-com')};
  if(!d.missionId||!d.candidatId)return alert('Mission et candidat obligatoires');
  if(id){const i=S.pipeline.findIndex(x=>x.id===id);S.pipeline[i]=d;}else S.pipeline.push(d);
  // Auto-sync statut candidat
  const cand=S.candidats.find(x=>x.id===d.candidatId);
  if(cand){
    if(d.etape==='Retenu'){cand.statut='Placé';}
    else if(['Identifié','Approché','Pré-qualifié','Qualifié','Présenté au client','Entretien client','Offre'].includes(d.etape)&&['Actif','En veille'].includes(cand.statut)){cand.statut='En process';}
  }
  saveData();closeModal();render();

  // Mémoire apprenante automatique : un refus ou une décision positive (nouvelle ou changée) enrichit la mémoire
  const decisionAChange=(d.decClient!==decClientAvant)||(d.decCand!==decCandAvant);
  const decisionMarquante=['Négatif','Positif'].includes(d.decClient)||['Négatif','Positif'].includes(d.decCand);
  if(decisionAChange && decisionMarquante && d.commentaire && d.commentaire.trim().length>15){
    analyserDecisionPipeline(d);
  }
}

let voiceRecognition=null;
let voiceActive=false;

function toggleVoice(){
  if(!('webkitSpeechRecognition' in window||'SpeechRecognition' in window)){
    alert('La reconnaissance vocale n\'est pas supportée sur ce navigateur. Utilisez Chrome.');
    return;
  }
  if(voiceActive){ stopVoice(); return; }

  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  voiceRecognition=new SR();
  voiceRecognition.lang='fr-FR';
  voiceRecognition.continuous=false;
  voiceRecognition.interimResults=true;

  const btn=document.getElementById('mic-btn');
  const icon=document.getElementById('mic-icon');
  if(btn){ btn.style.background='#ef4444';btn.style.color='#fff';btn.style.border='none'; }
  if(icon){ icon.className='ti ti-microphone-off'; }
  voiceActive=true;

  voiceRecognition.onresult=(e)=>{
    const transcript=Array.from(e.results).map(r=>r[0].transcript).join('');
    const inp=document.getElementById('search-input');
    if(inp) inp.value=transcript;
    if(e.results[0].isFinal){
      handleVoiceCommand(transcript.toLowerCase().trim());
    }
  };

  voiceRecognition.onerror=()=>stopVoice();
  voiceRecognition.onend=()=>stopVoice();
  voiceRecognition.start();
}

function stopVoice(){
  voiceActive=false;
  if(voiceRecognition) try{ voiceRecognition.stop(); }catch(e){}
  const btn=document.getElementById('mic-btn');
  const icon=document.getElementById('mic-icon');
  if(btn){ btn.style.background='';btn.style.color='';btn.style.border=''; }
  if(icon){ icon.className='ti ti-microphone'; }
}

function handleVoiceCommand(text){
  // Commandes spéciales
  if(text.includes('que faire')||text.includes('priorité')||text.includes('action')){
    closeModal(); openActionEngine(); return;
  }
  if(text.includes('nouveau candidat')||text.includes('ajouter candidat')){
    closeModal(); nav('candidats',null); setTimeout(()=>openCandidatModal(),100); return;
  }
  if(text.includes('nouvelle mission')||text.includes('ajouter mission')){
    closeModal(); nav('missions',null); setTimeout(()=>openMissionModal(),100); return;
  }
  if(text.includes('tableau de bord')||text.includes('accueil')){
    nav('dashboard',null); return;
  }
  if(text.includes('agenda')||text.includes('rendez-vous')||text.includes('rdv')){
    nav('agenda',null); return;
  }
  // Sinon : recherche
  doSearch(text);
}

function mobiliteMatch(candidat, villeRecherche){
  if(!villeRecherche) return true;
  const vl=villeRecherche.toLowerCase().trim();
  const mob=(candidat.mobilite||'').toLowerCase();
  const villeCand=(candidat.ville||'').toLowerCase();

  // Match direct sur la ville du candidat
  if(villeCand.includes(vl)) return true;

  // Mobilité nationale/internationale couvre tout
  if(mob.includes('france entière')||mob.includes('france entiere')||
     mob.includes('national')||mob.includes('toute france')||
     mob.includes('international')||mob.includes('europe')) return true;

  // Mobilité par départements précis (nouveau système)
  if(candidat.mobiliteDepts && candidat.mobiliteDepts.length){
    const deptCible=departementDeVille(vl);
    if(deptCible && candidat.mobiliteDepts.includes(deptCible)) return true;
  }

  // Rétrocompatibilité avec l'ancien système en texte libre (Régionale/Locale)
  const zones=MOBILITE_ZONES[vl]||[];
  if(zones.some(z=>mob.includes(z))) return true;

  return false;
}

  'pour','sur','avec','qui','possible','mon','ma','mes','notre','nos','votre','vos','ai','besoin','faut','il',
  'a','à','client','clients','mission','missions','candidat','candidats','poste','postes','fiche','profil','profils']);

function parseQuery(q){
  // Découpe la requête en mots-clés, détecte les villes en fin de query
  const mots=q.trim().toLowerCase().split(/\s+/).filter(Boolean).filter(m=>!STOPWORDS_COMMANDE.has(m));
  const villesConnues=Object.keys(MOBILITE_ZONES);

  // Cherche une ville dans la query
  let ville=null;
  let motsCles=[];
  mots.forEach(m=>{
    if(villesConnues.includes(m)||Object.values(MOBILITE_ZONES).flat().some(z=>z===m)){
      ville=m;
    } else {
      motsCles.push(m);
    }
  });

  // Si pas de ville trouvée, tous les mots (filtrés) sont des mots-clés
  if(!ville) motsCles=mots;

  return{motsCles, ville, original:q.trim()};
}

// ── Synonymes / abréviations métier — pour que "IC", "DAF", "IBD" etc. matchent les vrais intitulés ──
const GROUPES_SYNONYMES_METIER=[
  ['ic','ingénieur d\'affaires','ingé d\'affaires','ingenieur d\'affaires','ingé daffaires','ingenieur daffaires','ing d\'affaires'],
  ['ibd','ingénieur d\'affaires international','ingenieur d\'affaires international'],
  ['daf','cfo','directeur financier','directeur administratif et financier'],
  ['audit','auditeur','auditrice'],
];

function equivalentsMot(mot){
  const ml=(mot||'').toLowerCase().trim();
  for(const groupe of GROUPES_SYNONYMES_METIER){
    if(groupe.includes(ml)) return groupe;
  }
  return [ml];
}

function texteContientMot(texte,mot){
  return equivalentsMot(mot).some(alt=>texte.includes(alt));
}

function matchMissionIntelligent(m,parsed){
  const {motsCles,ville}=parsed;
  const cl=getClient(m.clientId);
  const texte=[m.poste,m.ville,m.remun,m.contrat,m.notes,cl?.nom].map(x=>(x||'').toLowerCase()).join(' ');
  const motsOk=motsCles.every(mc=>texteContientMot(texte,mc));
  const villeOk=!ville||texte.includes(ville);
  return motsOk&&villeOk;
}

function matchCandidatIntelligent(c, parsed){
  const {motsCles, ville, original} = parsed;
  const deptTexte=(c.mobiliteDepts||[]).map(code=>{
    const d=DEPARTEMENTS_FR.find(x=>x.code===code);
    return d?`${d.code} ${d.nom}`:code;
  }).join(' ');
  const champsCandidats=[c.nom,c.prenom,c.poste,c.societe,c.spe,c.notes,c.email,c.pretentions,c.dispo,c.mobilite,c.ville,deptTexte].map(x=>(x||'').toLowerCase());
  const texte=champsCandidats.join(' ');

  // Tous les mots-clés doivent matcher dans les champs texte (avec équivalences métier)
  const motsMatch=motsCles.every(m=>texteContientMot(texte,m));

  // La ville doit matcher la mobilité
  const villeMatch=!ville || mobiliteMatch(c, ville);

  return motsMatch && villeMatch;
}

function matchScore(fields,q){
  const ql=q.toLowerCase();
  return fields.some(f=>f&&String(f).toLowerCase().includes(ql));
}

function fileToBase64(file){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=()=>resolve(reader.result.split(',')[1]);
    reader.onerror=reject;
    reader.readAsDataURL(file);
  });
}

function guessMediaType(filename,fallback){
  const ext=filename.split('.').pop().toLowerCase();
  return {pdf:'application/pdf',png:'image/png',jpg:'image/jpeg',jpeg:'image/jpeg',webp:'image/webp'}[ext]||fallback||'application/octet-stream';
}

const EXTRACTION_SYSTEM_PROMPT = `Tu es un assistant d'extraction de données pour un ATS (logiciel de recrutement) utilisé par un chasseur de têtes français.

On te fournit le contenu d'un CV. Extrais les informations suivantes et réponds UNIQUEMENT avec un objet JSON valide, sans aucun texte avant ou après, sans balises markdown.

Format attendu exactement :
{
  "nom": "string (nom de famille)",
  "prenom": "string (prénom)",
  "poste": "string (intitulé du poste actuel ou le plus récent)",
  "societe": "string (entreprise actuelle ou la plus récente)",
  "email": "string ou vide",
  "tel": "string ou vide (format français si possible)",
  "ville": "string (ville de résidence, ou vide si non mentionnée)",
  "exp": "string (nombre total d'années d'expérience professionnelle, juste le nombre, ex: '8')",
  "spe": "string (2-4 mots résumant la spécialisation/domaine d'expertise, ex: 'Finance / Industrie')",
  "notes": "string (synthèse de 3-5 lignes : parcours, compétences clés, formations principales — rédigée en français, professionnelle, factuelle)"
}

Règles :
- Si une information est absente du CV, mets une chaîne vide "" (jamais null).
- N'invente JAMAIS d'information qui n'est pas dans le texte.
- "exp" doit être estimé à partir des dates d'expérience visibles dans le CV.`;

async function callExtractionAPI(contentBlock, sourceLabel){
  const res=await fetch('https://api.anthropic.com/v1/messages', {
    method:'POST',
    headers:{
      'Content-Type':'application/json',
      'x-api-key': getApiKey(),
      'anthropic-version':'2023-06-01',
      'anthropic-dangerous-direct-browser-access':'true'
    },
    body:JSON.stringify({
      model:'claude-sonnet-4-5',
      max_tokens:1024,
      system:EXTRACTION_SYSTEM_PROMPT,
      messages:[{
        role:'user',
        content:[ contentBlock, { type:'text', text:`Extrais les informations de ce profil/CV (source : ${sourceLabel}) au format JSON demandé.` } ]
      }]
    })
  });

  const json=await res.json();
  if(!res.ok){
    throw new Error(json.error?.message || `Erreur API (${res.status})`);
  }

  const textBlock=(json.content||[]).find(b=>b.type==='text');
  if(!textBlock) throw new Error('Réponse IA invalide (pas de texte)');

  let extracted;
  try{
    const cleaned=textBlock.text.replace(/```json\s*|\s*```/g,'').trim();
    extracted=JSON.parse(cleaned);
  }catch(e){
    throw new Error('Échec de l\'extraction : réponse IA non structurée');
  }

  return {
    nom:extracted.nom||'', prenom:extracted.prenom||'', poste:extracted.poste||'',
    societe:extracted.societe||'', email:extracted.email||'', tel:extracted.tel||'',
    ville:extracted.ville||'', exp:extracted.exp||'', spe:extracted.spe||'', notes:extracted.notes||''
  };
}

  btn.innerHTML='<i class="ti ti-loader-2"></i> Analyse en cours…';

  try{
    const extracted=await callExtractionAPI({ type:'text', text }, 'texte collé (LinkedIn ou autre)');
    if(!extracted.nom){
      alert('L\'IA n\'a pas réussi à identifier un nom dans ce texte. Vérifiez que vous avez bien collé l\'intégralité du profil.');
      return;
    }
    creerFicheDepuisExtraction(extracted, null);
    textarea.value='';
  }catch(e){
    alert('Erreur lors de l\'analyse : '+e.message);
  }finally{
    btn.disabled=false;
    btn.innerHTML=originalHtml;
  }
}

// ── Réception des imports envoyés par l'extension Chrome ───────────────────
// Appelée automatiquement depuis background.js de l'extension, qui injecte
// ce texte directement dans l'onglet ATS ouvert quand vous cliquez sur
// "Importer dans mon ATS" depuis LinkedIn/APEC/Indeed.
window.importerDepuisExtension = async function(text, sourceUrl){
  if(!getApiKey()){
    alert('Import reçu depuis l\'extension, mais aucune clé API Anthropic n\'est configurée.\nAllez dans l\'onglet "Import CV (IA)" pour la renseigner, puis réessayez.');
    nav('importcv', null);
    return;
  }
  // On bascule sur l'onglet Import CV pour que l'utilisateur voie le résultat
  nav('importcv', null);

  const banner=document.createElement('div');
  banner.id='ext-import-banner';
  banner.style.cssText='background:var(--blue-bg,#dbeafe);border:1px solid #93c5fd;border-radius:var(--radius);padding:10px 14px;font-size:13px;color:#1e40af;margin-bottom:12px';
  banner.innerHTML='<i class="ti ti-plug-connected"></i> Profil reçu depuis l\'extension — analyse en cours…';
  document.getElementById('content')?.prepend(banner);

  try{
    const extracted=await callExtractionAPI({ type:'text', text }, sourceUrl||'extension navigateur');
    if(!extracted.nom){
      banner.style.background='#fee2e2';banner.style.color='#991b1b';banner.style.borderColor='#fecaca';
      banner.innerHTML='<i class="ti ti-alert-triangle"></i> Le profil reçu n\'a pas pu être analysé (nom non détecté). Réessayez depuis la page du profil.';
      return;
    }
    const newCand=creerFicheDepuisExtraction(extracted, null);
    if(sourceUrl){
      if(sourceUrl.includes('linkedin.com')){
        newCand.linkedin=newCand.linkedin||sourceUrl;
      } else if(sourceUrl.includes('apec.fr')){
        newCand.apec=newCand.apec||sourceUrl;
      } else {
        newCand.notes=(newCand.notes?newCand.notes+'\n\n':'')+'Source : '+sourceUrl;
      }
      saveData();
    }
    banner.remove();
  }catch(e){
    banner.style.background='#fee2e2';banner.style.color='#991b1b';banner.style.borderColor='#fecaca';
    banner.innerHTML='<i class="ti ti-alert-triangle"></i> Erreur lors de l\'analyse : '+esc(e.message);
  }
};

// ── Polling chrome.storage — remplace l'injection directe (bloquée sur file://) ──
// L'extension écrit le profil dans chrome.storage.local, l'ATS le lit
// toutes les secondes et déclenche l'extraction dès qu'il trouve quelque chose.
(function startStoragePolling() {
  if (typeof chrome === 'undefined' || !chrome.storage) return;
  let lastTimestamp = 0;

  setInterval(async () => {
    try {
      const result = await chrome.storage.local.get('ats_pending_import');
      const pending = result.ats_pending_import;
      if (!pending || pending.timestamp <= lastTimestamp) return;
      lastTimestamp = pending.timestamp;
      // Effacer immédiatement pour ne pas traiter deux fois
      await chrome.storage.local.remove('ats_pending_import');
      // Déclencher l'extraction
      if (typeof window.importerDepuisExtension === 'function') {
        window.importerDepuisExtension(pending.text, pending.sourceUrl);
      }
    } catch(e) {
      // Silencieux si chrome.storage n'est pas disponible
    }
  }, 1000);
})();

async function processCvFile(item){
  try{
    item.status='extracting'; renderCvQueue();

    const fileBase64=await fileToBase64(item.file);
    item.cvBase64=fileBase64;
    item.cvMediaType=item.file.type || guessMediaType(item.file.name);
    const mediaType=item.cvMediaType;
    const isPdf = mediaType==='application/pdf';
    const docBlock = isPdf
      ? { type:'document', source:{ type:'base64', media_type:mediaType, data:fileBase64 } }
      : { type:'image', source:{ type:'base64', media_type:mediaType, data:fileBase64 } };

    const extracted=await callExtractionAPI(docBlock, item.file.name);
    item.extracted=extracted;

    if(!extracted.nom){
      // Sans nom on ne peut pas créer une fiche exploitable : on bascule en validation manuelle exceptionnellement
      item.status='review';
      renderCvQueue();
      return;
    }

    // Création automatique et immédiate de la fiche candidat
    const newCand=creerFicheDepuisExtraction(extracted, { filename:item.file.name, mediaType:item.cvMediaType, base64:item.cvBase64 });
    item.status='saved';
    item.candidatId=newCand.id;
    renderCvQueue();
  }catch(e){
    item.status='error';
    item.error=e.message;
    renderCvQueue();
  }
}

function retryCvFile(id){
  const item=cvImportQueue.find(q=>q.id===id);
  if(!item)return;
  item.error=null;
  processCvFile(item);
}

function dismissCvItem(id){

  toast.innerHTML=`<span>✓ <strong>${esc(newCand.prenom)} ${esc(newCand.nom)}</strong> ajouté au vivier !</span><div style="display:flex;gap:6px"><button onclick="openCandidatDetail('${newCand.id}');this.closest('div[style]').remove()" style="padding:4px 10px;border-radius:6px;border:1px solid rgba(255,255,255,.3);background:rgba(255,255,255,.15);color:#fff;cursor:pointer;font-size:12px">Voir</button></div>`;

function telechargerCv(candidatId){
  const c=S.candidats.find(x=>x.id===candidatId);
  if(!c||!c.cvBase64)return alert('Aucun CV enregistré pour ce candidat.');
  try{
    const byteChars=atob(c.cvBase64);
    const byteNumbers=new Array(byteChars.length);
    for(let i=0;i<byteChars.length;i++) byteNumbers[i]=byteChars.charCodeAt(i);
    const byteArray=new Uint8Array(byteNumbers);
    const blob=new Blob([byteArray],{type:c.cvMediaType||'application/octet-stream'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;
    a.download=c.cvFilename||`CV_${c.nom}_${c.prenom}.pdf`;
    a.click();
    URL.revokeObjectURL(url);
  }catch(e){
    alert('Erreur lors de la préparation du fichier : '+e.message);
  }
}

function candidatPickerHtml(fieldId, selectedId, placeholder){
  const sel=S.candidats.find(c=>c.id===selectedId);

    <div class="candidat-picker-dropdown" id="${fieldId}-dropdown"></div>
  </div>`;

let candidatPickerSelIdx={};
function candidatPickerFilter(fieldId,q){
  const ql=(q||'').toLowerCase().trim();
  const results=(ql?S.candidats.filter(c=>`${c.prenom} ${c.nom}`.toLowerCase().includes(ql)||(c.poste||'').toLowerCase().includes(ql)):S.candidats).slice(0,8);
  candidatPickerSelIdx[fieldId]=0;
  const dd=document.getElementById(fieldId+'-dropdown');
  if(!dd) return;
  if(!results.length){
    dd.innerHTML=`<div class="candidat-picker-item" style="color:var(--text3);cursor:default">Aucun candidat trouvé</div>`;
    dd.classList.add('show');
    return;
  }
  dd.innerHTML=results.map((c,i)=>`<div class="candidat-picker-item${i===0?' sel':''}" onmousedown="candidatPickerChoose('${fieldId}','${c.id}')">
    <div style="font-weight:500">${esc(c.prenom)} ${esc(c.nom)}</div>
    <div style="font-size:11px;color:var(--text2)">${esc(c.poste||'')}${c.societe?' · '+esc(c.societe):''}</div>
  </div>`).join('');
  dd.classList.add('show');
}

function candidatPickerChoose(fieldId,candId){
  const c=S.candidats.find(x=>x.id===candId);
  if(!c) return;
  const hidden=document.getElementById(fieldId);
  if(hidden) hidden.value=candId;
  const search=document.getElementById(fieldId+'-search');
  if(search) search.value=`${c.prenom} ${c.nom}`;
  const dd=document.getElementById(fieldId+'-dropdown');
  if(dd) dd.classList.remove('show');
}

function candidatPickerKeydown(e,fieldId){
  const dd=document.getElementById(fieldId+'-dropdown');
  if(!dd||!dd.classList.contains('show')) return;
  const items=[...dd.querySelectorAll('.candidat-picker-item')];
  if(!items.length) return;
  let idx=candidatPickerSelIdx[fieldId]||0;
  if(e.key==='ArrowDown'){ e.preventDefault(); idx=(idx+1)%items.length; }
  else if(e.key==='ArrowUp'){ e.preventDefault(); idx=(idx-1+items.length)%items.length; }
  else if(e.key==='Enter'){ e.preventDefault(); items[idx].dispatchEvent(new MouseEvent('mousedown')); dd.classList.remove('show'); return; }
  else if(e.key==='Escape'){ dd.classList.remove('show'); return; }
  else return;
  items.forEach((it,i)=>it.classList.toggle('sel',i===idx));
  candidatPickerSelIdx[fieldId]=idx;
}

function del(list,id){
  const idx=S[list].findIndex(x=>x.id===id);
  if(idx===-1) return;
  const item=S[list][idx];
  S[list].splice(idx,1);
  saveData();closeModal();render();
  showToast('Supprimé', ()=>{ S[list].splice(idx,0,item); saveData(); render(); });
}

function exportBackup(){
  const data=JSON.stringify(S,null,2);

  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  const date=new Date().toISOString().slice(0,10);
  a.href=url;
  a.download=`ATS_sauvegarde_${date}.json`;
  a.click();
  URL.revokeObjectURL(url);
  // Toast
  const toast=document.createElement('div');
  toast.style.cssText='position:fixed;bottom:24px;right:24px;z-index:9999;background:#166534;color:#fff;border-radius:10px;padding:12px 18px;font-size:13px;font-weight:500;box-shadow:0 4px 16px rgba(0,0,0,.2)';
  toast.innerHTML=`✓ Sauvegarde téléchargée — ATS_sauvegarde_${date}.json`;
  document.body.appendChild(toast);
  setTimeout(()=>toast.remove(),4000);
}

function importBackup(input){
  const file=input.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const data=JSON.parse(e.target.result);
      if(!data.clients||!data.missions||!data.candidats){
        alert('Fichier invalide — ce n\'est pas une sauvegarde ATS.');
        return;
      }
      if(!confirm(`Restaurer la sauvegarde ?\n\nCela remplacera toutes vos données actuelles par :\n- ${data.clients.length} clients\n- ${data.missions.length} missions\n- ${data.candidats.length} candidats\n- ${data.actions?.length||0} actions\n\nCette action est irréversible.`))return;
      Object.assign(S,{
        clients:data.clients||[],
        missions:data.missions||[],
        candidats:data.candidats||[],
        pipeline:data.pipeline||[],
        actions:data.actions||[],
        rdvs:data.rdvs||[]
      });
      saveData();
      render();
      const toast=document.createElement('div');
      toast.style.cssText='position:fixed;bottom:24px;right:24px;z-index:9999;background:#166534;color:#fff;border-radius:10px;padding:12px 18px;font-size:13px;font-weight:500;box-shadow:0 4px 16px rgba(0,0,0,.2)';
      toast.innerHTML=`✓ Sauvegarde restaurée avec succès !`;
      document.body.appendChild(toast);
      setTimeout(()=>toast.remove(),4000);
    }catch(err){
      alert('Erreur lors de la lecture du fichier. Vérifiez que c\'est bien une sauvegarde ATS.');
    }
  };
  reader.readAsText(file);
  input.value='';
}

function renderAgenda(){

/* ── STATISTIQUES ── */
let statsPeriode='mois'; // 'semaine' | 'mois' | 'annee' | 'tout'
const PERIOD_LABELS={semaine:'Cette semaine (7 derniers jours)',mois:'Ce mois-ci (30 derniers jours)',annee:'Cette année (12 derniers mois)',tout:'Depuis le début'};

function getPeriodRange(periode){
  const now=new Date();
  let from=null;
  if(periode==='semaine') from=new Date(now.getTime()-7*86400000);
  else if(periode==='mois') from=new Date(now.getTime()-30*86400000);
  else if(periode==='annee') from=new Date(now.getTime()-365*86400000);
  return {from, to:now};
}
function dansPeriode(dateStr, range){
  if(!range.from) return true;
  if(!dateStr) return false;
  const d=new Date(dateStr);
  return d>=range.from && d<=range.to;
}

// Calcule toutes les données chiffrées pour une période donnée — utilisé à la fois
// par l'affichage (renderStats) et par le contexte envoyé à l'IA (computeStatsSummary)
function computeStatsData(periode){
  const range=getPeriodRange(periode);
  const missionsCloturees=S.missions.filter(m=>['Gagnée','Perdue','Annulée'].includes(m.statut)&&dansPeriode(m.dateCloture||m.dateCible,range));
  const msGagnees=missionsCloturees.filter(m=>m.statut==='Gagnée').length;
  const msPerdues=missionsCloturees.filter(m=>m.statut==='Perdue'||m.statut==='Annulée').length;
  const msTotal=missionsCloturees.length;
  const tauxGlobal=msTotal?Math.round(msGagnees/msTotal*100):0;
  const msEnCoursActuellement=S.missions.filter(m=>m.statut==='En cours').length;

  const tempsMoyen=(()=>{
    const times=missionsCloturees.filter(m=>m.statut==='Gagnée'&&m.dateOuv&&(m.dateCloture||m.dateCible)).map(m=>{
      const d=(new Date(m.dateCloture||m.dateCible)-new Date(m.dateOuv))/(1000*60*60*24);
      return d>0?d:null;
    }).filter(Boolean);
    return times.length?Math.round(times.reduce((a,b)=>a+b,0)/times.length):null;
  })();

  const parSecteur={};
  missionsCloturees.forEach(m=>{
    const cl=getClient(m.clientId);
    const s=cl.secteur||'Non défini';
    if(!parSecteur[s])parSecteur[s]={total:0,gagnees:0};
    parSecteur[s].total++;
    if(m.statut==='Gagnée')parSecteur[s].gagnees++;
  });

  const parClient={};
  missionsCloturees.forEach(m=>{
    if(!parClient[m.clientId])parClient[m.clientId]={total:0,gagnees:0};
    parClient[m.clientId].total++;
    if(m.statut==='Gagnée')parClient[m.clientId].gagnees++;
  });
  const topClients=Object.entries(parClient).sort((a,b)=>b[1].total-a[1].total).slice(0,5);

  const actionsPeriode=S.actions.filter(a=>dansPeriode(a.date,range));
  const parBucket={};
  actionsPeriode.forEach(a=>{
    if(!a.date) return;
    const key=(periode==='semaine'||periode==='mois')?a.date:a.date.slice(0,7);
    parBucket[key]=(parBucket[key]||0)+1;
  });
  let bucketsAffiches=Object.keys(parBucket).sort();
  if(periode==='tout') bucketsAffiches=bucketsAffiches.slice(-6);

  const candidatsAvecDate=S.candidats.filter(c=>c.dateAjout);
  const candidatsSansDate=S.candidats.length-candidatsAvecDate.length;
  const candidatsPourSource=periode==='tout'?S.candidats:candidatsAvecDate.filter(c=>dansPeriode(c.dateAjout,range));
  const parSource={};
  candidatsPourSource.forEach(c=>{
    const src=c.notes&&c.notes.includes('LinkedIn')?'LinkedIn':c.notes&&c.notes.includes('APEC')?'APEC':'Autre';
    parSource[src]=(parSource[src]||0)+1;
  });

  return {periode,range,msTotal,msGagnees,msPerdues,msEnCoursActuellement,tauxGlobal,tempsMoyen,parSecteur,topClients,parBucket,bucketsAffiches,parSource,candidatsSansDate};
}

function computeStatsSummary(periode){
  periode=periode||statsPeriode;
  const d=computeStatsData(periode);
  const topClientsTexte=d.topClients.map(([cid,dd])=>`${getClient(cid).nom} : ${dd.total} missions, ${dd.gagnees} gagnées`).join('\n');
  const activiteTexte=d.bucketsAffiches.map(k=>`${k} : ${d.parBucket[k]} actions`).join('\n');
  const sourceTexte=Object.entries(d.parSource).map(([s,n])=>`${s} : ${n}`).join('\n');

  return `Période analysée : ${PERIOD_LABELS[periode]}

Taux de succès (missions clôturées sur la période) : ${d.tauxGlobal}%
Missions gagnées : ${d.msGagnees} / Perdues : ${d.msPerdues} / Total clôturées sur la période : ${d.msTotal}
Missions actuellement en cours (indépendant de la période) : ${d.msEnCoursActuellement}
Temps moyen de placement : ${d.tempsMoyen?d.tempsMoyen+' jours':'donnée insuffisante'}

Par secteur (période) :
${Object.entries(d.parSecteur).map(([s,dd])=>`${s} : ${dd.total} missions, ${dd.gagnees} gagnées`).join('\n')||'Aucune donnée sur cette période'}

Meilleurs clients par volume (période) :
${topClientsTexte||'Aucune donnée sur cette période'}

Activité (actions loguées sur la période) :
${activiteTexte||'Aucune donnée sur cette période'}

Sources des candidats ajoutés sur la période :
${sourceTexte||'Aucune donnée sur cette période'}${d.candidatsSansDate>0?`\n(${d.candidatsSansDate} fiche(s) créée(s) avant le suivi de la date d'ajout, non comptabilisée(s) ici)`:''}`;
}

Si une donnée est insuffisante pour conclure (période trop courte, trop peu de missions clôturées...), dis-le clairement plutôt que d'inventer.`}]

async function matchingIA(missionId){
  if(!getApiKey()){ alert('Configurez d\'abord votre clé API Anthropic dans l\'onglet "Import CV (IA)".'); return; }
  const m=S.missions.find(x=>x.id===missionId);
  const cl=getClient(m.clientId);
  if(!S.candidats.length){ alert('Aucun candidat dans le vivier.'); return; }

  // Si appelé depuis l'accueil (pas de modale ouverte), ouvrir d'abord la fiche mission
  const footer=document.querySelector('#modal-ov .modal-footer');
  if(!footer){
    navFromHome('missions');
    setTimeout(()=>{ openMissionDetail(missionId); setTimeout(()=>matchingIA(missionId),300); },150);
    return;
  }
  const btn=footer.querySelector('.btn.primary');
  const origHtml=btn?.innerHTML||'Matching IA';
  if(btn){ btn.disabled=true; btn.innerHTML='<i class="ti ti-loader-2"></i> Analyse en cours…'; }

  const missionDesc=`Poste : ${m.poste}\nClient : ${cl.nom} (${m.ville||'ville non précisée'})\nSecteur : ${cl.secteur||'non précisé'}\nContrat : ${m.contrat||'non précisé'}\nRémunération : ${m.remun||'non précisée'}\nNotes : ${m.notes||'aucune'}`;

  // Mémoire de mission
  const mem=m.memory;
  let memoireDesc='';
  if(mem){
    if(mem.implicites&&mem.implicites.length) memoireDesc+=`\nCRITÈRES IMPLICITES DU CLIENT (non dits mais importants) :\n${mem.implicites.map(x=>'- '+x).join('\n')}`;
    if(mem.refus&&mem.refus.length) memoireDesc+=`\nPROFILS REFUSÉS PAR LE CLIENT :\n${mem.refus.map(x=>'- '+x).join('\n')}`;
    if(mem.objections&&mem.objections.length) memoireDesc+=`\nOBJECTIONS FRÉQUENTES DES CANDIDATS :\n${mem.objections.map(x=>'- '+x).join('\n')}`;
    if(mem.adn&&mem.adn.length) memoireDesc+=`\nADN DES BONS PROFILS (traits communs aux finalistes) :\n${mem.adn.map(x=>'- '+x).join('\n')}`;
  }

  // Mémoire client
  const climem=cl.memory;
  let clientMemDesc='';
  if(climem){
    if(climem.implicites&&climem.implicites.length) clientMemDesc+=`\nCE QUE LE CLIENT VEUT VRAIMENT (critères implicites) :\n${climem.implicites.map(x=>'- '+x).join('\n')}`;
    if(climem.style&&climem.style.length) clientMemDesc+=`\nSTYLE DE DÉCISION DU CLIENT :\n${climem.style.map(x=>'- '+x).join('\n')}`;
    if(climem.refus&&climem.refus.length) clientMemDesc+=`\nPROFILS QUE CE CLIENT REFUSE TOUJOURS :\n${climem.refus.map(x=>'- '+x).join('\n')}`;
    if(climem.preferences&&climem.preferences.length) clientMemDesc+=`\nPRÉFÉRENCES CACHÉES DU CLIENT :\n${climem.preferences.map(x=>'- '+x).join('\n')}`;
  }

  const actifs=S.candidats.filter(c=>c.statut==='Actif'||c.statut==='En process');
  if(!actifs.length){ btn.disabled=false; btn.innerHTML=origHtml; alert('Aucun candidat actif dans le vivier.'); return; }
  const candidatsDesc=actifs.map((c,i)=>
    `[${i+1}] ${c.prenom} ${c.nom} — ${c.poste||'?'} chez ${c.societe||'?'} — ${c.exp||'?'} ans exp — ${c.spe||'?'} — ${c.ville||'?'} — Mobilité: ${mobiliteLabel(c)} — Dispo: ${c.dispo||'?'}`
  ).join('\n');

  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':getApiKey(),'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({
        model:'claude-sonnet-4-6',
        max_tokens:1500,
        messages:[{role:'user',content:'Tu es un chasseur de têtes expert. Voici une mission et une liste de candidats. Sélectionne et classe les 5 meilleurs candidats pour cette mission. Pour chacun, donne un score sur 10 et une justification courte (2-3 phrases max).\n\nRÈGLE MOBILITÉ : La mission est à '+( m.ville||'ville non précisée')+'. Vérifie systématiquement si la mobilité de chaque candidat est compatible avec ce lieu. Un candidat non mobile sur cette ville doit être pénalisé dans son score.\n\nMISSION :\n'+missionDesc+(memoireDesc?'\n\nMÉMOIRE DE MISSION (tiens compte de ces éléments pour ajuster les scores) :'+memoireDesc:'')+(clientMemDesc?'\n\nMÉMOIRE CLIENT (ce qu\'on sait de ce client) :'+clientMemDesc:'')+'\n\nCANDIDATS DISPONIBLES :\n'+candidatsDesc+'\n\nRéponds en JSON uniquement, sans markdown, format exact : {"resultats":[{"rang":1,"nom":"Prénom Nom","score":8.5,"justification":"..."}]}'}]
      })
    });
    const data=await res.json();
    const text=data.content[0].text;
    let json;
    try{
      const cleaned=text.replace(/```json|```/g,'').trim();
      json=JSON.parse(cleaned);
    }catch(jsonErr){
      // Tentative d'extraction JSON avec regex
      const match=text.match(/\{[\s\S]*\}/);
      if(match) json=JSON.parse(match[0]);
      else throw new Error('Réponse IA invalide — réessayez');
    }

    const SCORE_STYLE=s=>s>=8?'background:var(--green-bg);color:var(--green-t)':s>=6?'background:var(--blue-bg);color:var(--blue-t)':'background:var(--amber-bg);color:var(--amber-t)';
    // Stocker les résultats et la mission pour le mailing
    window._matchingResultats=json.resultats;
    window._matchingMission=m;
    window._matchingActifs=actifs;

    const resultatsHtml=json.resultats.map(r=>`
      <div style="display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)">
        <div style="width:38px;height:38px;border-radius:50%;${SCORE_STYLE(r.score)};display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0">${r.score}</div>
        <div style="flex:1"><div style="font-weight:500;font-size:13px">${r.nom}</div>
        <div style="font-size:12px;color:var(--text2);margin-top:3px;line-height:1.5">${r.justification}</div></div>
      </div>`).join('');

    showModal(`<h3><i class="ti ti-sparkles" style="color:#f59e0b"></i> Matching IA — ${m.poste}</h3>
      <div style="font-size:12px;color:var(--text2);margin-bottom:12px">Top candidats de votre vivier pour cette mission · Score /10</div>
      ${resultatsHtml}
      <div class="modal-footer">
        <button class="btn primary" onclick="genererMailingMatching()"><i class="ti ti-mail"></i> Contacter les top candidats</button>
        <button class="btn" onclick="closeModal()">Fermer</button>
      </div>`);
  }catch(e){
    btn.disabled=false; btn.innerHTML=origHtml;
    alert('Erreur lors du matching : '+e.message);
  }
}


async function genererMailingMatching(){
  const resultats=window._matchingResultats;
  const m=window._matchingMission;
  const actifs=window._matchingActifs;
  if(!resultats||!m){ alert('Lancez d\'abord le matching IA.'); return; }

  // Afficher indicateur de chargement
  closeModal();
  const loading=document.createElement('div');
  loading.style.cssText='position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:9999;background:#fff;border-radius:12px;padding:28px 36px;box-shadow:0 8px 32px rgba(0,0,0,.2);font-size:14px;color:var(--text2);display:flex;align-items:center;gap:12px';
  loading.innerHTML='<i class="ti ti-loader-2" style="font-size:20px;animation:spin 1s linear infinite"></i> Génération des emails en cours…';
  document.body.appendChild(loading);

  try{
    // Pour chaque candidat du top, générer un email personnalisé
    const topCandidats=resultats.slice(0,5);
    const emails=[];

    for(const r of topCandidats){
      const cand=actifs.find(c=>(c.prenom+' '+c.nom)===r.nom || r.nom.includes(c.nom));
      if(!cand) continue;

      const res=await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{'Content-Type':'application/json','x-api-key':getApiKey(),'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
        body:JSON.stringify({
          model:'claude-sonnet-4-6',
          max_tokens:600,
          messages:[{role:'user',content:`Tu es un chasseur de têtes indépendant expert. Rédige un email de prise de contact professionnel et concis pour approcher ce candidat.

Candidat : ${cand.prenom} ${cand.nom}
Poste actuel : ${cand.poste||'?'} chez ${cand.societe||'?'}
Expérience : ${cand.exp||'?'} ans
Spécialisation : ${cand.spe||'?'}

Opportunité : ${m.poste} - confidentiel pour l'instant
Raison du contact : ${r.justification}

Règles strictes :
- Commence par "Bonjour M. [NOM]" ou "Bonjour Mme [NOM]" selon le prénom (utilise ton jugement sur le genre, et utilise le NOM de famille, pas le prénom)
- Ton sobre, professionnel et direct — pas de formules creuses type "j'espère que vous allez bien"
- 3 phrases maximum : accroche sur leur profil, opportunité en une ligne, invitation à échanger
- Pas de détails sur le client, l'opportunité est confidentielle
- Termine par "Seriez-vous disponible pour un échange de 15 minutes ?"
- Termine TOUJOURS par cette signature exacte sur 3 lignes séparées : "Bien cordialement," puis "Laurent NIEL" puis "Agile Recrutement"
- Réponds UNIQUEMENT avec le corps de l'email, rien d'autre`}]
        })
      });
      const data=await res.json();
      emails.push({
        cand,
        score:r.score,
        corps:data.content[0].text.trim()
      });
    }

    loading.remove();

    // Afficher tous les emails
    const emailsHtml=emails.map((e,i)=>`
      <div style="border:1px solid var(--border);border-radius:8px;padding:14px 16px;margin-bottom:12px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
          <div>
            <span style="font-weight:600;font-size:13px">${e.cand.prenom} ${e.cand.nom}</span>
            <span style="font-size:12px;color:var(--text2);margin-left:8px">${e.cand.email||'email non renseigné'}</span>
          </div>
          <div style="display:flex;gap:6px">
            ${e.cand.email
              ?`<a href="mailto:${e.cand.email}?subject=Opportunite confidentielle&body=${encodeURIComponent(e.corps)}" class="btn sm primary"><i class="ti ti-mail"></i> Ouvrir</a>`
              :e.cand.linkedin
                ?`<a href="${e.cand.linkedin}" target="_blank" class="btn sm" style="background:#0a66c2;color:#fff"><i class="ti ti-brand-linkedin"></i> Contacter sur LinkedIn</a>`
                :'<span style="font-size:11px;color:var(--text2)">Pas de contact</span>'
            }
            <button class="btn sm" onclick="navigator.clipboard.writeText(document.getElementById('ta${i}').value)"><i class="ti ti-copy"></i></button>
          </div>
        </div>
        <div>
          <textarea id="ta${i}" style="width:100%;border:none;background:var(--bg2);border-radius:6px;padding:10px;font-size:12px;color:var(--text);line-height:1.6;resize:vertical;min-height:100px;font-family:inherit">${e.corps}</textarea>
        </div>
      </div>`).join('');

    showModal(`<h3><i class="ti ti-mail" style="color:#0a66c2"></i> Emails — ${m.poste}</h3>
      <div style="font-size:12px;color:var(--text2);margin-bottom:14px">${emails.length} email(s) généré(s) · Modifiez si besoin puis cliquez "Ouvrir" pour envoyer</div>
      <div style="max-height:60vh;overflow-y:auto">${emailsHtml}</div>
      <div class="modal-footer"><button class="btn" onclick="closeModal()">Fermer</button></div>`);

  }catch(e){
    loading.remove();
    alert('Erreur : '+e.message);
  }
}

function cmdkBuildItems(q){
  const ql=(q||'').toLowerCase().trim();
  const items=[];
  const quick=[
    {label:'⚡ Que faire ?', run:()=>openActionEngine()},
    {label:'🎯 Plan de chasse', run:()=>ouvrirPlanDeChasseModal()},
    {label:'📊 Rapport mission', run:()=>ouvrirRapportMissionDepuisRecherche('')},
    {label:'🧠 Que ferais-tu à ma place ?', run:()=>{openActionEngine(); setTimeout(()=>queFeraistTu(),300);}},
    {label:'📋 Missions', run:()=>navFromHome('missions')},
    {label:'🏢 Clients', run:()=>navFromHome('clients')},
    {label:'👤 Candidats', run:()=>navFromHome('candidats')},
    {label:'🔄 Pipeline', run:()=>navFromHome('pipeline')},
    {label:'📞 Actions & CR', run:()=>navFromHome('actions')},
    {label:'📅 Agenda', run:()=>navFromHome('agenda')},
    {label:'📊 Statistiques', run:()=>navFromHome('stats')},
    {label:'📤 Import CV', run:()=>navFromHome('importcv')},
    {label:'⚙️ Paramètres', run:()=>openSettings()},
    {label:'➕ Nouveau candidat', run:()=>{navFromHome('candidats'); setTimeout(()=>openCandidatModal(),150);}},
    {label:'➕ Nouvelle mission', run:()=>{navFromHome('missions'); setTimeout(()=>openMissionModal(),150);}},
    {label:'➕ Nouveau client', run:()=>{navFromHome('clients'); setTimeout(()=>openClientModal(),150);}},
  ];
  quick.forEach(it=>{ if(!ql||it.label.toLowerCase().includes(ql)) items.push(it); });

  if(ql.length>=2){
    S.candidats.filter(c=>`${c.prenom} ${c.nom} ${c.poste} ${c.societe}`.toLowerCase().includes(ql)).slice(0,5)
      .forEach(c=>items.push({label:`👤 ${c.prenom} ${c.nom}`,sub:`${c.poste} · ${c.societe||''}`,run:()=>openCandidatDetail(c.id)}));
    S.missions.filter(m=>`${m.poste} ${getClient(m.clientId).nom}`.toLowerCase().includes(ql)).slice(0,5)
      .forEach(m=>items.push({label:`📋 ${m.poste}`,sub:getClient(m.clientId).nom,run:()=>{navFromHome('missions'); setTimeout(()=>openMissionDetail(m.id),150);}}));
    S.clients.filter(c=>c.nom.toLowerCase().includes(ql)).slice(0,5)
      .forEach(c=>items.push({label:`🏢 ${c.nom}`,sub:c.secteur||'',run:()=>{navFromHome('clients'); setTimeout(()=>openClientDetail(c.id),150);}}));
    items.push({label:`🔎 Exécuter « ${q} »`,sub:'commande libre / recherche',run:()=>homeSearchGo(q)});
  }
  return items;
}

function cmdkRender(q){
  cmdkItems=cmdkBuildItems(q);
  cmdkSelIndex=0;
  const box=document.getElementById('cmdk-results');
  if(!box) return;
  if(!cmdkItems.length){ box.innerHTML=`<div class="cmdk-empty">Aucun résultat</div>`; return; }
  box.innerHTML=cmdkItems.map((it,i)=>`
    <div class="cmdk-item${i===0?' sel':''}" onmousedown="cmdkExec(${i})">
      <span>${it.label}</span>${it.sub?`<span class="cmdk-sub">${esc(it.sub)}</span>`:''}
    </div>`).join('');
}

function cmdkExec(i){
  const it=cmdkItems[i];
  if(!it) return;
  cmdkClose();
  it.run();
}

function cmdkKeydown(e){
  if(e.key==='Escape'){ cmdkClose(); return; }
  if(e.key==='ArrowDown'){ e.preventDefault(); cmdkMove(1); return; }
  if(e.key==='ArrowUp'){ e.preventDefault(); cmdkMove(-1); return; }
  if(e.key==='Enter'){ e.preventDefault(); cmdkExec(cmdkSelIndex); return; }
}

function cmdkMove(delta){
  if(!cmdkItems.length) return;
  cmdkSelIndex=(cmdkSelIndex+delta+cmdkItems.length)%cmdkItems.length;
  document.querySelectorAll('#cmdk-results .cmdk-item').forEach((el,i)=>el.classList.toggle('sel', i===cmdkSelIndex));
  document.querySelector('#cmdk-results .cmdk-item.sel')?.scrollIntoView?.({block:'nearest'});
}
