<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ATS — Chasseur de têtes</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.0.0/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fff;--bg2:#f5f5f4;--bg3:#edede9;--text:#1a1a18;--text2:#6b6b63;--text3:#a0a098;
  --border:#e0dfd8;--border2:#d0cfc8;--blue-bg:#dbeafe;--blue-t:#1e40af;
  --green-bg:#dcfce7;--green-t:#166534;--amber-bg:#fef3c7;--amber-t:#92400e;
  --red-bg:#fee2e2;--red-t:#991b1b;--purple-bg:#ede9fe;--purple-t:#4c1d95;
  --teal-bg:#ccfbf1;--teal-t:#134e4a;--gray-bg:#f1f0eb;--gray-t:#4a4a44;
  --radius:8px;--radius-lg:12px;--shadow:0 1px 3px rgba(0,0,0,.08);
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;color:var(--text);background:var(--bg3)}
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:200px;min-width:200px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:12px 8px;gap:2px}
.sidebar-brand{font-size:13px;font-weight:600;color:var(--text);padding:8px 10px 14px;border-bottom:1px solid var(--border);margin-bottom:8px}
.sidebar-brand small{display:block;font-weight:400;color:var(--text2);font-size:11px}
.nav-btn{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--radius);border:none;background:transparent;color:var(--text2);cursor:pointer;font-size:13px;width:100%;text-align:left}
.nav-btn:hover{background:var(--bg3);color:var(--text)}
.nav-btn.active{background:var(--bg);color:var(--text);font-weight:500;border:1px solid var(--border)}
.nav-btn i{font-size:16px}
.main{flex:1;overflow:hidden;display:flex;flex-direction:column;background:var(--bg)}
.topbar{padding:12px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;min-height:52px;background:var(--bg)}
.topbar h2{font-size:15px;font-weight:500}
.btn{padding:6px 14px;border-radius:var(--radius);border:1px solid var(--border2);background:var(--bg);color:var(--text);cursor:pointer;font-size:13px;display:inline-flex;align-items:center;gap:6px}
.btn:hover{background:var(--bg2)}
.btn.primary{background:var(--text);color:var(--bg);border-color:var(--text)}
.btn.primary:hover{opacity:.85}
.btn.danger{color:#991b1b;border-color:#fca5a5}
.btn.sm{padding:4px 10px;font-size:12px}
.content{flex:1;overflow-y:auto;padding:16px 20px;background:var(--bg3)}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:12px}
.kpi{background:var(--bg);border-radius:var(--radius);padding:12px 14px;border:1px solid var(--border)}
.kpi-label{font-size:11px;color:var(--text2);margin-bottom:4px}
.kpi-val{font-size:22px;font-weight:500}
.kpi-val.blue{color:var(--blue-t)}
.kpi-val.green{color:var(--green-t)}
.card{background:var(--bg);border-radius:var(--radius-lg);border:1px solid var(--border);margin-bottom:12px;overflow:hidden}
.card-header{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;font-weight:500;font-size:13px;background:var(--bg2)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:9px 12px;font-size:11px;font-weight:500;color:var(--text2);border-bottom:1px solid var(--border);white-space:nowrap;background:var(--bg2)}
td{padding:9px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg2)}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500;white-space:nowrap}
.b-blue{background:var(--blue-bg);color:var(--blue-t)}
.b-green{background:var(--green-bg);color:var(--green-t)}
.b-amber{background:var(--amber-bg);color:var(--amber-t)}
.b-red{background:var(--red-bg);color:var(--red-t)}
.b-gray{background:var(--gray-bg);color:var(--gray-t)}
.b-purple{background:var(--purple-bg);color:var(--purple-t)}
.b-teal{background:var(--teal-bg);color:var(--teal-t)}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:200;animation:overlayFadeIn .15s ease-out}
.modal{background:var(--bg);border-radius:var(--radius-lg);padding:22px;width:520px;max-width:96vw;max-height:88vh;overflow-y:auto;border:1px solid var(--border);box-shadow:0 8px 32px rgba(0,0,0,.12);animation:modalPopIn .16s ease-out}
@keyframes overlayFadeIn{from{opacity:0}to{opacity:1}}
@keyframes modalPopIn{from{opacity:0;transform:scale(.97) translateY(4px)}to{opacity:1;transform:scale(1) translateY(0)}}
@keyframes contentFadeIn{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.content-fade{animation:contentFadeIn .16s ease-out}
#home-suggestions:not(:empty){animation:contentFadeIn .12s ease-out}
.modal h3{font-size:15px;font-weight:500;margin-bottom:16px}
.field{margin-bottom:12px}
.field label{display:block;font-size:12px;color:var(--text2);margin-bottom:4px;font-weight:500}
input,select,textarea{width:100%;padding:7px 10px;border:1px solid var(--border2);border-radius:var(--radius);font-size:13px;font-family:inherit;background:var(--bg);color:var(--text)}
input:focus,select:focus,textarea:focus{outline:none;border-color:#93c5fd}
textarea{resize:vertical;min-height:80px;line-height:1.5}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:16px;padding-top:14px;border-top:1px solid var(--border)}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.link-btn{background:none;border:none;color:var(--blue-t);cursor:pointer;font-size:13px;padding:0;text-align:left;font-family:inherit}
.link-btn:hover{text-decoration:underline}
.row-actions{display:flex;gap:4px;opacity:0}
tr:hover .row-actions{opacity:1}
.info-row{display:flex;justify-content:space-between;align-items:flex-start;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px;gap:12px}
.info-row:last-child{border-bottom:none}
.info-label{color:var(--text2);white-space:nowrap;min-width:100px}
.info-val{text-align:right;word-break:break-word}
.cr-item{padding:12px 0;border-bottom:1px solid var(--border)}
.cr-item:last-child{border-bottom:none}
.cr-meta{display:flex;gap:8px;align-items:center;margin-bottom:5px;flex-wrap:wrap}
.cr-text{font-size:13px;color:var(--text2);line-height:1.6}
.cr-next{font-size:12px;color:var(--blue-t);margin-top:4px}
.empty{text-align:center;padding:28px 16px;color:var(--text3);font-size:13px}
.avatar{width:38px;height:38px;border-radius:50%;background:var(--blue-bg);display:flex;align-items:center;justify-content:center;font-weight:500;font-size:13px;color:var(--blue-t);flex-shrink:0}
.detail-header{display:flex;align-items:center;gap:12px;margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid var(--border)}
.search-bar{display:flex;gap:10px;margin-bottom:14px;align-items:center}
.search-bar input{flex:1;padding:9px 14px;font-size:14px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--bg)}
.search-bar input:focus{outline:none;border-color:#93c5fd}
.filter-chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.chip{padding:4px 12px;border-radius:20px;font-size:12px;border:1px solid var(--border2);background:var(--bg);cursor:pointer;color:var(--text2)}
.chip:hover{background:var(--bg2)}
.chip.on{background:var(--text);color:var(--bg);border-color:var(--text)}
.result-count{font-size:12px;color:var(--text2);margin-bottom:10px}
.highlight{background:#fef08a;border-radius:2px;padding:0 1px}
.mem-tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:12px}
.mem-tab{padding:7px 16px;border:none;background:none;cursor:pointer;font-size:12px;color:var(--text2);border-bottom:2px solid transparent;margin-bottom:-1px}
.mem-tab.active{color:var(--text);border-bottom-color:var(--text);font-weight:500}
.mem-section{display:none}.mem-section.active{display:block}
.mem-entry{display:flex;align-items:flex-start;gap:8px;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px}
.mem-entry:last-child{border-bottom:none}
.mem-entry-text{flex:1;line-height:1.5}
.mem-del{background:none;border:none;color:var(--text3);cursor:pointer;font-size:14px;padding:0 2px;flex-shrink:0;line-height:1}
.mem-del:hover{color:#991b1b}
.mem-add{display:flex;gap:6px;margin-top:10px}
.mem-add input{flex:1;padding:6px 10px;border:1px solid var(--border2);border-radius:var(--radius);font-size:12px}
.mem-add button{padding:6px 12px;border-radius:var(--radius);border:1px solid var(--border2);background:var(--bg);cursor:pointer;font-size:12px;white-space:nowrap}
.mem-add button:hover{background:var(--bg2)}
.mem-badge{display:inline-block;width:18px;height:18px;border-radius:50%;font-size:10px;font-weight:600;display:inline-flex;align-items:center;justify-content:center;margin-left:4px}
.action-engine-btn{background:var(--text)!important;color:var(--bg)!important;font-weight:600!important;border-radius:var(--radius)!important;margin-bottom:2px}
.action-engine-btn:hover{opacity:.9!important}
.ae-section{margin-bottom:14px}
.ae-section-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--text2);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.ae-item{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border-radius:var(--radius);margin-bottom:6px;cursor:pointer;border:1px solid transparent}
.ae-item:hover{border-color:var(--border2)}
.ae-item.urgent{background:#fff1f2;border-color:#fecdd3}
.ae-item.semaine{background:#fffbeb;border-color:#fde68a}
.ae-item.ok{background:#f0fdf4;border-color:#bbf7d0}
.ae-item-icon{font-size:16px;flex-shrink:0;margin-top:1px}
.ae-item-body{flex:1}
.ae-item-title{font-size:13px;font-weight:500;color:var(--text);line-height:1.4}
.ae-item-sub{font-size:11px;color:var(--text2);margin-top:2px}
.ae-empty{text-align:center;padding:20px;color:var(--text2);font-size:13px}
@keyframes briefingIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.ae-item.client{background:#eff6ff;border-color:#bfdbfe}
.ae-item.opportunite{background:#faf5ff;border-color:#e9d5ff}
.sourcing-tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:16px}
.stab{padding:8px 20px;border:none;background:none;cursor:pointer;font-size:13px;color:var(--text2);border-bottom:2px solid transparent;margin-bottom:-1px}
.stab.active{color:var(--text);border-bottom-color:var(--text);font-weight:500}
.sourcing-frame{width:100%;height:calc(100vh - 200px);border:none;border-radius:var(--radius);background:var(--bg2)}
.sourcing-hint{background:var(--amber-bg);border:1px solid #fde68a;border-radius:var(--radius);padding:10px 14px;font-size:12px;color:var(--amber-t);margin-bottom:12px;display:flex;align-items:flex-start;gap:8px}
.import-banner{background:var(--green-bg);border:1px solid #86efac;border-radius:var(--radius);padding:10px 14px;font-size:13px;color:var(--green-t);margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.tag-filter{padding:4px 10px;border-radius:var(--radius);border:1px solid var(--border2);font-size:12px;background:var(--bg);color:var(--text)}
/* MODE ACCUEIL GOOGLE */
.app.home-mode .sidebar{display:none}
.app.home-mode .topbar{display:none}
.app.home-mode .content{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;padding:0 20px;background:var(--bg)}
.home-logo{text-align:center;margin-bottom:28px}
.home-logo-casimir{font-size:72px;font-weight:800;letter-spacing:-3px;background:linear-gradient(135deg,#1e3a8a 0%,#4f46e5 40%,#7c3aed 70%,#a855f7 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;margin-bottom:0}
.home-logo-tagline{font-size:12px;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;margin-top:4px}
.home-logo-dot{display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--text3);margin:0 8px;vertical-align:middle}
.home-logo h1{font-size:36px;font-weight:700;letter-spacing:-1px;color:var(--text);margin-bottom:4px}
.home-logo p{font-size:14px;color:var(--text2)}
.home-search-wrap{width:100%;max-width:580px;margin-bottom:20px}
.home-search-box{display:flex;align-items:center;gap:10px;padding:13px 20px;border:1px solid var(--border2);border-radius:40px;background:var(--bg);box-shadow:0 1px 6px rgba(0,0,0,.06);transition:all .2s}
.home-search-box:focus-within{box-shadow:0 4px 24px rgba(79,70,229,.12);border-color:#c7d2fe}
.home-search-box input{flex:1;border:none;outline:none;font-size:15px;background:transparent;color:var(--text)}
.home-search-box input::placeholder{color:var(--text3)}
.home-mic-btn{background:none;border:none;cursor:pointer;font-size:18px;padding:0;line-height:1;flex-shrink:0;opacity:.5;transition:opacity .15s}
.home-mic-btn:hover{opacity:.9}
.home-mic-btn.listening{opacity:1;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.btn.listening{background:var(--red-bg);color:var(--red-t);border-color:var(--red-t);animation:pulse 1s infinite}
.home-quick{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;max-width:580px}
.home-quick-btn{padding:8px 16px;border-radius:20px;border:1px solid var(--border);background:var(--bg);cursor:pointer;font-size:12px;color:var(--text2);display:flex;align-items:center;gap:5px;transition:all .15s}
.home-quick-btn:hover{background:var(--bg2);color:var(--text);border-color:var(--border)}
.home-quick-btn.alert{border-color:#fca5a5;color:#dc2626;background:#fff1f2}
.home-suggestions{width:100%;max-width:620px;margin-top:8px;background:var(--bg);border:1px solid var(--border2);border-radius:16px;overflow:hidden;box-shadow:0 4px 16px rgba(0,0,0,.08)}
.home-sugg-item{padding:10px 18px;cursor:pointer;font-size:13px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)}
.home-sugg-item:last-child{border-bottom:none}
.home-sugg-item:hover{background:var(--bg2)}
.home-sugg-predict{padding:9px 18px;font-size:12px;color:var(--blue-t);font-style:italic;border-bottom:1px solid var(--border);background:var(--blue-bg)}
.home-search-ghost{position:absolute;inset:0;display:flex;align-items:center;pointer-events:none;font-size:15px;color:var(--text3);opacity:0;transition:opacity .25s ease;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.home-cmdk-hint{font-size:10px;color:var(--text3);margin-top:10px;text-align:center;cursor:pointer;transition:color .15s}
.home-cmdk-hint:hover{color:var(--text2)}
.home-cmdk-hint kbd{background:var(--bg2);border:1px solid var(--border2);border-radius:4px;padding:1px 5px;font-family:inherit;font-size:10px}
.toast-container{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:500;display:flex;flex-direction:column;gap:8px;align-items:center}
.toast{background:var(--text);color:var(--bg);padding:10px 18px;border-radius:10px;font-size:13px;display:flex;align-items:center;gap:16px;box-shadow:0 4px 20px rgba(0,0,0,.2);animation:toastIn .18s ease-out}
.toast button{background:none;border:none;color:inherit;font-weight:600;cursor:pointer;font-size:13px;text-decoration:underline;padding:0;opacity:.9}
.toast button:hover{opacity:1}
@keyframes toastIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.cmdk-overlay{position:fixed;inset:0;background:rgba(0,0,0,.42);display:flex;align-items:flex-start;justify-content:center;padding-top:12vh;z-index:400;animation:overlayFadeIn .12s ease-out}
.cmdk-box{width:560px;max-width:92vw;max-height:62vh;background:var(--bg);border-radius:14px;box-shadow:0 16px 56px rgba(0,0,0,.28);overflow:hidden;display:flex;flex-direction:column;animation:modalPopIn .14s ease-out}
.cmdk-input-wrap{display:flex;align-items:center;gap:10px;padding:16px 18px;border-bottom:1px solid var(--border)}
.cmdk-input-wrap i{color:var(--text3);font-size:18px;flex-shrink:0}
.cmdk-input-wrap input{flex:1;border:none;outline:none;font-size:16px;background:transparent;color:var(--text)}
.cmdk-results{overflow-y:auto;padding:6px}
.cmdk-item{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:10px 14px;border-radius:8px;cursor:pointer;font-size:13px}
.cmdk-item.sel,.cmdk-item:hover{background:var(--bg2)}
.cmdk-sub{color:var(--text2);font-size:11px;flex-shrink:0}
.cmdk-empty{padding:16px 18px;font-size:12px;color:var(--text3);text-align:center}
.cmdk-hint{padding:8px 14px;font-size:11px;color:var(--text3);border-top:1px solid var(--border);text-align:center}
.entstep-col{transition:background .12s}
.entstep-col.dragover{background:var(--blue-bg)}
.entstep-chip{cursor:grab}
.entstep-chip:active{cursor:grabbing}
.pipeline-row-drag{cursor:grab}
.pipeline-row-drag:active{cursor:grabbing}
.cv-dropzone{border:2px dashed var(--border2);border-radius:var(--radius);padding:16px;text-align:center;font-size:13px;color:var(--text2);cursor:pointer;transition:background .12s,border-color .12s}
.cv-dropzone.dragover{background:var(--blue-bg);border-color:var(--blue-t)}
.cv-dropzone-file{display:flex;align-items:center;justify-content:space-between;background:var(--bg2);border-radius:var(--radius);padding:10px 14px;font-size:13px}
.candidat-picker{position:relative}
.candidat-picker-dropdown{position:absolute;top:100%;left:0;right:0;background:var(--bg);border:1px solid var(--border2);border-radius:10px;margin-top:4px;max-height:220px;overflow-y:auto;box-shadow:0 6px 20px rgba(0,0,0,.12);z-index:250;display:none}
.candidat-picker-dropdown.show{display:block}
.candidat-picker-item{padding:8px 12px;cursor:pointer;font-size:13px}
.candidat-picker-item.sel,.candidat-picker-item:hover{background:var(--bg2)}
.home-greeting{font-size:13px;color:var(--text2);text-align:center;margin-bottom:20px}
.dropzone{border:2px dashed var(--border2);border-radius:var(--radius-lg);padding:32px;text-align:center;cursor:pointer;transition:background .15s}
.dropzone:hover,.dropzone.drag{background:var(--bg2);border-color:#93c5fd}
.api-key-banner{background:var(--amber-bg);border:1px solid #fde68a;border-radius:var(--radius);padding:12px 14px;font-size:13px;color:var(--amber-t);margin-bottom:14px}
.api-key-banner input{margin-top:8px}
</style>
</head>
<body>
<div class="app">
  <nav class="sidebar">
    <div class="sidebar-brand" onclick="nav('dashboard',null);document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'))" style="cursor:pointer;background:linear-gradient(135deg,#1e3a8a,#7c3aed);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;font-weight:800;font-size:18px">Casimir<small style="-webkit-text-fill-color:var(--text2);font-weight:400;font-size:11px;display:block;margin-top:-2px">Chasseur de têtes</small></div>
    <button class="nav-btn" style="background:var(--text);color:var(--bg);font-weight:600;margin-bottom:4px" onclick="nav('recherche',this)"><i class="ti ti-search"></i>Recherche candidat</button>
    <button class="nav-btn" onclick="nav('clients',this)"><i class="ti ti-building"></i>Clients</button>
    <button class="nav-btn" onclick="nav('missions',this)"><i class="ti ti-briefcase"></i>Missions</button>
    <div style="height:1px;background:var(--border);margin:6px 0"></div>
    <button class="nav-btn action-engine-btn" onclick="openActionEngine()"><i class="ti ti-bolt"></i>⚡ Que faire ?</button>
    <div style="height:1px;background:var(--border);margin:6px 0"></div>
    <button class="nav-btn active" onclick="nav('dashboard',this)"><i class="ti ti-home"></i>Accueil</button>
    <button class="nav-btn" onclick="nav('candidats',this)"><i class="ti ti-users"></i>Candidats</button>
    <button class="nav-btn" onclick="nav('pipeline',this)"><i class="ti ti-git-merge"></i>Pipeline</button>
    <button class="nav-btn" onclick="nav('actions',this)"><i class="ti ti-phone"></i>Actions & CR</button>
    <div style="margin-top:auto;padding-top:8px;border-top:1px solid var(--border)">
      <button class="nav-btn" onclick="nav('recherche',this)"><i class="ti ti-search"></i>Recherche</button>
      <button class="nav-btn" onclick="nav('agenda',this)"><i class="ti ti-calendar"></i>Agenda</button>
      <button class="nav-btn" onclick="nav('stats',this)"><i class="ti ti-chart-bar"></i>Statistiques</button>

const STORAGE_KEY = 'ats_chasseur_tetes_v2';

function loadData() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      const parsed = JSON.parse(saved);
      // Migration : convertit les anciens champs interlocuteur/fonction/email/tel
      // en tableau contacts[] pour la rétrocompatibilité avec les données existantes
      const clients = (parsed.clients || DEFAULT_DATA.clients).map(c => {
        if (!c.contacts) {
          c.contacts = [];
          if (c.interlocuteur) {
            c.contacts.push({
              id: uid('CT'),
              nom: c.interlocuteur || '',
              fonction: c.fonction || '',
              email: c.email || '',
              tel: c.tel || '',
              linkedin: '',
              notes: ''
            });
          }
        }
        return c;
      });
      return {
        clients,
        missions: parsed.missions || DEFAULT_DATA.missions,
        candidats: parsed.candidats || DEFAULT_DATA.candidats,
        pipeline: parsed.pipeline || DEFAULT_DATA.pipeline,
        actions: parsed.actions || DEFAULT_DATA.actions,
        rdvs: parsed.rdvs || DEFAULT_DATA.rdvs,
      };
    }
  } catch(e) { console.warn('Erreur chargement données:', e); }
  return JSON.parse(JSON.stringify(DEFAULT_DATA));
}

function computeActionData(){
  const today=new Date();
  const todayStr=today.toISOString().slice(0,10);

  const urgents=[];
  const semaine=[];
  const ok=[];
  const abandon=[];

  // 1. Actions "À faire" non réalisées en retard
  S.actions.filter(a=>!a.realise).forEach(a=>{
    const cand=S.candidats.find(x=>x.id===a.candidatId);
    const nom=cand?`${cand.prenom} ${cand.nom}`:'Candidat inconnu';
    const mission=a.missionId?S.missions.find(x=>x.id===a.missionId):null;
    const daysLate=a.datePro?Math.floor((today-new Date(a.datePro))/86400000):null;
    if(daysLate!==null && daysLate>0){
      urgents.push({icon:'📞',title:`${verbeAction(a.type)} ${nom}`,sub:`En retard de ${daysLate} jour${daysLate>1?'s':''}${mission?' · '+mission.poste:''}`,action:`openCandidatDetail('${a.candidatId}')`,cat:'candidat'});
    } else {
      semaine.push({icon:'📋',title:`${verbeAction(a.type)} ${nom}`,sub:`Prévu${a.datePro?' le '+new Date(a.datePro).toLocaleDateString('fr-FR'):''}${mission?' · '+mission.poste:''}`,action:`openCandidatDetail('${a.candidatId}')`,cat:'candidat'});
    }
  });

  // 2. Candidats en pipeline sans CR depuis 7+ jours
  S.pipeline.forEach(p=>{
    if(['Refusé','Abandonné','Retenu'].includes(p.etape)) return;
    const actsP=S.actions.filter(a=>a.candidatId===p.candidatId&&a.missionId===p.missionId&&a.realise);
    const lastAct=actsP.sort((a,b)=>b.date.localeCompare(a.date))[0];
    const daysSince=lastAct?Math.floor((today-new Date(lastAct.date))/86400000):null;
    if(daysSince!==null && daysSince>=7){
      const cand=S.candidats.find(x=>x.id===p.candidatId);
      const mission=S.missions.find(x=>x.id===p.missionId);
      const nom=cand?`${cand.prenom} ${cand.nom}`:'?';
      const poste=mission?mission.poste:'?';
      const arr=(daysSince>=14?urgents:semaine);
      arr.push({icon:'⏰',title:`Relance ${nom}`,sub:`${daysSince}j sans contact · ${p.etape} · ${poste}`,action:`openCandidatDetail('${p.candidatId}')`,cat:'candidat'});
    }
  });

  // 3. Missions en cours sans candidat — ou à l'inverse, mortes depuis longtemps → à abandonner
  S.missions.filter(m=>m.statut==='En cours').forEach(m=>{
    const cl=getClient(m.clientId);
    const pipelineActif=S.pipeline.filter(p=>p.missionId===m.id&&!['Refusé','Abandonné'].includes(p.etape));
    const actsM=S.actions.filter(a=>a.missionId===m.id).sort((a,b)=>(b.date||'').localeCompare(a.date||''));
    const lastAct=actsM[0];
    const daysSinceMission=lastAct?Math.floor((today-new Date(lastAct.date))/86400000):null;

    if(pipelineActif.length===0 && daysSinceMission!==null && daysSinceMission>=21){
      abandon.push({icon:'🗑️',title:`Oublie ${m.poste} — ${cl.nom} ?`,sub:`Aucun mouvement depuis ${daysSinceMission}j, pipeline vide. Clôture ou mets en pause.`,action:`openMissionDetail('${m.id}')`,cat:'abandon'});
    } else if(pipelineActif.length===0 && daysSinceMission===null){
      abandon.push({icon:'🗑️',title:`Oublie ${m.poste} — ${cl.nom} ?`,sub:`Jamais aucune activité enregistrée. À sourcer ou à clôturer.`,action:`openMissionDetail('${m.id}')`,cat:'abandon'});
    } else if(pipelineActif.length===0){
      urgents.push({icon:'🔍',title:`Trouve des candidats pour ${m.poste}`,sub:`${cl.nom} · Pipeline vide`,action:`openMissionDetail('${m.id}')`,cat:'mission'});
    } else if(pipelineActif.length<2){
      semaine.push({icon:'➕',title:`Renforce le pipeline — ${m.poste}`,sub:`${cl.nom} · Seulement ${pipelineActif.length} candidat`,action:`openMissionDetail('${m.id}')`,cat:'mission'});
    } else {
      ok.push({icon:'✅',title:`${m.poste} — ${cl.nom}`,sub:`${pipelineActif.length} candidats en cours`,action:`openMissionDetail('${m.id}')`,cat:'mission'});
    }
  });

  // 4. RDV aujourd'hui ou demain
  const demainStr=new Date(today.getTime()+86400000).toISOString().slice(0,10);
  S.rdvs.filter(r=>r.date===todayStr||r.date===demainStr).forEach(r=>{
    const label=r.date===todayStr?"Aujourd'hui":'Demain';
    urgents.push({icon:'📅',title:`Va à : ${r.titre}`,sub:`${label} à ${r.heure}${r.lieu?' · '+r.lieu:''}`,action:'',cat:'rdv'});
  });

  // 5. Clients sans contact depuis 14+ jours (missions en cours)
  const clientsARelancer=[];
  const clientIdsActifs=[...new Set(S.missions.filter(m=>m.statut==='En cours').map(m=>m.clientId))];
  clientIdsActifs.forEach(clientId=>{
    const cl=getClient(clientId);
    if(!cl) return;
    const crClient=S.actions.filter(a=>a.clientId===clientId).sort((a,b)=>b.date.localeCompare(a.date));
    const lastAct=crClient[0];
    const daysSince=lastAct?Math.floor((today-new Date(lastAct.date))/86400000):null;
    if(daysSince===null || daysSince>=14){
      const nbMissions=S.missions.filter(m=>m.clientId===clientId&&m.statut==='En cours').length;
      clientsARelancer.push({icon:'🏢',title:`Relance ${cl.nom}`,sub:daysSince===null?`Jamais contacté · ${nbMissions} mission${nbMissions>1?'s':''} en cours`:`${daysSince}j sans contact · ${nbMissions} mission${nbMissions>1?'s':''} en cours`,action:`openClientDetail('${clientId}')`,cat:'client'});
    }
  });

  // 6. Opportunités — candidats en phase avancée ou décision positive → action précise, pas juste un statut
  const opportunites=[];
  S.pipeline.filter(p=>['Offre','Entretien client'].includes(p.etape)||p.decClient==='Positif').forEach(p=>{
    const cand=S.candidats.find(x=>x.id===p.candidatId);
    const mission=S.missions.find(x=>x.id===p.missionId);
    if(!cand||!mission) return;
    const cl=getClient(mission.clientId);
    const nom=`${cand.prenom} ${cand.nom}`;
    let title;
    if(p.etape==='Offre') title=`Finalise l'offre de ${nom}`;
    else if(p.etape==='Entretien client') title=`Débriefe l'entretien de ${nom}`;
    else title=`Pousse ${nom} vers la suite`;
    opportunites.push({icon:'🎯',title,sub:`${mission.poste} · ${cl.nom}${p.decClient==='Positif'?' · Client positif':''}`,action:`openCandidatDetail('${p.candidatId}')`,cat:'opportunite'});
  });

  // 7. Candidats oubliés — matching proactif toutes missions actives confondues (pure logique, sans IA)
  const oublies=[];
  S.missions.filter(m=>m.statut==='En cours').forEach(m=>{
    const cl=getClient(m.clientId);
    const trouves=candidatsOubliesPourMission(m.id);
    if(trouves.length) oublies.push({icon:'🔎',title:`${trouves.length} candidat${trouves.length>1?'s':''} oublié${trouves.length>1?'s':''} pour ${m.poste}`,sub:`${cl.nom} · déjà dans votre vivier, jamais proposés sur cette mission`,action:`openMissionDetail('${m.id}')`,cat:'oublie',nb:trouves.length});
  });

  return {urgents,semaine,ok,clientsARelancer,opportunites,abandon,oublies};
}

function openActionEngine(){
  const today=new Date();
  const {urgents,semaine,ok,clientsARelancer,opportunites,abandon,oublies}=computeActionData();

  function renderItems(items){
    if(!items.length) return '';

      <span class="ae-item-icon">${it.icon}</span>
      <div class="ae-item-body"><div class="ae-item-title">${it.title}</div><div class="ae-item-sub">${it.sub}</div></div>
    </div>`).join('');
  }

  const totalActions=urgents.length+semaine.length+ok.length+clientsARelancer.length+opportunites.length+abandon.length+oublies.length;

  // La priorité n°1, décidée par le logiciel : le premier urgent, sinon le premier client à relancer, sinon la première opportunité, sinon rien
  const priorite1=urgents[0]||clientsARelancer[0]||opportunites[0]||semaine[0]||null;

  showModal(`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
    <div><h3 style="margin:0">⚡ Que faire aujourd'hui ?</h3><div style="font-size:12px;color:var(--text2);margin-top:2px">${today.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'})}</div></div>

function buildAssocieContext(){
  const today=new Date().toISOString().slice(0,10);

  const missionsDetail=S.missions.filter(m=>m.statut==='En cours').map(m=>{
    const cl=getClient(m.clientId);
    const nb=S.pipeline.filter(p=>p.missionId===m.id).length;
    const mem=m.memory;
    const memStr=mem&&(mem.implicites?.length||mem.adn?.length)?
      ` [Mémoire mission: ${[...(mem.implicites||[]),...(mem.adn||[])].slice(0,2).join(', ')}]`:'';
    const climem=cl.memory;
    const climemStr=climem&&(climem.implicites?.length||climem.style?.length)?
      ` [Mémoire client: ${[...(climem.implicites||[]),...(climem.style||[])].slice(0,2).join(', ')}]`:'';
    return`- ${m.poste} / ${cl.nom} / ${nb} candidat(s) / cible: ${m.dateCible||'?'}${memStr}${climemStr}`;
  }).join('\n');

  const pipelineDetail=S.pipeline.map(p=>{
    const cand=S.candidats.find(x=>x.id===p.candidatId);
    const mission=S.missions.find(x=>x.id===p.missionId);
    const cl=mission?getClient(mission.clientId):{nom:'?'};
    const actsP=S.actions.filter(a=>a.candidatId===p.candidatId&&a.realise).sort((a,b)=>b.date.localeCompare(a.date));
    const lastAct=actsP[0];
    const daysSince=lastAct?Math.floor((new Date()-new Date(lastAct.date))/86400000):'jamais contacté';
    const lastCR=lastAct?.cr?lastAct.cr.slice(0,80):'—';
    return`- ${cand?cand.prenom+' '+cand.nom:'?'} → ${mission?mission.poste:'?'} (${cl.nom}) / étape: ${p.etape} / dernier contact: ${daysSince}j / décision client: ${p.decClient} / décision candidat: ${p.decCand} / CR: ${lastCR}`;
  }).join('\n');

  const actionsEnRetard=S.actions.filter(a=>!a.realise&&a.datePro&&new Date(a.datePro)<new Date()).map(a=>{
    const cand=S.candidats.find(x=>x.id===a.candidatId);
    const days=Math.floor((new Date()-new Date(a.datePro))/86400000);
    return`- ${a.type} avec ${cand?cand.prenom+' '+cand.nom:'?'} — en retard de ${days}j`;
  }).join('\n');

  const msVides=S.missions.filter(m=>m.statut==='En cours'&&S.pipeline.filter(p=>p.missionId===m.id).length===0).map(m=>{
    const cl=getClient(m.clientId);
    return`- ${m.poste} / ${cl.nom} — pipeline vide`;
  }).join('\n');

  return `Tu es un associé senior en cabinet de chasse de têtes avec 20 ans d'expérience. Tu donnes un conseil franc, direct et actionnable à Laurent, chasseur de têtes indépendant.

Réponds EXACTEMENT dans ce format, avec ce style :

"Si j'étais toi...

1️⃣ [Action précise avec nom réel]
[Raison concrète en 1 phrase — probabilité ou enjeu chiffré si possible]

2️⃣ [Action précise]
[Raison]

...

📊 Sur le fond : [1 à 2 phrases maximum, uniquement si les statistiques de performance ci-dessous révèlent quelque chose d'actionnable — un secteur ou un client qui sous-performe, un délai de placement anormal, etc. Sinon, ne mets pas cette section.]"

Maximum 5 actions du jour. Cite les vrais noms de candidats, missions et clients. Sois direct comme un associé qui connait tous les dossiers. Tu peux aussi dire "je laisserais tomber X" ou "X n'est pas prioritaire" si le ROI est faible. Utilise des données précises (nombre de jours, étapes, décisions). La section "Sur le fond" est stratégique et distincte des actions du jour : ne la remplis que si les statistiques apportent un éclairage utile, ne force pas un commentaire s'il n'y a rien de solide à en dire.

Date aujourd'hui : ${today}

MISSIONS EN COURS :
${missionsDetail||'Aucune'}

PIPELINE COMPLET :
${pipelineDetail||'Vide'}

ACTIONS EN RETARD :
${actionsEnRetard||'Aucune'}

MISSIONS SANS CANDIDAT :
${msVides||'Aucune'}

STATISTIQUES GLOBALES DE PERFORMANCE :
${computeStatsSummary()}`;
}

function startGhostPlaceholder(){

  if(!ghost||!input) return;
  const original=input.dataset.op||input.placeholder;
  let i=0;

  const tick=()=>{
    if(document.activeElement===input||input.value){ hideGhost(); return; }
    hideGhost();
    setTimeout(()=>{

      input.placeholder='';

async function loadMeteo(ville){
  const el=document.getElementById('meteo-widget');
  if(!el) return;
  try{
    const geoRes=await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(ville)}&count=1&language=fr&format=json`);
    const geoData=await geoRes.json();
    if(!geoData.results?.length){ el.innerHTML=''; return; }
    const {latitude,longitude}=geoData.results[0];
    const meteoRes=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current=temperature_2m,weathercode&timezone=auto`);
    const meteoData=await meteoRes.json();
    const cur=meteoData.current;
    const temp=Math.round(cur.temperature_2m);
    const code=cur.weathercode;
    const meteoEmoji=code===0?'☀️':code<=2?'🌤️':code<=3?'⛅':code<=48?'🌫️':code<=67?'🌧️':code<=77?'❄️':code<=82?'🌦️':'⛈️';
    const meteoDesc=code===0?'Ensoleillé':code<=2?'Peu nuageux':code<=3?'Nuageux':code<=48?'Brumeux':code<=55?'Bruine':code<=67?'Pluie':code<=77?'Neige':code<=82?'Averses':'Orage';
    el.innerHTML=`${meteoEmoji} <strong>${ville}</strong> · ${temp}°C · ${meteoDesc}`;
  }catch(e){ if(el) el.innerHTML=''; }
}

function predireAction(q){
  if(!q||q.trim().length<3) return null;
  const ql=q.toLowerCase().trim();
  if(ql.includes('que ferais-tu')||ql.includes('que ferais tu')||ql.includes('à ma place')||ql.includes('a ma place')||ql.includes('si j\'étais toi')) return 'Ouvrir le conseil IA d\'associé';
  if(ql.includes('que faire')||ql.includes('priorité')||ql.includes('urgence')||ql.includes('quoi faire')) return 'Ouvrir ⚡ Que faire ?';
  if(ql.includes('pipeline')) return 'Ouvrir le Pipeline';
  if(ql.includes('agenda')||ql.includes('rendez-vous')||ql.includes('rdv')) return 'Ouvrir l\'Agenda';
  if(ql.includes('stats')||ql.includes('statistiques')) return 'Ouvrir les Statistiques';
  if(ql.includes('import cv')) return 'Ouvrir Import CV';
  if(ql.includes('paramètres')||ql.includes('settings')) return 'Ouvrir les Paramètres';
  if(/^(cr[ée]e?r?|créée?|nouveau|nouvelle|ajoute?r?|ajouter)\s/.test(ql)){
    if(ql.includes('client')||ql.includes('société')||ql.includes('societe')||ql.includes('entreprise')) return 'Créer une fiche client';
    if(ql.includes('mission')||ql.includes('poste')||ql.includes('job')) return 'Créer une mission';
    if(ql.includes('candidat')) return 'Créer un candidat';
  }
  const montreMatch=ql.match(/^(?:montre[- ]moi|ouvre|affiche)\s+(?:le|la|les|mon|ma|mes)?\s*(.+)$/);
  if(montreMatch){
    const cible=montreMatch[1];
    const cand=S.candidats.find(c=>`${c.prenom} ${c.nom}`.toLowerCase().includes(cible));
    if(cand) return `Ouvrir la fiche de ${cand.prenom} ${cand.nom}`;
    const mission=S.missions.find(m=>m.poste.toLowerCase().includes(cible));
    if(mission) return `Ouvrir la mission ${mission.poste}`;
    const client=S.clients.find(c=>c.nom.toLowerCase().includes(cible));
    if(client) return `Ouvrir la fiche ${client.nom}`;
  }
  if(/^(trouve[- ]?moi|cherche[- ]?moi)\s/.test(ql)) return 'Rechercher / matcher un profil';
  const candDirect=S.candidats.find(c=>ql.includes(`${c.prenom} ${c.nom}`.toLowerCase()));
  if(candDirect) return `${candDirect.prenom} ${candDirect.nom} — ouvrir la fiche`;
  return null;
}

  if(ghost) ghost.style.opacity='0';
  if(!sug) return;
  if(q.length<2){ sug.innerHTML=''; return; }

  const parsed=parseQuery(q);
  const hits=S.candidats.filter(c=>matchCandidatIntelligent(c,parsed)).slice(0,5);
  const missHits=S.missions.filter(m=>m.poste.toLowerCase().includes(q.toLowerCase())||getClient(m.clientId).nom.toLowerCase().includes(q.toLowerCase())).slice(0,3);
  const prediction=predireAction(q);

  if(!hits.length&&!missHits.length&&!prediction){ sug.innerHTML=''; return; }

  sug.innerHTML=`<div class="home-suggestions">
    ${prediction?`<div class="home-sugg-predict">→ ${esc(prediction)}</div>`:''}
    ${hits.map(c=>`<div class="home-sugg-item" onclick="openCandidatDetail('${c.id}')">

    </div>`).join('')}
    ${missHits.map(m=>`<div class="home-sugg-item" onclick="openMissionDetail('${m.id}')">
      <span style="font-size:16px">📋</span>
      <div><div style="font-weight:500">${esc(m.poste)}</div><div style="font-size:11px;color:var(--text2)">${getClient(m.clientId).nom} · ${m.ville}</div></div>
    </div>`).join('')}
    <div class="home-sugg-item" onclick="homeSearchGo('${q.replace(/'/g,"\\'")}')">
      <span style="font-size:16px">🔍</span>
      <div style="color:var(--text2)">Voir tous les résultats pour "<strong>${esc(q)}</strong>"</div>

  </div>`;

function homeSearchGo(q){
  if(!q.trim()) return;
  const ql=q.toLowerCase().trim();

  // ── Commandes d'action (priorité maximale, avant toute règle de navigation/recherche) ──
  if(detecterNumeroEntretien(q)!==null){ commandeEntretienNaturel(q); return; }

  const marqueMatch=q.match(/^marque\s+(.+?)\s+comme\s+(placé[e]?|retenu[e]?|refusé[e]?|en process|inactif|en veille)\s*(?:chez|pour)?\s*(.*)$/i);
  if(marqueMatch){ commandeMarquerStatut(marqueMatch[1].trim(),marqueMatch[2].trim(),(marqueMatch[3]||'').trim()); return; }

  const rdvNaturelMatch=q.match(/^(?:peux[- ]?tu\s+|pourrais[- ]?tu\s+|est-ce que tu peux\s+)?(?:me\s+)?(?:prends?|prendre|planifie|planifier|programme|programmer|fixe|fixer|cr[ée]e?r?|ajoute[r]?)\s+(?:un\s+|le\s+)?(?:rdv|rendez-vous)\s+avec\s+(.+?)\s+((?:lundi|mardi|mercredi|jeudi|vendredi|samedi|dimanche|demain|après-demain|apres-demain|aujourd'hui|dans\s+|le\s+|à\s+|\d{1,2}[\/\-]).*)$/i);
  if(rdvNaturelMatch){ commandeCreerRdvNaturel(rdvNaturelMatch[1].trim(),rdvNaturelMatch[2].trim()); return; }

  const rdvClientGeneriqueMatch=q.match(/^(?:peux[- ]?tu\s+|pourrais[- ]?tu\s+|est-ce que tu peux\s+)?(?:me\s+)?(?:prends?|planifie|programme|fixe|cr[ée]e?r?|ajoute[r]?)\s+(?:un\s+|le\s+)?rdv\s+client\s+(.*)$/i);
  if(rdvClientGeneriqueMatch){ commandeCreerRdvClientGenerique(rdvClientGeneriqueMatch[1].trim()); return; }

  const noteMatch=q.match(/^note\s+que\s+(.+)$/i);
  if(noteMatch){
    const reste=noteMatch[1];
    const clientTrouve=S.clients.find(cl=>reste.toLowerCase().includes(cl.nom.toLowerCase()));
    if(clientTrouve){
      const noteTexte=reste.replace(new RegExp(clientTrouve.nom.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'i'),'').trim();
      commandeNoterMemoireClient(clientTrouve.nom,noteTexte||reste);
      return;
    }
  }

  const modContactMatch=q.match(/^(?:change|modifie)\s+(?:l['’])?(email|mail|téléphone|telephone|tel|fonction)\s+de\s+(.+?)\s+(?:chez|pour)\s+(.+?)\s+(?:en|par)\s+(.+)$/i);
  if(modContactMatch){ commandeModifierContact(modContactMatch[2].trim(),modContactMatch[3].trim(),modContactMatch[1].trim(),modContactMatch[4].trim()); return; }

  const combienMatch=q.match(/^combien\s+de\s+(.+)$/i);
  if(combienMatch){ if(commandeQuestionFactuelle(combienMatch[1].trim())) return; }

  const rappelMatch=q.match(/^rappelle[- ]?moi\s+de\s+(?:relancer|recontacter|rappeler)\s+(.+?)\s+(dans\s+.+|le\s+\d{1,2}[\/\-].*|lundi|mardi|mercredi|jeudi|vendredi|samedi|dimanche|demain|après-demain|apres-demain)$/i);
  if(rappelMatch){ commandeCreerRappel(rappelMatch[1].trim(),rappelMatch[2].trim()); return; }

  // ── Règles instantanées (sans IA) ──
  if(ql.includes('que ferais-tu')||ql.includes('que ferais tu')||ql.includes('à ma place')||ql.includes('a ma place')||ql.includes('conseil')||ql.includes('si j\'étais toi')){ openActionEngine(); setTimeout(()=>queFeraistTu(),300); return; }
  if(ql.includes('que faire')||ql.includes('priorité')||ql.includes('urgence')||ql.includes('priorités du moment')||ql.includes('quoi faire')||ql.includes('par où commencer')||ql.includes('mes priorités')||ql.includes('agenda du jour')||ql.includes('fait quoi')||ql.includes('faire quoi')||ql.includes('qu\'est-ce qu\'on fait')||ql.includes('qu\'est ce qu\'on fait')||ql.includes('on fait quoi')){ openActionEngine(); return; }
  if(ql.includes('pipeline')){ navFromHome('pipeline'); return; }
  if(ql.includes('agenda')||ql.includes('rendez-vous')||ql.includes('rdv')){ navFromHome('agenda'); return; }
  if(ql.includes('stats')||ql.includes('statistiques')||ql.includes('sors-moi mes')||ql.includes('sors moi mes')){ navFromHome('stats'); setTimeout(()=>analyserStats(),300); return; }
  if(ql.includes('import cv')){ navFromHome('importcv'); return; }
  if(ql.includes('nouveau candidat')||ql.includes('ajouter candidat')){ navFromHome('candidats'); setTimeout(()=>openCandidatModal(),100); return; }
  if(ql.includes('nouvelle mission')||ql.includes('ajouter mission')){ navFromHome('missions'); setTimeout(()=>openMissionModal(),100); return; }
  if(ql.includes('nouveau client')||ql.includes('ajouter client')){ navFromHome('clients'); setTimeout(()=>openClientModal(),100); return; }
  if(ql.includes('paramètres')||ql.includes('settings')){ openSettings(); return; }

  // ── Détection mission dans la phrase ──
  const missionDansPhrase=S.missions.find(m=>ql.includes(m.poste.toLowerCase()));
  const parsedQ=parseQuery(ql);
  if(missionDansPhrase){
    if(ql.includes('matching')||ql.includes('trouver')||ql.includes('chercher')||ql.includes('aider')||ql.includes('sourcer')||ql.includes('trouve')||ql.includes('cherche')){
      rechercheAvecMatching(missionDansPhrase.id, parsedQ.ville, q); return;
    }
    if(ql.includes('ouvre')||ql.includes('ouvrir')||ql.includes('montre')||ql.includes('affiche')){
      navFromHome('missions'); setTimeout(()=>openMissionDetail(missionDansPhrase.id),150); return;
    }
  }

  // ── Commande appel / présentation / matching direct ──
  const appelMatch=ql.match(/^appelle?\s+(.+)$/);
  if(appelMatch){ const cand=S.candidats.find(c=>`${c.prenom} ${c.nom}`.toLowerCase().includes(appelMatch[1])); if(cand){ openCandidatDetail(cand.id); return; } }
  const presenMatch=ql.match(/^pr[eé]sente[- ]moi\s+(.+)$/);
  if(presenMatch){ const cand=S.candidats.find(c=>`${c.prenom} ${c.nom}`.toLowerCase().includes(presenMatch[1])); if(cand){ openFichePresentation(cand.id); return; } }
  const matchingMatch=ql.match(/^matching\s+(.+)$/);
  if(matchingMatch){ const mission=S.missions.find(m=>m.poste.toLowerCase().includes(matchingMatch[1])); if(mission){ matchingIA(mission.id); return; } }

  // ── Commande "montre/ouvre [cible]" ──
  const montreMatch=ql.match(/^(?:montre[- ]moi|ouvre|affiche)\s+(?:le|la|les|mon|ma|mes|la mission)?\s*(.+)$/);
  if(montreMatch){
    const cible=montreMatch[1].toLowerCase();
    const cand=S.candidats.find(c=>`${c.prenom} ${c.nom}`.toLowerCase().includes(cible));
    if(cand){ openCandidatDetail(cand.id); return; }
    const mission=S.missions.find(m=>m.poste.toLowerCase().includes(cible));
    if(mission){ navFromHome('missions'); setTimeout(()=>openMissionDetail(mission.id),150); return; }
    const client=S.clients.find(c=>c.nom.toLowerCase().includes(cible));
    if(client){ navFromHome('clients'); setTimeout(()=>openClientDetail(client.id),150); return; }
  }

  // ── Rapport / visuel de mission ──
  const rapportPatterns=[
    /^(?:fais[- ]?moi\s+|donne[- ]?moi\s+|montre[- ]?moi\s+)?(?:un\s+)?(?:rapport|visuel|stat(?:s|ut)?|point)\s*(?:de\s+la\s+|de\s+|sur\s+la\s+|sur\s+)?mission\s*(.*)$/i,
    /^o[uù] en (?:est|sont)\s+(?:la mission\s+|les? missions?\s+)?(.+)$/i
  ];
  for(const rp of rapportPatterns){
    const rm=q.match(rp);
    if(rm){ ouvrirRapportMissionDepuisRecherche(rm[1].trim()); return; }
  }

  // ── Créer un contact ──
  if(/(?:crée|créer|créée?|ajoute|ajouter)\s+(?:moi\s+)?(?:un\s+|le\s+)?(?:nouveau\s+)?contact/i.test(q)){
    creerContactDepuisTexte(q); return;
  }

  // ── Plan de chasse ──
  const planMatch=q.match(/^(?:peux[- ]?tu\s+|pourrais[- ]?tu\s+|est-ce que tu peux\s+)?(?:me\s+)?(?:pr[ée]parer|pr[ée]pare|faire|fais|fait|lancer|lance)?\s*(?:un\s+|une\s+)?(?:plan de chasse|plan chasse|chasse)\s*(?:pour|sur)?\s+(.+)$/i);
  if(planMatch && planMatch[1].trim()){ genererPlanDeChasse(planMatch[1].trim()); return; }

  // ── TrouverMatch ──
  const trouverMatch=ql.match(/(?:trouve[- ]?moi|cherche[- ]?moi|aide[- ]?(?:moi )?(?:à|a) trouver|peux[- ]?tu (?:m[\'']aider (?:à|a) )?trouver|m[\'']aider (?:à|a) trouver)\s+(?:un|une|des|mon|ma|mes|le|la|les)?\s*(.+)/i);
  if(trouverMatch){
    const terme=trouverMatch[1].trim();
    // "trouve-moi le candidat Dupont" / "cherche-moi la candidate Martin" → ouverture directe de la fiche
    const candNomMatch=terme.match(/^candidate?\s+(.+)$/i);
    if(candNomMatch){
      const nomCherche=candNomMatch[1].toLowerCase().trim();
      const cand=S.candidats.find(c=>`${c.prenom} ${c.nom}`.toLowerCase().includes(nomCherche)||c.nom.toLowerCase().includes(nomCherche));
      if(cand){ openCandidatDetail(cand.id); return; }
    }
    const parsed=parseQuery(terme);
    const missionTrouvee=parsed.motsCles.length?S.missions.find(m=>m.statut==='En cours'&&matchMissionIntelligent(m,parsed)):null;
    if(missionTrouvee){ rechercheAvecMatching(missionTrouvee.id, parsed.ville, terme); }
    else { navFromHome('recherche'); setTimeout(()=>doSearch(terme),150); }
    return;
  }

  // Sépare proprement "Nom à Ville" — fonctionne pour n'importe quelle ville,
  // même absente du dictionnaire de mobilité (Fuveau, Aix-en-Provence, etc.)
  function smartCap(word){
    if(/[A-ZÀ-Ý]/.test(word)) return word; // déjà une majuscule (acronyme type LVMH, TF1…) : on ne touche pas
    return word.charAt(0).toUpperCase()+word.slice(1);
  }
  function titleCase(s){
    return s.split(/(\s|-)/).map(part=>(part===' '||part==='-')?part:smartCap(part)).join('');
  }
  function splitNomVille(text){
    const t=text.trim().replace(/\s+/g,' ');
    const m=t.match(/^(.+?)\s+(?:dont le si[eè]ge (?:social )?est à|situ[ée]e? à|bas[ée]e? à|à|a)\s+([^,]+)$/i);
    if(m) return {nom:titleCase(m[1].trim()), ville:titleCase(m[2].trim())};
    return {nom:titleCase(t), ville:null};
  }

  // Sépare "Poste pour/chez Client à Ville" — le client est recherché dans la base existante
  function splitMission(text){
    let t=text.trim().replace(/\s+/g,' ');
    t=t.replace(/^pour\s+(?:un\s+|une\s+|le\s+|la\s+)?poste\s+(?:de\s+|d['’])?/i,''); // "mission pour un poste d'auditeur..." → filler retiré
    t=t.replace(/^(?:d['’]|de\s+)/i,''); // "mission d'auditeur..." / "mission de DAF..." → on retire la préposition
    const clientMatch=t.match(/^(.+?)\s+(?:pour|chez|au sein de)\s+(.+)$/i);
    if(clientMatch){
      const poste=titleCase(clientMatch[1].trim());
      let clientEtVille=clientMatch[2].trim();
      const villeMatch=clientEtVille.match(/^(.+?)\s+(?:à|a)\s+([^,]+)$/i);
      if(villeMatch) return {poste, client:titleCase(villeMatch[1].trim()), ville:titleCase(villeMatch[2].trim())};
      return {poste, client:titleCase(clientEtVille), ville:null};
    }
    // Pas de "pour/chez" : on retombe sur la séparation ville simple
    const {nom:poste, ville}=splitNomVille(t);
    return {poste, client:null, ville};
  }
  function trouverClientProche(nomApprox){
    if(!nomApprox) return null;
    const nl=nomApprox.toLowerCase().trim();
    let c=S.clients.find(x=>x.nom.toLowerCase()===nl);
    if(!c) c=S.clients.find(x=>x.nom.toLowerCase().includes(nl)||nl.includes(x.nom.toLowerCase()));
    return c||null;
  }

  // ── Détection rapide création (on garde la casse d'origine de la requête) ──
  const creerMatch=q.match(/(?:crée?|créer|créée?|nouveau|nouvelle|ajoute?|ajouter)\s+(?:moi\s+)?(?:une?\s+)?(?:fiche\s+)?(?:le\s+|la\s+|l['’])?(client|entreprise|société|societe|mission|poste|job|candidat)\s+(.+)/i);
  if(creerMatch){
    let type=creerMatch[1].toLowerCase();
    if(type==='entreprise'||type==='société'||type==='societe') type='client';
    if(type==='job') type='mission';
    const reste=creerMatch[2].trim();
    if(type==='client'||type==='fiche client'){
      const {nom:nomClient, ville}=splitNomVille(reste);
      navFromHome('clients');
      setTimeout(()=>{
        openClientModal();
        setTimeout(()=>{
          const nom=document.getElementById('f-nom'); if(nom&&nomClient) nom.value=nomClient;
          const vil=document.getElementById('f-vil'); if(vil&&ville) vil.value=ville;
          const sta=document.getElementById('f-sta'); if(sta) sta.value='Prospect';
          if(nomClient) enrichirClientIA();
        },200);
      },150);
      return;
    }
    if(type==='mission'||type==='poste'){
      const {poste, client, ville}=splitMission(reste);
      const clientTrouve=trouverClientProche(client);
      navFromHome('missions');
      setTimeout(()=>{
        openMissionModal('', clientTrouve?clientTrouve.id:'');
        setTimeout(()=>{
          const pos=document.getElementById('f-pos'); if(pos&&poste) pos.value=poste;
          const vil=document.getElementById('f-vil'); if(vil&&ville) vil.value=ville;
          const sta=document.getElementById('f-sta'); if(sta) sta.value='En cours';
          if(client && !clientTrouve){
            setTimeout(()=>alert(`Client "${client}" introuvable dans ta base — sélectionne-le manuellement ou crée-le d'abord.`),300);
          }
        },200);
      },150);
      return;
    }
    if(type==='candidat'){
      navFromHome('candidats'); setTimeout(()=>openCandidatModal(),150); return;
    }
  }

  // ── Fallback IA : si aucune règle rapide n'a matché, on interroge Claude ──
  // avant de se rabattre sur une simple recherche plein texte.
  if(getApiKey()){
    interpreterCommande(q);
    return;
  }
  navFromHome('recherche');
  setTimeout(()=>doSearch(q),150);
}

async function interpreterCommande(q){
  const inp=document.getElementById('home-q');
  if(inp){ inp.style.opacity='0.5'; inp.disabled=true; inp.placeholder='Je réfléchis…'; }

  const missions=S.missions.map(m=>`${m.id}:${m.poste}(${getClient(m.clientId).nom})`).join(', ');
  const candidats=S.candidats.slice(0,20).map(c=>`${c.id}:${c.prenom} ${c.nom}(${c.poste})`).join(', ');
  const clients=S.clients.map(c=>`${c.id}:${c.nom}`).join(', ');

  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':getApiKey(),'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:300,messages:[{role:'user',content:`Interprète cette commande d'un chasseur de têtes et retourne UNIQUEMENT un JSON.

COMMANDE : "${q}"

DONNÉES : Missions: ${missions} | Candidats: ${candidats} | Clients: ${clients}

ACTIONS DISPONIBLES :
- Ouvrir existant : {"action":"ouvrir_mission","id":"..."} | {"action":"ouvrir_candidat","id":"..."} | {"action":"ouvrir_client","id":"..."}
- Matching : {"action":"matching","missionId":"...","ville":"..."}
- Recherche : {"action":"recherche","terme":"..."}
- Navigation : {"action":"action_engine"} | {"action":"conseil_ia"} | {"action":"navigation","page":"missions|clients|candidats|pipeline|actions|agenda|stats"}
- Créer VIDE : {"action":"nouveau","type":"candidat|mission|client"}
- Créer PRÉ-REMPLI client : {"action":"creer_client","nom":"Nom entreprise","ville":"ville","secteur":"secteur déduit"}
- Créer PRÉ-REMPLI mission : {"action":"creer_mission","poste":"intitulé exact","ville":"ville","clientNom":"nom client si mentionné","contrat":"CDI|CDD|Freelance","genererFiche":true}

Exemples :
"crée moi une fiche client Groupe Total à Paris La Défense" → {"action":"creer_client","nom":"Groupe Total","ville":"Paris La Défense","secteur":"Énergie"}
"crée moi un poste de contrôleur de gestion Total à Paris" → {"action":"creer_mission","poste":"Contrôleur de gestion","ville":"Paris","clientNom":"Total","contrat":"CDI","genererFiche":true}
"nouveau candidat Jean Dupont" → {"action":"creer_candidat","prenom":"Jean","nom":"Dupont"}

JSON uniquement, pas de texte.`}]})
    });
    const data=await res.json();
    const json=JSON.parse(data.content[0].text.trim());
    if(inp){ inp.style.opacity='1'; inp.disabled=false; inp.placeholder='Rechercher ou commander…'; }

    switch(json.action){
      case 'ouvrir_mission': navFromHome('missions'); setTimeout(()=>openMissionDetail(json.id),150); break;
      case 'ouvrir_candidat': openCandidatDetail(json.id); break;
      case 'ouvrir_client': navFromHome('clients'); setTimeout(()=>openClientDetail(json.id),150); break;
      case 'matching': rechercheAvecMatching(json.missionId, json.ville||null, q); break;
      case 'recherche': navFromHome('recherche'); setTimeout(()=>doSearch(json.terme),150); break;
      case 'action_engine': openActionEngine(); break;
      case 'conseil_ia': openActionEngine(); setTimeout(()=>queFeraistTu(),300); break;
      case 'navigation': navFromHome(json.page); break;
      case 'nouveau':
        if(json.type==='candidat'){ navFromHome('candidats'); setTimeout(()=>openCandidatModal(),150); }
        else if(json.type==='mission'){ navFromHome('missions'); setTimeout(()=>openMissionModal(),150); }
        else if(json.type==='client'){ navFromHome('clients'); setTimeout(()=>openClientModal(),150); }
        break;

      case 'creer_client':
        // Créer client pré-rempli, puis enrichir automatiquement l'adresse via recherche web
        navFromHome('clients');
        setTimeout(()=>{
          openClientModal();
          setTimeout(()=>{
            const nom=document.getElementById('f-nom'); if(nom&&json.nom) nom.value=json.nom;
            const vil=document.getElementById('f-vil'); if(vil&&json.ville) vil.value=json.ville;
            const sec=document.getElementById('f-sec'); if(sec&&json.secteur) sec.value=json.secteur;
            const sta=document.getElementById('f-sta'); if(sta) sta.value='Prospect';
            if(json.nom) enrichirClientIA();
          },200);
        },150);
        break;

      case 'creer_mission':
        // Trouver le client si mentionné
        let clientIdPrerempli='';
        if(json.clientNom){
          const clientTrouve=S.clients.find(c=>c.nom.toLowerCase().includes(json.clientNom.toLowerCase()));
          if(clientTrouve) clientIdPrerempli=clientTrouve.id;
        }
        navFromHome('missions');
        setTimeout(()=>{
          openMissionModal('', clientIdPrerempli);
          setTimeout(()=>{
            const pos=document.getElementById('f-pos'); if(pos&&json.poste) pos.value=json.poste;
            const vil=document.getElementById('f-vil'); if(vil&&json.ville) vil.value=json.ville;
            const con=document.getElementById('f-con'); if(con&&json.contrat) con.value=json.contrat;
            const sta=document.getElementById('f-sta'); if(sta) sta.value='En cours';
          },200);
        },150);
        break;

      case 'creer_candidat':
        navFromHome('candidats');
        setTimeout(()=>{
          openCandidatModal();
          setTimeout(()=>{
            const pre=document.getElementById('f-pre'); if(pre&&json.prenom) pre.value=json.prenom;
            const nom=document.getElementById('f-nom'); if(nom&&json.nom) nom.value=json.nom;
          },200);
        },150);
        break;

      default: navFromHome('recherche'); setTimeout(()=>doSearch(q),150);
    }
  }catch(e){
    if(inp){ inp.style.opacity='1'; inp.disabled=false; inp.placeholder='Rechercher ou commander…'; }
    navFromHome('recherche'); setTimeout(()=>doSearch(q),150);
  }
}


async function rechercheAvecMatching(missionId, ville, termeOriginal){
  if(!getApiKey()){ alert('Configurez d\'abord votre clé API Anthropic.'); return; }

  const m=S.missions.find(x=>x.id===missionId);
  const cl=getClient(m.clientId);

  // Filtrer les candidats mobiles sur la ville si précisée
  let candidatsFiltres=S.candidats;
  if(ville){
    candidatsFiltres=S.candidats.filter(c=>mobiliteMatch(c,ville));
  }

  if(!candidatsFiltres.length){
    showModal(`<h3>🔍 Recherche — ${esc(termeOriginal)}</h3>
      <div class="empty">Aucun candidat ${ville?`mobile sur ${ville} `:''}trouvé dans le vivier.<br><small>Essayez d'élargir la mobilité ou de sourcer de nouveaux profils.</small></div>
      <div class="modal-footer"><button class="btn" onclick="closeModal()">Fermer</button></div>`);
    return;
  }

  // Afficher une modale de chargement
  showModal(`<h3>🔍 ${esc(termeOriginal)}</h3>
    <div style="text-align:center;padding:24px">
      <i class="ti ti-loader-2" style="font-size:28px;color:var(--text2);animation:spin 1s linear infinite"></i>
      <div style="margin-top:12px;color:var(--text2);font-size:13px">Analyse de ${candidatsFiltres.length} candidat${candidatsFiltres.length>1?'s':''}${ville?` mobiles sur ${ville}`:''}…</div>
    </div>`);

  const missionDesc=`Poste : ${m.poste}\nClient : ${cl.nom} (${m.ville||''})\nSecteur : ${cl.secteur||''}\nContrat : ${m.contrat||''}\nRémunération : ${m.remun||''}\nNotes : ${m.notes||''}`;

  const mem=m.memory;
  let memoireDesc='';
  if(mem){
    if(mem.implicites?.length) memoireDesc+=`\nCritères implicites : ${mem.implicites.join(', ')}`;
    if(mem.refus?.length) memoireDesc+=`\nProfils refusés : ${mem.refus.join(', ')}`;
    if(mem.adn?.length) memoireDesc+=`\nADN bon profil : ${mem.adn.join(', ')}`;
  }

  const climem=cl.memory;
  let clientMemDesc='';
  if(climem){
    if(climem.implicites?.length) clientMemDesc+=`\nCritères client : ${climem.implicites.join(', ')}`;
    if(climem.refus?.length) clientMemDesc+=`\nProfils refusés : ${climem.refus.join(', ')}`;
  }

  const candidatsDesc=candidatsFiltres.map(c=>
    `${c.prenom} ${c.nom} | ${c.poste||''} | ${c.exp||'?'} ans | ${c.spe||''} | ${c.ville||''} | mobilité: ${mobiliteLabel(c)} | dispo: ${c.dispo||'?'} | prétentions: ${c.pretentions||'?'}`
  ).join('\n');

  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':getApiKey(),'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({
        model:'claude-sonnet-4-6',
        max_tokens:1000,

      })
    });

            ${r.disponibilite?`<span style="font-size:11px;color:var(--text2)">Dispo: ${esc(r.disponibilite)}</span>`:''}
          </div>

  }catch(e){

}

function extraireJsonApresTag(text, tag){
  const idx=text.lastIndexOf(tag);
  if(idx===-1) return null;
  const rest=text.slice(idx+tag.length);
  const start=rest.indexOf('{');
  if(start===-1) return null;
  let depth=0;
  for(let i=start;i<rest.length;i++){
    if(rest[i]==='{') depth++;
    else if(rest[i]==='}'){ depth--; if(depth===0) return rest.slice(start,i+1); }
  }
  return null; // accolades non équilibrées, réponse tronquée
}

async function enrichirClientIA(){
  const nomEl=document.getElementById('f-nom');
  const nom=nomEl?nomEl.value.trim():'';
  if(!nom){ alert('Indiquez d\'abord le nom de la société.'); return; }
  if(!getApiKey()){ alert('Configurez d\'abord votre clé API Anthropic.'); return; }

  const villeEl=document.getElementById('f-vil');
  const secEl=document.getElementById('f-sec');
  const adrEl=document.getElementById('f-adr');
  const villeHint=villeEl?villeEl.value.trim():'';

  const btn=document.getElementById('btn-enrichir-client');
  if(btn){ btn.disabled=true; btn.innerHTML='<i class="ti ti-loader-2"></i> Recherche…'; }

  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':getApiKey(),'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({
        model:'claude-sonnet-4-6',
        max_tokens:600,
        tools:[{type:'web_search_20250305',name:'web_search'}],
        messages:[{role:'user',content:`Cherche sur le web l'adresse officielle du siège social de l'entreprise "${nom}"${villeHint?` (ville probable : ${villeHint})`:''} en France, ainsi que son secteur d'activité.

Termine IMPÉRATIVEMENT ta réponse par une seule ligne, à la toute fin, au format exact (rien après) :
JSON:{"adresse":"adresse postale complète avec code postal et ville","ville":"ville du siège","secteur":"secteur d'activité en 1 à 3 mots"}

Si tu ne trouves rien de fiable, mets des chaînes vides pour les champs concernés.`}]
      })
    });
    const data=await res.json();
    const textBlocks=(data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('\n');
    const jsonStr=extraireJsonApresTag(textBlocks,'JSON:');
    if(!jsonStr) throw new Error('Réponse IA inexploitable');
    const info=JSON.parse(jsonStr);

    if(adrEl&&info.adresse) adrEl.value=info.adresse;
    if(villeEl&&info.ville) villeEl.value=info.ville;
    if(secEl&&info.secteur&&!secEl.value.trim()) secEl.value=info.secteur;

    if(btn){ btn.disabled=false; btn.innerHTML='<i class="ti ti-map-pin"></i> Trouver via IA'; }
    if(!info.adresse){ alert("Casimir n'a pas trouvé d'adresse fiable pour cette société — vérifiez le nom exact ou complétez manuellement."); }
  }catch(e){
    if(btn){ btn.disabled=false; btn.innerHTML='<i class="ti ti-map-pin"></i> Trouver via IA'; }
    alert('Erreur lors de la recherche : '+e.message);
  }
}

async function analyserCRClient(clientId, silent){
  if(!getApiKey()){ if(!silent) alert('Configurez d\'abord votre clé API Anthropic.'); return; }
  const c=S.clients.find(x=>x.id===clientId);
  if(!c) return;
  const crClient=S.actions.filter(a=>a.clientId===clientId&&a.cr&&a.cr.trim());
  if(!crClient.length){ if(!silent) alert('Aucun CR trouvé pour ce client.'); return; }

  const btn=silent?null:document.querySelector(`button[onclick="analyserCRClient('${clientId}')"]`);
  if(btn){ btn.disabled=true; btn.innerHTML='<i class="ti ti-loader-2"></i> Analyse…'; }

  const crText=crClient.map(a=>`[${fmtDate(a.date)} — ${a.type}] ${a.cr}`).join('\n\n');

  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':getApiKey(),'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({
        model:'claude-sonnet-4-6',
        max_tokens:1200,
        messages:[{role:'user',content:`Tu es un chasseur de têtes expert. Analyse ces comptes-rendus d'échanges avec un client et extrait des insights sur ce client.

CLIENT : ${c.nom} (${c.secteur||''} · ${c.ville||''})

COMPTES-RENDUS :
${crText}

Extrait les insights suivants et réponds UNIQUEMENT en JSON sans markdown :
{
  "implicites": ["critère implicite que le client n'a pas dit explicitement", ...],
  "style": ["observation sur son style de décision, son rythme, ses biais", ...],
  "refus": ["type de profil qu'il refuse ou a refusé avec raison", ...],
  "preferences": ["préférence cachée, deal-breaker, soft skill recherché", ...]
}

Sois concis, factuel. Maximum 4 items par catégorie. Ne mets rien si tu n'as pas d'éléments solides.`}]
      })
    });
    const data=await res.json();
    const text=data.content[0].text;
    let json;
    try{ json=JSON.parse(text.replace(/```json|```/g,'').trim()); }
    catch(e){ const m=text.match(/\{[\s\S]*\}/); if(m) json=JSON.parse(m[0]); else throw new Error('Réponse invalide'); }

    if(!c.memory) c.memory={implicites:[],style:[],refus:[],preferences:[],concurrents:[]};
    let nbAjout=0;
    ['implicites','style','refus','preferences'].forEach(k=>{
      if(json[k]) json[k].forEach(item=>{ if(!c.memory[k].includes(item)){ c.memory[k].push(item); nbAjout++; } });
    });
    saveData();

    if(silent){
      if(nbAjout>0) notifyMemoireEnrichie(`🧠 Mémoire client "${c.nom}" enrichie (+${nbAjout})`);
      return;
    }

    const total=(json.implicites||[]).length+(json.style||[]).length+(json.refus||[]).length+(json.preferences||[]).length;
    openClientDetail(clientId);
    setTimeout(()=>{
      switchCliTab(clientId,'memoire',null);
      document.querySelectorAll(`#cli-main-tabs-${clientId} .stab`)[2]?.classList.add('active');
      document.querySelectorAll(`#cli-main-tabs-${clientId} .stab`)[0]?.classList.remove('active');
    },10);
    if(total===0) alert('Aucun insight extrait — les CR sont peut-être trop courts.');
  }catch(e){
    if(btn){ btn.disabled=false; btn.innerHTML='<i class="ti ti-sparkles"></i> Analyser → Mémoire'; }
    if(!silent) alert('Erreur : '+e.message);
  }
}

function switchCliMemTab(clientId, key, btn){

    const el=document.querySelector(`#climsec-${k}-${clientId}`);

function cliMemAdd(clientId, key){
  const inp=document.getElementById(`climem-inp-${key}-${clientId}`);
  if(!inp||!inp.value.trim()) return;
  const c=S.clients.find(x=>x.id===clientId);
  if(!c.memory) c.memory={implicites:[],style:[],refus:[],preferences:[],concurrents:[]};
  if(!c.memory[key]) c.memory[key]=[];

  openClientDetail(clientId);
  setTimeout(()=>{
    switchCliTab(clientId,'memoire',null);

    document.querySelectorAll(`#cli-main-tabs-${clientId} .stab`)[0]?.classList.remove('active');
    switchCliMemTab(clientId,key,null);
  },10);
}

function cliMemDel(clientId, key, idx){
  const c=S.clients.find(x=>x.id===clientId);
  if(!c.memory||!c.memory[key]) return;
  c.memory[key].splice(idx,1);
  saveData();
  openClientDetail(clientId);

    switchCliTab(clientId,'memoire',null);

    document.querySelectorAll(`#cli-main-tabs-${clientId} .stab`)[0]?.classList.remove('active');

}

  if(!d.clientId||!d.poste)return alert('Client et poste obligatoires');

  if(['Gagnée','Perdue','Annulée'].includes(d.statut) && !d.dateCloture){

function candidatsOubliesPourMission(missionId){
  const m=S.missions.find(x=>x.id===missionId);
  if(!m) return [];
  const dejaProposes=new Set(S.pipeline.filter(p=>p.missionId===missionId).map(p=>p.candidatId));
  const parsed=parseQuery(`${m.poste} ${m.ville||''}`);
  return S.candidats
    .filter(c=>c.statut==='Actif' && !dejaProposes.has(c.id) && matchCandidatIntelligent(c,parsed))
    .map(c=>{
      const lastAct=S.actions.filter(a=>a.candidatId===c.id).sort((x,y)=>(y.date||'').localeCompare(x.date||''))[0];
      const daysSince=lastAct?Math.floor((new Date()-new Date(lastAct.date))/86400000):null;
      return {candidat:c, daysSince};
    })
    .filter(x=>x.daysSince===null||x.daysSince>=30)
    .sort((a,b)=>(b.daysSince??9999)-(a.daysSince??9999))
    .slice(0,5);
}

function ajouterCandidatOublie(missionId,candidatId){

  const mem=m.memory||{};

  if(climem.style?.length) climemDesc+=`\nStyle de décision du client : ${climem.style.join(' / ')}`;

  const prompt=`Tu es un associé senior dans un cabinet de chasse de tête. Prépare un mémo COURT avant un entretien — pas un rapport, 30 secondes de lecture max.

CANDIDAT : ${c.prenom} ${c.nom} — ${c.poste||'?'} chez ${c.societe||'?'} — ${c.exp||'?'} ans d'expérience — ${c.spe||'?'} — ${c.ville||'?'}

  const concurrentsConnus=clientRef?.memory?.concurrents||[];

  // Signal réel : ADN des profils qui ont fonctionné sur des missions similaires déjà gagnées
  const missionsSimilairesGagnees=S.missions.filter(m=>m.statut==='Gagnée'&&m.memory?.adn?.length&&parsed.motsCles.some(mc=>(m.poste||'').toLowerCase().includes(mc)));

  const nomsClients=S.clients.map(c=>c.nom).filter(Boolean);
  const clientsAEviter=nomsClients.length?`\n\nINTERDICTION ABSOLUE : ne suggère JAMAIS une entreprise qui est l'un de ces clients, sa maison mère, une filiale ou un groupe auquel il appartient : ${nomsClients.join(', ')}. Si tu ne sais pas avec certitude qu'une entreprise n'a aucun lien avec ces clients, ne la propose pas.`:'';

function statsHistoriquesMission(m){
  const posteKeywords=(m.poste||'').toLowerCase().split(/\s+/).filter(w=>w.length>3);
  const similaires=S.missions.filter(x=>x.statut==='Gagnée'&&x.dateOuv&&x.dateCloture&&posteKeywords.some(k=>(x.poste||'').toLowerCase().includes(k)));
  let delaiMoyen=null;
  if(similaires.length){
    const totalJours=similaires.reduce((sum,x)=>sum+Math.floor((new Date(x.dateCloture)-new Date(x.dateOuv))/86400000),0);
    delaiMoyen=Math.round(totalJours/similaires.length);
  }
  const actifs=S.candidats.filter(c=>c.statut==='Actif');
  const mobiles=m.ville?actifs.filter(c=>mobiliteMatch(c,m.ville.toLowerCase())):[];
  const pctMobile=(m.ville&&actifs.length)?Math.round((mobiles.length/actifs.length)*100):null;
  return {delaiMoyen, nbMissionsSimilaires:similaires.length, pctMobile, nbActifs:actifs.length};
}

async function genererBriefRdv(rdvId){
  const r=S.rdvs.find(x=>x.id===rdvId);
  if(!r) return;
  const c=r.candidatId?S.candidats.find(x=>x.id===r.candidatId):null;
  const m=r.missionId?S.missions.find(x=>x.id===r.missionId):null;
  const cl=m?getClient(m.clientId):null;

  showModal(`<h3>🧠 Brief avant RDV</h3>
    <div style="text-align:center;padding:40px 0;color:var(--text2)">
      <i class="ti ti-loader-2" style="font-size:28px;display:block;margin-bottom:10px;animation:spin 1s linear infinite"></i>
      Préparation du brief pour ${esc(r.titre)}…
    </div>`);

  const actsCand=c?S.actions.filter(a=>a.candidatId===c.id&&a.cr&&a.cr.trim()).sort((x,y)=>(y.date||'').localeCompare(x.date||'')):[];
  const dernierCR=actsCand[0];
  const historiqueTexte=actsCand.slice(0,5).map(a=>`[${fmtDate(a.date)} — ${a.type}] ${a.cr}`).join('\n')||'Aucun historique.';

  if(!getApiKey()){
    // Pas de clé API : on affiche quand même le brief avec les données réelles, sans la partie IA
    afficherBriefRdv(r,c,m,cl,dernierCR,actsCand,null);
    return;
  }

  const mem=m?.memory||{};
  const climem=cl?.memory||{};
  const memDesc=[...(mem.implicites||[]),...(mem.refus||[])].slice(0,3).join(' / ');
  const climemDesc=[...(climem.implicites||[]),...(climem.style||[])].slice(0,3).join(' / ');

  const prompt=`Tu prépares un chasseur de têtes avant un RDV. Sois COURT — 3 points maximum, pas de blabla.

RDV : ${r.titre}${c?` avec ${c.prenom} ${c.nom} (${c.poste||'?'})`:''}${m?` — mission ${m.poste} chez ${cl?.nom}`:''}

HISTORIQUE RÉCENT :
${historiqueTexte}
${memDesc?`\nCritères/refus connus sur la mission : ${memDesc}`:''}
${climemDesc?`\nCe qu'on sait du client : ${climemDesc}`:''}

Réponds UNIQUEMENT en JSON sans markdown :
{
  "sujets": ["sujet précis à aborder 1, court", "..."]
}
Maximum 3 sujets. Base-toi uniquement sur l'historique fourni — si rien de spécifique à signaler, renvoie un tableau vide plutôt que d'inventer.`;

  let rawTextDebug='';
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':getApiKey(),'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:800,messages:[{role:'user',content:prompt}]})
    });
    const data=await res.json();
    if(data.error) throw new Error(data.error.message||'Erreur API Anthropic');
    if(!data.content||!data.content[0]) throw new Error('Réponse API vide ou inattendue');
    const text=data.content[0].text;
    rawTextDebug=text;
    let json;
    try{ json=JSON.parse(text.replace(/```json|```/g,'').trim()); }
    catch(e){ const mm=text.match(/\{[\s\S]*\}/); if(mm) json=JSON.parse(mm[0]); else throw new Error('Réponse IA invalide'); }
    afficherBriefRdv(r,c,m,cl,dernierCR,actsCand,json.sujets||[]);
  }catch(e){
    afficherBriefRdv(r,c,m,cl,dernierCR,actsCand,null,e.message,rawTextDebug);
  }
}

function ouvrirRapportMissionDepuisRecherche(query){
  query=(query||'').trim();
  const missionsActives=S.missions.filter(m=>m.statut==='En cours');
  if(!missionsActives.length){ alert('Aucune mission en cours.'); return; }

  let candidates=missionsActives;
  if(query){
    const parsed=parseQuery(query);
    candidates=missionsActives.filter(m=>matchMissionIntelligent(m,parsed));
    if(!candidates.length){ alert(`Aucune mission en cours ne correspond à "${query}".`); return; }
  }

  if(candidates.length===1){ ouvrirRapportMission(candidates[0].id); return; }

  const opts=candidates.map(m=>{const cl=getClient(m.clientId);return `<button class="btn" style="width:100%;text-align:left;margin-bottom:6px" onclick="closeModal();ouvrirRapportMission('${m.id}')">${esc(m.poste)} <small style="color:var(--text2)">· ${esc(cl.nom)}</small></button>`;}).join('');

    <div style="margin-bottom:10px;color:var(--text2);font-size:13px">Plusieurs missions correspondent — laquelle ?</div>
    ${opts}
    <div class="modal-footer"><button class="btn" onclick="closeModal()">Annuler</button></div>`);
}

function ouvrirRapportMission(missionId){
  const m=S.missions.find(x=>x.id===missionId);
  if(!m) return;
  const cl=getClient(m.clientId);
  const pipeline=S.pipeline.filter(p=>p.missionId===missionId);
  const actifs=pipeline.filter(p=>!['Refusé','Abandonné'].includes(p.etape));
  const etapesAffichees=['Identifié','Approché','Pré-qualifié','Qualifié','Présenté au client','Entretien client','Offre','Retenu'];
  const maxCount=Math.max(1,...etapesAffichees.map(e=>pipeline.filter(p=>p.etape===e).length));
  const acts=S.actions.filter(a=>a.missionId===missionId).sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  const lastAct=acts[0];
  const daysSince=lastAct?Math.floor((new Date()-new Date(lastAct.date))/86400000):null;
  const stats=statsHistoriquesMission(m);
  const joursOuverte=m.dateOuv?Math.floor((new Date()-new Date(m.dateOuv))/86400000):null;
  const entretiens=[1,2,3,4].map(s=>pipeline.filter(p=>p.entretienStep===s).length);

    <div style="width:18px;font-size:11px;color:var(--text2)">${n}</div>

  showModal(`<h3>📊 ${esc(m.poste)}</h3>
    <div style="font-size:12px;color:var(--text2);margin-bottom:16px">${esc(cl.nom)}${m.ville?' · '+esc(m.ville):''} · <span class="badge ${STATUT_MS[m.statut]||'b-gray'}">${m.statut}</span></div>

        <div style="font-size:10px;color:var(--text2)">candidats actifs</div>
      </div>
      <div style="background:var(--bg2);border-radius:var(--radius);padding:10px;text-align:center">
        <div style="font-size:20px;font-weight:700">${daysSince!==null?daysSince+'j':'—'}</div>

      </div>
      <div style="background:var(--bg2);border-radius:var(--radius);padding:10px;text-align:center">
        <div style="font-size:20px;font-weight:700">${joursOuverte!==null?joursOuverte+'j':'—'}</div>

function parseSalaireApprox(txt){
  if(!txt) return null;
  const nums=String(txt).match(/\d+([.,]\d+)?/g);
  if(!nums||!nums.length) return null;
  let vals=nums.map(n=>parseFloat(n.replace(',','.')));
  let max=Math.max(...vals);
  if(max>1000) max=max/1000; // ex: 45000 → 45 (k€)
  return max;
}

function rechercheVivierStricte(missionId){
  const m=S.missions.find(x=>x.id===missionId);
  if(!m) return;
  const budgetMission=parseSalaireApprox(m.remun);
  const dejaProposes=new Set(S.pipeline.filter(p=>p.missionId===missionId).map(p=>p.candidatId));
  const parsedPoste=parseQuery(m.poste);

  const resultats=S.candidats.filter(c=>c.statut==='Actif'&&!dejaProposes.has(c.id)).map(c=>{
    const texteCand=[c.poste,c.spe,c.notes].map(x=>(x||'').toLowerCase()).join(' ');
    const critereCompetences=parsedPoste.motsCles.length>0&&parsedPoste.motsCles.every(mc=>texteContientMot(texteCand,mc));
    const critereMobilite=!m.ville||mobiliteMatch(c,m.ville.toLowerCase());
    const candSalaire=parseSalaireApprox(c.pretentions);
    let critereSalaire=null; // null = non évaluable (info manquante)
    if(budgetMission!==null&&candSalaire!==null) critereSalaire=candSalaire<=budgetMission*1.1;
    return {c,critereCompetences,critereMobilite,critereSalaire,candSalaire};
  }).filter(r=>r.critereCompetences)
    .sort((a,b)=>{
      const scoreA=(a.critereMobilite?1:0)+(a.critereSalaire===true?1:0);
      const scoreB=(b.critereMobilite?1:0)+(b.critereSalaire===true?1:0);
      return scoreB-scoreA;
    });

  const badge=(ok,label)=>ok===null?`<span class="badge b-gray">${label} ?</span>`:ok?`<span class="badge b-green">✓ ${label}</span>`:`<span class="badge b-red">✗ ${label}</span>`;

  showModal(`<h3>🔍 Recherche vivier — ${esc(m.poste)}</h3>
    <div style="font-size:12px;color:var(--text2);margin-bottom:14px">Critères : compétences (poste) obligatoire · mobilité vers ${m.ville?esc(m.ville):'—'} · budget ${budgetMission?'~'+budgetMission+'k€':'non renseigné'}</div>
    ${!resultats.length?`<div class="empty">Aucun candidat actif de votre vivier ne correspond au poste recherché. <button class="link-btn" onclick="closeModal();ouvrirPlanDeChasseModal('${m.clientId}')">Lancer un plan de chasse externe →</button></div>`:
    resultats.map(r=>`<div style="padding:10px 12px;border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <button class="link-btn" style="font-weight:500" onclick="closeModal();openCandidatDetail('${r.c.id}')">${esc(r.c.prenom)} ${esc(r.c.nom)}</button>
        <button class="btn sm" onclick="ajouterCandidatOublie('${missionId}','${r.c.id}');closeModal();ouvrirRapportMission('${missionId}')">+ Ajouter au pipeline</button>
      </div>
      <div style="font-size:12px;color:var(--text2);margin:4px 0">${esc(r.c.poste||'')}${r.c.societe?' · '+esc(r.c.societe):''}</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">${badge(r.critereMobilite,'Mobilité')}${badge(r.critereSalaire,'Budget'+(r.candSalaire?' ('+r.candSalaire+'k€)':''))}</div>
    </div>`).join('')}
    <div style="font-size:10px;color:var(--text3);margin:8px 0 14px">Le critère budget est une estimation approximative basée sur les champs texte "rémunération" et "prétentions" — à vérifier au cas par cas.</div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal();ouvrirPlanDeChasseModal('${m.clientId}')">🎯 Rien de bon ? Plan de chasse externe</button>
      <button class="btn" onclick="closeModal();ouvrirRapportMission('${missionId}')">Retour au rapport</button>
    </div>`);
}
