<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ATS — Chasseur de têtes</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.0.0/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fff;--bg2:#f5f5f4;--bg3:#edede9;--text:#1a1a18;--text2:#6b6b63;--text3:#a0a098;
  --border:#e0dfd8;--border2:#d0cfc8;--blue-bg:#dbeafe;--blue-t:#1e40af;
  --green-bg:#dcfce7;--green-t:#166534;--amber-bg:#fef3c7;--amber-t:#92400e;
  --red-bg:#fee2e2;--red-t:#991b1b;--purple-bg:#ede9fe;--purple-t:#4c1d95;
  --teal-bg:#ccfbf1;--teal-t:#134e4a;--gray-bg:#f1f0eb;--gray-t:#4a4a44;
  --radius:8px;--radius-lg:12px;--shadow:0 1px 3px rgba(0,0,0,.08);
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;color:var(--text);background:var(--bg3)}
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:200px;min-width:200px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:12px 8px;gap:2px}
.sidebar-brand{font-size:13px;font-weight:600;color:var(--text);padding:8px 10px 14px;border-bottom:1px solid var(--border);margin-bottom:8px}
.sidebar-brand small{display:block;font-weight:400;color:var(--text2);font-size:11px}
.nav-btn{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--radius);border:none;background:transparent;color:var(--text2);cursor:pointer;font-size:13px;width:100%;text-align:left}
.nav-btn:hover{background:var(--bg3);color:var(--text)}
.nav-btn.active{background:var(--bg);color:var(--text);font-weight:500;border:1px solid var(--border)}
.nav-btn i{font-size:16px}
.main{flex:1;overflow:hidden;display:flex;flex-direction:column;background:var(--bg)}
.topbar{padding:12px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;min-height:52px;background:var(--bg)}
.topbar h2{font-size:15px;font-weight:500}
.btn{padding:6px 14px;border-radius:var(--radius);border:1px solid var(--border2);background:var(--bg);color:var(--text);cursor:pointer;font-size:13px;display:inline-flex;align-items:center;gap:6px}
.btn:hover{background:var(--bg2)}
.btn.primary{background:var(--text);color:var(--bg);border-color:var(--text)}
.btn.primary:hover{opacity:.85}
.btn.danger{color:#991b1b;border-color:#fca5a5}
.btn.sm{padding:4px 10px;font-size:12px}
.content{flex:1;overflow-y:auto;padding:16px 20px;background:var(--bg3)}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:12px}
.kpi{background:var(--bg);border-radius:var(--radius);padding:12px 14px;border:1px solid var(--border)}
.kpi-label{font-size:11px;color:var(--text2);margin-bottom:4px}
.kpi-val{font-size:22px;font-weight:500}
.kpi-val.blue{color:var(--blue-t)}
.kpi-val.green{color:var(--green-t)}
.card{background:var(--bg);border-radius:var(--radius-lg);border:1px solid var(--border);margin-bottom:12px;overflow:hidden}
.card-header{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;font-weight:500;font-size:13px;background:var(--bg2)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:9px 12px;font-size:11px;font-weight:500;color:var(--text2);border-bottom:1px solid var(--border);white-space:nowrap;background:var(--bg2)}
td{padding:9px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg2)}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500;white-space:nowrap}
.b-blue{background:var(--blue-bg);color:var(--blue-t)}
.b-green{background:var(--green-bg);color:var(--green-t)}
.b-amber{background:var(--amber-bg);color:var(--amber-t)}
.b-red{background:var(--red-bg);color:var(--red-t)}
.b-gray{background:var(--gray-bg);color:var(--gray-t)}
.b-purple{background:var(--purple-bg);color:var(--purple-t)}
.b-teal{background:var(--teal-bg);color:var(--teal-t)}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:200}
.modal{background:var(--bg);border-radius:var(--radius-lg);padding:22px;width:520px;max-width:96vw;max-height:88vh;overflow-y:auto;border:1px solid var(--border);box-shadow:0 8px 32px rgba(0,0,0,.12)}
.modal h3{font-size:15px;font-weight:500;margin-bottom:16px}
.field{margin-bottom:12px}
.field label{display:block;font-size:12px;color:var(--text2);margin-bottom:4px;font-weight:500}
input,select,textarea{width:100%;padding:7px 10px;border:1px solid var(--border2);border-radius:var(--radius);font-size:13px;font-family:inherit;background:var(--bg);color:var(--text)}
input:focus,select:focus,textarea:focus{outline:none;border-color:#93c5fd}
textarea{resize:vertical;min-height:80px;line-height:1.5}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:16px;padding-top:14px;border-top:1px solid var(--border)}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.link-btn{background:none;border:none;color:var(--blue-t);cursor:pointer;font-size:13px;padding:0;text-align:left;font-family:inherit}
.link-btn:hover{text-decoration:underline}
.row-actions{display:flex;gap:4px;opacity:0}
tr:hover .row-actions{opacity:1}
.info-row{display:flex;justify-content:space-between;align-items:flex-start;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px;gap:12px}
.info-row:last-child{border-bottom:none}
.info-label{color:var(--text2);white-space:nowrap;min-width:100px}
.info-val{text-align:right;word-break:break-word}
.cr-item{padding:12px 0;border-bottom:1px solid var(--border)}
.cr-item:last-child{border-bottom:none}
.cr-meta{display:flex;gap:8px;align-items:center;margin-bottom:5px;flex-wrap:wrap}
.cr-text{font-size:13px;color:var(--text2);line-height:1.6}
.cr-next{font-size:12px;color:var(--blue-t);margin-top:4px}
.empty{text-align:center;padding:28px 16px;color:var(--text3);font-size:13px}
.avatar{width:38px;height:38px;border-radius:50%;background:var(--blue-bg);display:flex;align-items:center;justify-content:center;font-weight:500;font-size:13px;color:var(--blue-t);flex-shrink:0}
.detail-header{display:flex;align-items:center;gap:12px;margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid var(--border)}
.search-bar{display:flex;gap:10px;margin-bottom:14px;align-items:center}
.search-bar input{flex:1;padding:9px 14px;font-size:14px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--bg)}
.search-bar input:focus{outline:none;border-color:#93c5fd}
.filter-chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.chip{padding:4px 12px;border-radius:20px;font-size:12px;border:1px solid var(--border2);background:var(--bg);cursor:pointer;color:var(--text2)}
.chip:hover{background:var(--bg2)}
.chip.on{background:var(--text);color:var(--bg);border-color:var(--text)}
.result-count{font-size:12px;color:var(--text2);margin-bottom:10px}
.highlight{background:#fef08a;border-radius:2px;padding:0 1px}
.mem-tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:12px}
.mem-tab{padding:7px 16px;border:none;background:none;cursor:pointer;font-size:12px;color:var(--text2);border-bottom:2px solid transparent;margin-bottom:-1px}
.mem-tab.active{color:var(--text);border-bottom-color:var(--text);font-weight:500}
.mem-section{display:none}.mem-section.active{display:block}
.mem-entry{display:flex;align-items:flex-start;gap:8px;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px}
.mem-entry:last-child{border-bottom:none}
.mem-entry-text{flex:1;line-height:1.5}
.mem-del{background:none;border:none;color:var(--text3);cursor:pointer;font-size:14px;padding:0 2px;flex-shrink:0;line-height:1}
.mem-del:hover{color:#991b1b}
.mem-add{display:flex;gap:6px;margin-top:10px}
.mem-add input{flex:1;padding:6px 10px;border:1px solid var(--border2);border-radius:var(--radius);font-size:12px}
.mem-add button{padding:6px 12px;border-radius:var(--radius);border:1px solid var(--border2);background:var(--bg);cursor:pointer;font-size:12px;white-space:nowrap}
.mem-add button:hover{background:var(--bg2)}
.mem-badge{display:inline-block;width:18px;height:18px;border-radius:50%;font-size:10px;font-weight:600;display:inline-flex;align-items:center;justify-content:center;margin-left:4px}
.action-engine-btn{background:var(--text)!important;color:var(--bg)!important;font-weight:600!important;border-radius:var(--radius)!important;margin-bottom:2px}
.action-engine-btn:hover{opacity:.9!important}
.ae-section{margin-bottom:14px}
.ae-section-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--text2);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.ae-item{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border-radius:var(--radius);margin-bottom:6px;cursor:pointer;border:1px solid transparent}
.ae-item:hover{border-color:var(--border2)}
.ae-item.urgent{background:#fff1f2;border-color:#fecdd3}
.ae-item.semaine{background:#fffbeb;border-color:#fde68a}
.ae-item.ok{background:#f0fdf4;border-color:#bbf7d0}
.ae-item-icon{font-size:16px;flex-shrink:0;margin-top:1px}
.ae-item-body{flex:1}
.ae-item-title{font-size:13px;font-weight:500;color:var(--text);line-height:1.4}
.ae-item-sub{font-size:11px;color:var(--text2);margin-top:2px}
.ae-empty{text-align:center;padding:20px;color:var(--text2);font-size:13px}
.sourcing-tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:16px}
.stab{padding:8px 20px;border:none;background:none;cursor:pointer;font-size:13px;color:var(--text2);border-bottom:2px solid transparent;margin-bottom:-1px}
.stab.active{color:var(--text);border-bottom-color:var(--text);font-weight:500}
.sourcing-frame{width:100%;height:calc(100vh - 200px);border:none;border-radius:var(--radius);background:var(--bg2)}
.sourcing-hint{background:var(--amber-bg);border:1px solid #fde68a;border-radius:var(--radius);padding:10px 14px;font-size:12px;color:var(--amber-t);margin-bottom:12px;display:flex;align-items:flex-start;gap:8px}
.import-banner{background:var(--green-bg);border:1px solid #86efac;border-radius:var(--radius);padding:10px 14px;font-size:13px;color:var(--green-t);margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.tag-filter{padding:4px 10px;border-radius:var(--radius);border:1px solid var(--border2);font-size:12px;background:var(--bg);color:var(--text)}
/* MODE ACCUEIL GOOGLE */
.app.home-mode .sidebar{display:none}
.app.home-mode .topbar{display:none}
.app.home-mode .content{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;padding:0 20px;background:var(--bg)}
.home-logo{text-align:center;margin-bottom:40px}
.home-logo h1{font-size:36px;font-weight:700;letter-spacing:-1px;color:var(--text);margin-bottom:4px}
.home-logo p{font-size:14px;color:var(--text2)}
.home-search-wrap{width:100%;max-width:620px;margin-bottom:24px}
.home-search-box{display:flex;align-items:center;gap:10px;padding:14px 18px;border:1.5px solid var(--border2);border-radius:40px;background:var(--bg);box-shadow:0 2px 12px rgba(0,0,0,.08);transition:box-shadow .2s}
.home-search-box:focus-within{box-shadow:0 4px 20px rgba(0,0,0,.12);border-color:var(--text)}
.home-search-box input{flex:1;border:none;outline:none;font-size:16px;background:transparent;color:var(--text)}
.home-search-box input::placeholder{color:var(--text3)}
.home-mic-btn{background:none;border:none;cursor:pointer;font-size:20px;padding:0;line-height:1;flex-shrink:0;opacity:.6;transition:opacity .15s}
.home-mic-btn:hover{opacity:1}
.home-mic-btn.listening{opacity:1;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.home-quick{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;max-width:620px}
.home-quick-btn{padding:10px 18px;border-radius:24px;border:1px solid var(--border2);background:var(--bg);cursor:pointer;font-size:13px;color:var(--text2);display:flex;align-items:center;gap:6px;transition:all .15s}
.home-quick-btn:hover{background:var(--bg2);color:var(--text);border-color:var(--border)}
.home-quick-btn.alert{border-color:#fca5a5;color:#dc2626;background:#fff1f2}
.home-suggestions{width:100%;max-width:620px;margin-top:8px;background:var(--bg);border:1px solid var(--border2);border-radius:16px;overflow:hidden;box-shadow:0 4px 16px rgba(0,0,0,.08)}
.home-sugg-item{padding:10px 18px;cursor:pointer;font-size:13px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)}
.home-sugg-item:last-child{border-bottom:none}
.home-sugg-item:hover{background:var(--bg2)}
.home-greeting{font-size:13px;color:var(--text2);text-align:center;margin-bottom:20px}
.dropzone{border:2px dashed var(--border2);border-radius:var(--radius-lg);padding:32px;text-align:center;cursor:pointer;transition:background .15s}
.dropzone:hover,.dropzone.drag{background:var(--bg2);border-color:#93c5fd}
.api-key-banner{background:var(--amber-bg);border:1px solid #fde68a;border-radius:var(--radius);padding:12px 14px;font-size:13px;color:var(--amber-t);margin-bottom:14px}
.api-key-banner input{margin-top:8px}
</style>
</head>

<div class="app">
  <nav class="sidebar">
    <div class="sidebar-brand" onclick="nav('dashboard',null);document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'))" style="cursor:pointer">ATS Pro<small>Chasseur de têtes</small></div>
    <button class="nav-btn" style="background:var(--text);color:var(--bg);font-weight:600;margin-bottom:4px" onclick="nav('recherche',this)"><i class="ti ti-search"></i>Recherche candidat</button>
    <button class="nav-btn" onclick="nav('clients',this)"><i class="ti ti-building"></i>Clients</button>
    <button class="nav-btn" onclick="nav('missions',this)"><i class="ti ti-briefcase"></i>Missions</button>
    <div style="height:1px;background:var(--border);margin:6px 0"></div>
    <button class="nav-btn action-engine-btn" onclick="openActionEngine()"><i class="ti ti-bolt"></i>⚡ Que faire ?</button>
    <div style="height:1px;background:var(--border);margin:6px 0"></div>
    <button class="nav-btn active" onclick="nav('dashboard',this)"><i class="ti ti-home"></i>Accueil</button>
    <button class="nav-btn" onclick="nav('candidats',this)"><i class="ti ti-users"></i>Candidats</button>
    <button class="nav-btn" onclick="nav('pipeline',this)"><i class="ti ti-git-merge"></i>Pipeline</button>
    <button class="nav-btn" onclick="nav('actions',this)"><i class="ti ti-phone"></i>Actions & CR</button>
    <div style="margin-top:auto;padding-top:8px;border-top:1px solid var(--border)">
      <button class="nav-btn" onclick="nav('recherche',this)"><i class="ti ti-search"></i>Recherche</button>
      <button class="nav-btn" onclick="nav('agenda',this)"><i class="ti ti-calendar"></i>Agenda</button>
      <button class="nav-btn" onclick="nav('stats',this)"><i class="ti ti-chart-bar"></i>Statistiques</button>
      <button class="nav-btn" onclick="nav('importcv',this)"><i class="ti ti-file-upload"></i>Import CV (IA)</button>
      <button class="nav-btn" onclick="nav('sourcing',this)"><i class="ti ti-world"></i>Sourcing web</button>
      <div style="display:flex;gap:4px;margin-top:4px;padding-top:8px;border-top:1px solid var(--border)">
        <button class="btn sm" style="flex:1;font-size:11px" onclick="exportBackup()" title="Exporter une sauvegarde"><i class="ti ti-download"></i>Sauvegarder</button>
        <button class="btn sm" style="flex:1;font-size:11px" onclick="document.getElementById('import-file').click()" title="Restaurer une sauvegarde"><i class="ti ti-upload"></i>Restaurer</button>
        <input type="file" id="import-file" accept=".json" style="display:none" onchange="importBackup(this)">
      </div>
    </div>
  </nav>
  <div class="main">
    <div class="topbar" id="topbar"></div>
    <div class="content" id="content"></div>
  </div>
</div>

const STORAGE_KEY = 'ats_chasseur_tetes_v2';

function loadData() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      const parsed = JSON.parse(saved);
      // Migration : convertit les anciens champs interlocuteur/fonction/email/tel
      // en tableau contacts[] pour la rétrocompatibilité avec les données existantes
      const clients = (parsed.clients || DEFAULT_DATA.clients).map(c => {
        if (!c.contacts) {
          c.contacts = [];
          if (c.interlocuteur) {
            c.contacts.push({
              id: uid('CT'),
              nom: c.interlocuteur || '',
              fonction: c.fonction || '',
              email: c.email || '',
              tel: c.tel || '',
              linkedin: '',
              notes: ''
            });
          }
        }
        return c;
      });
      return {
        clients,
        missions: parsed.missions || DEFAULT_DATA.missions,
        candidats: parsed.candidats || DEFAULT_DATA.candidats,
        pipeline: parsed.pipeline || DEFAULT_DATA.pipeline,
        actions: parsed.actions || DEFAULT_DATA.actions,
        rdvs: parsed.rdvs || DEFAULT_DATA.rdvs,
      };
    }
  } catch(e) { console.warn('Erreur chargement données:', e); }
  return JSON.parse(JSON.stringify(DEFAULT_DATA));
}

function saveData() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(S));

}

function openActionEngine(){
  const today=new Date();
  const todayStr=today.toISOString().slice(0,10);

  const urgents=[];
  const semaine=[];
  const ok=[];

  // 1. Actions "À faire" non réalisées en retard
  S.actions.filter(a=>!a.realise).forEach(a=>{
    const cand=S.candidats.find(x=>x.id===a.candidatId);
    const nom=cand?`${cand.prenom} ${cand.nom}`:'Candidat inconnu';
    const mission=a.missionId?S.missions.find(x=>x.id===a.missionId):null;
    const daysLate=a.datePro?Math.floor((today-new Date(a.datePro))/86400000):null;
    if(daysLate!==null && daysLate>0){
      urgents.push({icon:'📞',title:`${a.type} avec ${nom}`,sub:`En retard de ${daysLate} jour${daysLate>1?'s':''}${mission?' · '+mission.poste:''}`,action:`openCandidatDetail('${a.candidatId}')`});
    } else {
      semaine.push({icon:'📋',title:`${a.type} prévu avec ${nom}`,sub:`À faire${a.datePro?' le '+new Date(a.datePro).toLocaleDateString('fr-FR'):''}${mission?' · '+mission.poste:''}`,action:`openCandidatDetail('${a.candidatId}')`});
    }
  });

  // 2. Candidats en pipeline sans CR depuis 7+ jours
  S.pipeline.forEach(p=>{
    const actsP=S.actions.filter(a=>a.candidatId===p.candidatId&&a.missionId===p.missionId&&a.realise);
    const lastAct=actsP.sort((a,b)=>b.date.localeCompare(a.date))[0];
    const daysSince=lastAct?Math.floor((today-new Date(lastAct.date))/86400000):null;
    if(daysSince!==null && daysSince>=7){
      const cand=S.candidats.find(x=>x.id===p.candidatId);
      const mission=S.missions.find(x=>x.id===p.missionId);
      const nom=cand?`${cand.prenom} ${cand.nom}`:'?';
      const poste=mission?mission.poste:'?';
      const arr=(daysSince>=14?urgents:semaine);
      arr.push({icon:'⏰',title:`Relancer ${nom}`,sub:`${daysSince}j sans contact · ${p.etape} · ${poste}`,action:`openCandidatDetail('${p.candidatId}')`});
    }
  });

  // 3. Missions en cours sans candidat
  S.missions.filter(m=>m.statut==='En cours').forEach(m=>{
    const nb=S.pipeline.filter(p=>p.missionId===m.id).length;
    const cl=getClient(m.clientId);
    if(nb===0){
      urgents.push({icon:'🔍',title:`Sourcer pour ${m.poste}`,sub:`${cl.nom} · Aucun candidat dans le pipeline`,action:`openMissionDetail('${m.id}')`});
    } else if(nb<2){
      semaine.push({icon:'➕',title:`Renforcer le pipeline — ${m.poste}`,sub:`${cl.nom} · Seulement ${nb} candidat`,action:`openMissionDetail('${m.id}')`});
    } else {
      ok.push({icon:'✅',title:`${m.poste} — ${cl.nom}`,sub:`${nb} candidats en cours`,action:`openMissionDetail('${m.id}')`});
    }
  });

  // 4. RDV aujourd'hui ou demain
  const demainStr=new Date(today.getTime()+86400000).toISOString().slice(0,10);
  S.rdvs.filter(r=>r.date===todayStr||r.date===demainStr).forEach(r=>{
    const label=r.date===todayStr?"Aujourd'hui":'Demain';
    urgents.push({icon:'📅',title:`${r.titre}`,sub:`${label} à ${r.heure}${r.lieu?' · '+r.lieu:''}`,action:''});
  });

  function renderItems(items){
    if(!items.length) return '';
    return items.map(it=>`<div class="ae-item ${it===urgents[0]||urgents.includes(it)?'urgent':semaine.includes(it)?'semaine':'ok'}" onclick="${it.action?it.action+';closeModal()':''}">
      <span class="ae-item-icon">${it.icon}</span>
      <div class="ae-item-body"><div class="ae-item-title">${it.title}</div><div class="ae-item-sub">${it.sub}</div></div>
    </div>`).join('');
  }

  const totalActions=urgents.length+semaine.length+ok.length;

  showModal(`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
    <div><h3 style="margin:0">⚡ Que faire aujourd'hui ?</h3><div style="font-size:12px;color:var(--text2);margin-top:2px">${today.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'})}</div></div>
    <button class="btn sm" onclick="queFeraistTu()" style="background:var(--text);color:var(--bg);border:none">🧠 Que ferais-tu à ma place ?</button>
  </div>

  ${urgents.length?`<div class="ae-section">
    <div class="ae-section-title">🔴 Urgent (${urgents.length})</div>
    ${renderItems(urgents)}
  </div>`:''}

  ${semaine.length?`<div class="ae-section">
    <div class="ae-section-title">🟡 Cette semaine (${semaine.length})</div>
    ${renderItems(semaine)}
  </div>`:''}

  ${ok.length?`<div class="ae-section">
    <div class="ae-section-title">🟢 En bonne voie (${ok.length})</div>
    ${renderItems(ok)}
  </div>`:''}

  ${totalActions===0?`<div class="ae-empty">🎉 Tout est à jour — rien d'urgent aujourd'hui !</div>`:''}

  <div id="ae-ia-result"></div>
  <div class="modal-footer"><button class="btn" onclick="closeModal()">Fermer</button></div>`);
}

async function queFeraistTu(){
  if(!getApiKey()){ alert('Configurez d\'abord votre clé API Anthropic.'); return; }
  const btn=document.querySelector('button[onclick="queFeraistTu()"]');
  if(btn){ btn.disabled=true; btn.innerHTML='<i class="ti ti-loader-2"></i> Je réfléchis…'; }

  const today=new Date().toISOString().slice(0,10);

  // Contexte complet
  const missionsDetail=S.missions.filter(m=>m.statut==='En cours').map(m=>{
    const cl=getClient(m.clientId);
    const nb=S.pipeline.filter(p=>p.missionId===m.id).length;
    const mem=m.memory;
    const memStr=mem&&(mem.implicites?.length||mem.adn?.length)?
      ` [Mémoire: ${[...(mem.implicites||[]),...(mem.adn||[])].slice(0,2).join(', ')}]`:'';
    return`- ${m.poste} / ${cl.nom} / ${nb} candidat(s) / cible: ${m.dateCible||'?'}${memStr}`;
  }).join('\n');

  const pipelineDetail=S.pipeline.map(p=>{
    const cand=S.candidats.find(x=>x.id===p.candidatId);
    const mission=S.missions.find(x=>x.id===p.missionId);
    const cl=mission?getClient(mission.clientId):{nom:'?'};
    const actsP=S.actions.filter(a=>a.candidatId===p.candidatId&&a.realise).sort((a,b)=>b.date.localeCompare(a.date));
    const lastAct=actsP[0];
    const daysSince=lastAct?Math.floor((new Date()-new Date(lastAct.date))/86400000):'jamais contacté';
    const lastCR=lastAct?.cr?lastAct.cr.slice(0,80):'—';
    return`- ${cand?cand.prenom+' '+cand.nom:'?'} → ${mission?mission.poste:'?'} (${cl.nom}) / étape: ${p.etape} / dernier contact: ${daysSince}j / décision client: ${p.decClient} / décision candidat: ${p.decCand} / CR: ${lastCR}`;
  }).join('\n');

  const actionsEnRetard=S.actions.filter(a=>!a.realise&&a.datePro&&new Date(a.datePro)<new Date()).map(a=>{
    const cand=S.candidats.find(x=>x.id===a.candidatId);
    const days=Math.floor((new Date()-new Date(a.datePro))/86400000);
    return`- ${a.type} avec ${cand?cand.prenom+' '+cand.nom:'?'} — en retard de ${days}j`;
  }).join('\n');

  const msVides=S.missions.filter(m=>m.statut==='En cours'&&S.pipeline.filter(p=>p.missionId===m.id).length===0).map(m=>{
    const cl=getClient(m.clientId);
    return`- ${m.poste} / ${cl.nom} — pipeline vide`;
  }).join('\n');

  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':getApiKey(),'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({
        model:'claude-sonnet-4-6',
        max_tokens:1200,
        messages:[{role:'user',content:`Tu es un associé senior en cabinet de chasse de têtes avec 20 ans d'expérience. Tu donnes un conseil franc, direct et actionnable à Laurent, chasseur de têtes indépendant.

Réponds EXACTEMENT dans ce format, avec ce style :

"Si j'étais toi...

1️⃣ [Action précise avec nom réel]
[Raison concrète en 1 phrase — probabilité ou enjeu chiffré si possible]

2️⃣ [Action précise]
[Raison]

..."

Maximum 5 actions. Cite les vrais noms de candidats, missions et clients. Sois direct comme un associé qui connait tous les dossiers. Tu peux aussi dire "je laisserais tomber X" ou "X n'est pas prioritaire" si le ROI est faible. Utilise des données précises (nombre de jours, étapes, décisions).

Date aujourd'hui : ${today}

MISSIONS EN COURS :
${missionsDetail||'Aucune'}

PIPELINE COMPLET :
${pipelineDetail||'Vide'}

ACTIONS EN RETARD :
${actionsEnRetard||'Aucune'}

MISSIONS SANS CANDIDAT :
${msVides||'Aucune'}`}]
      })
    });
    const data=await res.json();
    const text=data.content[0].text;
    const el=document.getElementById('ae-ia-result');
    if(el) el.innerHTML=`
      <div style="margin-top:16px;padding:16px;background:linear-gradient(135deg,#1e1b4b 0%,#312e81 100%);border-radius:var(--radius);color:#e0e7ff">
        <div style="font-size:11px;font-weight:600;letter-spacing:.08em;color:#a5b4fc;margin-bottom:12px;text-transform:uppercase">🧠 Si j'étais toi — Conseil IA</div>
        <div style="font-size:13px;line-height:1.8;white-space:pre-wrap;color:#e0e7ff">${esc(text)}</div>
      </div>`;
    if(btn){ btn.disabled=false; btn.innerHTML='🧠 Que ferais-tu à ma place ?'; }
  }catch(e){
    if(btn){ btn.disabled=false; btn.innerHTML='🧠 Que ferais-tu à ma place ?'; }
    alert('Erreur : '+e.message);
  }
}

function homeSearchGo(q){
  if(!q.trim()) return;
  const ql=q.toLowerCase().trim();

  // ── Commandes navigation ──
  if(ql.includes('que faire')||ql.includes('priorité')||ql.includes('urgence')||ql.includes('priorités du moment')||ql.includes('quoi faire')||ql.includes('par où commencer')||ql.includes('mes priorités')||ql.includes('agenda du jour')||ql.includes('journée')||ql.includes('aujourd\'hui')){ openActionEngine(); return; }
  if(ql.includes('pipeline')){ navFromHome('pipeline'); return; }
  if(ql.includes('agenda')||ql.includes('rendez-vous')||ql.includes('rdv')){ navFromHome('agenda'); return; }
  if(ql.includes('stats')||ql.includes('statistiques')){ navFromHome('stats'); return; }
  if(ql.includes('import cv')||ql.includes('importer cv')){ navFromHome('importcv'); return; }
  if(ql.includes('sourcing')){ navFromHome('sourcing'); return; }
  if(ql.includes('nouveau candidat')||ql.includes('ajouter candidat')){ navFromHome('candidats'); setTimeout(()=>openCandidatModal(),100); return; }
  if(ql.includes('nouvelle mission')||ql.includes('ajouter mission')){ navFromHome('missions'); setTimeout(()=>openMissionModal(),100); return; }
  if(ql.includes('nouveau client')||ql.includes('ajouter client')){ navFromHome('clients'); setTimeout(()=>openClientModal(),100); return; }
  if(ql.includes('paramètres')||ql.includes('settings')){ openSettings(); return; }

  // ── Commandes filtrées ──
  if(ql.includes('clients actifs')||ql.includes('client actif')){
    navFromHome('clients'); return;
  }
  if(ql.includes('candidats disponibles')||ql.includes('candidat disponible')){
    navFromHome('candidats');
    setTimeout(()=>renderCandidats('',''),100);
    return;
  }
  if(ql.includes('missions en cours')||ql.includes('mission en cours')){
    navFromHome('missions'); return;
  }

  // ── Commande "appelle [nom]" ──
  const appelMatch=ql.match(/^appelle?\s+(.+)$/);
  if(appelMatch){
    const nomRecherche=appelMatch[1].toLowerCase();
    const cand=S.candidats.find(c=>`${c.prenom} ${c.nom}`.toLowerCase().includes(nomRecherche));
    if(cand){
      openCandidatDetail(cand.id);
      // Mettre le téléphone en évidence après ouverture
      setTimeout(()=>{
        const telEl=document.querySelector('.info-val a[href^="tel"]');
        if(telEl){ telEl.style.background='#fef08a';telEl.style.padding='2px 6px';telEl.style.borderRadius='4px'; }
      },200);
      return;
    }
  }

  // ── Commande "présente-moi [nom]" ──
  const presenMatch=ql.match(/^pr[eé]sente[- ]moi\s+(.+)$/);
  if(presenMatch){
    const nomRecherche=presenMatch[1].toLowerCase();
    const cand=S.candidats.find(c=>`${c.prenom} ${c.nom}`.toLowerCase().includes(nomRecherche));
    if(cand){ closeModal(); openFichePresentation(cand.id); return; }
  }

  // ── Commande "matching [poste/mission]" ──
  const matchingMatch=ql.match(/^matching\s+(.+)$/);
  if(matchingMatch){
    const posteRecherche=matchingMatch[1].toLowerCase();
    const mission=S.missions.find(m=>m.poste.toLowerCase().includes(posteRecherche));
    if(mission){ matchingIA(mission.id); return; }
  }

  // ── Commande "montre-moi [section]" ──
  const montreMatch=ql.match(/^montre[- ]moi\s+(?:le|la|les|mon|ma|mes)?\s*(.+)$/);
  if(montreMatch){
    const cible=montreMatch[1].toLowerCase();
    if(cible.includes('pipeline')){ navFromHome('pipeline'); return; }
    if(cible.includes('client')){ navFromHome('clients'); return; }
    if(cible.includes('mission')){ navFromHome('missions'); return; }
    if(cible.includes('candidat')){ navFromHome('candidats'); return; }
    if(cible.includes('agenda')){ navFromHome('agenda'); return; }
    // Sinon chercher un candidat ou mission par nom
    const cand=S.candidats.find(c=>`${c.prenom} ${c.nom}`.toLowerCase().includes(cible));
    if(cand){ openCandidatDetail(cand.id); return; }
    const mission=S.missions.find(m=>m.poste.toLowerCase().includes(cible));
    if(mission){ openMissionDetail(mission.id); return; }
  }

  // ── Commande intelligente "aide-moi à trouver mon CFO à Lyon" ──
  // Détection large : si la phrase contient trouver/chercher/aider ET une mission connue
  const missionDansPhrase=S.missions.find(m=>ql.includes(m.poste.toLowerCase()));
  const parsedQ=parseQuery(ql);
  if(missionDansPhrase&&(ql.includes('trouver')||ql.includes('chercher')||ql.includes('aider')||ql.includes('trouve')||ql.includes('cherche')||ql.includes('matching'))){
    rechercheAvecMatching(missionDansPhrase.id, parsedQ.ville, q);
    return;
  }
  const trouverMatch=ql.match(/(?:trouve[- ]?moi|cherche[- ]?moi|aide[- ]?(?:moi )?(?:à|a) trouver|peux[- ]?tu (?:m['']aider (?:à|a) )?trouver|m['']aider (?:à|a) trouver|trouver|chercher)\s+(?:un|une|des|mon|ma|mes|le|la|les)?\s*(.+)/i);
  if(trouverMatch){
    const terme=trouverMatch[1].trim();
    // Détecter ville dans le terme
    const parsed=parseQuery(terme);

    // Chercher une mission correspondant au poste
    let missionTrouvee=null;
    if(parsed.motsCles.length){
      missionTrouvee=S.missions.find(m=>
        m.statut==='En cours' &&
        parsed.motsCles.every(mc=>m.poste.toLowerCase().includes(mc))
      );
    }

    if(missionTrouvee){
      // On a une mission ET potentiellement une ville → matching IA intelligent
      rechercheAvecMatching(missionTrouvee.id, parsed.ville, terme);
    } else {
      // Pas de mission trouvée → recherche simple
      navFromHome('recherche');
      setTimeout(()=>doSearch(terme),150);
    }
    return;
  }

  // ── Recherche générale ──
  navFromHome('recherche');
  setTimeout(()=>doSearch(q),150);
}

async function rechercheAvecMatching(missionId, ville, termeOriginal){
  if(!getApiKey()){ alert('Configurez d\'abord votre clé API Anthropic.'); return; }

  const m=S.missions.find(x=>x.id===missionId);
  const cl=getClient(m.clientId);

  // Filtrer les candidats mobiles sur la ville si précisée
  let candidatsFiltres=S.candidats;
  if(ville){
    candidatsFiltres=S.candidats.filter(c=>mobiliteMatch(c,ville));
  }

  if(!candidatsFiltres.length){
    showModal(`<h3>🔍 Recherche — ${esc(termeOriginal)}</h3>
      <div class="empty">Aucun candidat ${ville?`mobile sur ${ville} `:''}trouvé dans le vivier.<br><small>Essayez d'élargir la mobilité ou de sourcer de nouveaux profils.</small></div>
      <div class="modal-footer"><button class="btn" onclick="closeModal()">Fermer</button></div>`);
    return;
  }

  // Afficher une modale de chargement
  showModal(`<h3>🔍 ${esc(termeOriginal)}</h3>
    <div style="text-align:center;padding:24px">
      <i class="ti ti-loader-2" style="font-size:28px;color:var(--text2);animation:spin 1s linear infinite"></i>
      <div style="margin-top:12px;color:var(--text2);font-size:13px">Analyse de ${candidatsFiltres.length} candidat${candidatsFiltres.length>1?'s':''}${ville?` mobiles sur ${ville}`:''}…</div>
    </div>`);

  const missionDesc=`Poste : ${m.poste}\nClient : ${cl.nom} (${m.ville||''})\nSecteur : ${cl.secteur||''}\nContrat : ${m.contrat||''}\nRémunération : ${m.remun||''}\nNotes : ${m.notes||''}`;

  const mem=m.memory;
  let memoireDesc='';
  if(mem){
    if(mem.implicites?.length) memoireDesc+=`\nCritères implicites : ${mem.implicites.join(', ')}`;
    if(mem.refus?.length) memoireDesc+=`\nProfils refusés : ${mem.refus.join(', ')}`;
    if(mem.adn?.length) memoireDesc+=`\nADN bon profil : ${mem.adn.join(', ')}`;
  }

  const climem=cl.memory;
  let clientMemDesc='';
  if(climem){
    if(climem.implicites?.length) clientMemDesc+=`\nCritères client : ${climem.implicites.join(', ')}`;
    if(climem.refus?.length) clientMemDesc+=`\nProfils refusés : ${climem.refus.join(', ')}`;
  }

  const candidatsDesc=candidatsFiltres.map(c=>
    `${c.prenom} ${c.nom} | ${c.poste||''} | ${c.exp||'?'} ans | ${c.spe||''} | ${c.ville||''} | mobilité: ${c.mobilite||'?'} | dispo: ${c.dispo||'?'} | prétentions: ${c.pretentions||'?'}`
  ).join('\n');

  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':getApiKey(),'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({
        model:'claude-sonnet-4-6',
        max_tokens:1000,
        messages:[{role:'user',content:`Tu es un chasseur de têtes expert. Voici une mission et des candidats pré-filtrés${ville?' sur la zone '+ville:''}. Classe les 5 meilleurs avec un score /10 et une justification de 2 phrases max.\n\nMISSION :\n${missionDesc}${memoireDesc?'\n\nMÉMOIRE MISSION :'+memoireDesc:''}${clientMemDesc?'\n\nMÉMOIRE CLIENT :'+clientMemDesc:''}\n\nCANDIDATS${ville?' MOBILES SUR '+ville.toUpperCase():''}:\n${candidatsDesc}\n\nJSON uniquement : {"resultats":[{"nom":"Prénom Nom","score":8.5,"justification":"...","disponibilite":"...","mobilite":"..."}]}`}]
      })
    });
    const data=await res.json();
    const text=data.content[0].text;
    let json;
    try{ json=JSON.parse(text.replace(/```json|```/g,'').trim()); }
    catch(e){ const mt=text.match(/\{[\s\S]*\}/); if(mt) json=JSON.parse(mt[0]); else throw new Error('Réponse invalide'); }

    const resultats=json.resultats||[];

    showModal(`<div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">
      <div>
        <h3 style="margin:0">🎯 ${esc(m.poste)}${ville?' à '+ville.charAt(0).toUpperCase()+ville.slice(1):''}</h3>
        <div style="font-size:12px;color:var(--text2);margin-top:2px">${cl.nom} · ${candidatsFiltres.length} candidat${candidatsFiltres.length>1?'s':''} analysé${candidatsFiltres.length>1?'s':''}</div>
      </div>
      <button class="btn primary" style="margin-left:auto" onclick="closeModal();openMissionDetail('${missionId}')"><i class="ti ti-briefcase"></i> Voir la mission</button>
    </div>

    ${resultats.map((r,i)=>{
      const cand=S.candidats.find(c=>`${c.prenom} ${c.nom}`.toLowerCase()===r.nom.toLowerCase())||
                 S.candidats.find(c=>r.nom.toLowerCase().includes(c.nom.toLowerCase()));
      const scoreColor=r.score>=8?'#16a34a':r.score>=6?'#d97706':'#dc2626';
      const scoreBg=r.score>=8?'#dcfce7':r.score>=6?'#fef3c7':'#fee2e2';
      return`<div style="display:flex;align-items:flex-start;gap:12px;padding:12px 0;border-bottom:1px solid var(--border);cursor:pointer" onclick="${cand?`closeModal();setTimeout(()=>openCandidatDetail('${cand.id}'),50)`:''}">
        <div style="font-size:22px;font-weight:700;color:var(--text3);width:24px;flex-shrink:0;text-align:center">${i+1}</div>
        <div style="flex:1">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
            <strong style="font-size:14px">${esc(r.nom)}</strong>
            <span style="background:${scoreBg};color:${scoreColor};padding:2px 8px;border-radius:12px;font-size:12px;font-weight:700">${r.score}/10</span>
            ${r.disponibilite?`<span style="font-size:11px;color:var(--text2)">Dispo: ${esc(r.disponibilite)}</span>`:''}
          </div>
          ${r.mobilite?`<div style="font-size:11px;color:#16a34a;margin-bottom:4px">✓ ${esc(r.mobilite)}</div>`:''}
          <div style="font-size:13px;color:var(--text);line-height:1.5">${esc(r.justification)}</div>
        </div>
        ${cand?`<i class="ti ti-chevron-right" style="color:var(--text3);flex-shrink:0;margin-top:4px"></i>`:''}
      </div>`;
    }).join('')}

    <div class="modal-footer">
      <button class="btn" onclick="closeModal()">Fermer</button>
      <button class="btn primary" onclick="closeModal();openMissionDetail('${missionId}');setTimeout(()=>matchingIA('${missionId}'),300)"><i class="ti ti-sparkles"></i> Matching complet</button>
    </div>`);

  }catch(e){
    showModal(`<h3>Erreur</h3><p>${e.message}</p><div class="modal-footer"><button class="btn" onclick="closeModal()">Fermer</button></div>`);
  }
}

let homeMicActive=false;
function toggleHomeMic(){
  if(!('webkitSpeechRecognition' in window||'SpeechRecognition' in window)){
    alert('Utilisez Chrome pour la commande vocale.');return;
  }
  const btn=document.getElementById('home-mic');
  if(homeMicActive){ homeMicActive=false; if(btn) btn.classList.remove('listening'); return; }
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  const rec=new SR();
  rec.lang='fr-FR';rec.continuous=false;rec.interimResults=false;
  homeMicActive=true;
  if(btn) btn.classList.add('listening');
  rec.onresult=(e)=>{
    const t=e.results[0][0].transcript;
    const inp=document.getElementById('home-q');
    if(inp) inp.value=t;
    homeSearchGo(t);
  };
  rec.onend=()=>{ homeMicActive=false; const b=document.getElementById('home-mic'); if(b) b.classList.remove('listening'); };
  rec.start();
}

function saveClient(id){
  if(!v('f-nom'))return alert('Le nom est obligatoire');
  const contacts=[];
  document.querySelectorAll('#contacts-list .card').forEach(block=>{
    const nom=block.querySelector('.ct-nom')?.value.trim()||'';
    const fon=block.querySelector('.ct-fon')?.value.trim()||'';
    const email=block.querySelector('.ct-email')?.value.trim()||'';
    const tel=block.querySelector('.ct-tel')?.value.trim()||'';
    const linkedin=block.querySelector('.ct-linkedin')?.value.trim()||'';
    const notes=block.querySelector('.ct-notes')?.value.trim()||'';
    if(nom||email||tel) contacts.push({id:uid('CT'),nom,fonction:fon,email,tel,linkedin,notes});
  });
  const existing=id?S.clients.find(x=>x.id===id):null;
  const d={id:id||uid('CLI'),nom:v('f-nom'),secteur:v('f-sec'),ville:v('f-vil'),adresse:v('f-adr'),statut:v('f-sta'),notes:v('f-not'),contacts,
    interlocuteur:contacts[0]?.nom||'', fonction:contacts[0]?.fonction||'', email:contacts[0]?.email||'', tel:contacts[0]?.tel||'',
    memory:existing?.memory||{implicites:[],style:[],refus:[],preferences:[]}

function switchCliTab(clientId, tab, btn){
  ['infos','memoire','missions'].forEach(t=>{
    const el=document.querySelector(`#cli-tab-${t}-${clientId}`);
    if(el) el.style.display=t===tab?'block':'none';
  });
  const tabBar=document.querySelector(`#cli-main-tabs-${clientId}`);
  if(tabBar) tabBar.querySelectorAll('.stab').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
}

function switchCliMemTab(clientId, key, btn){
  ['implicites','style','refus','preferences'].forEach(k=>{
    const el=document.querySelector(`#climsec-${k}-${clientId}`);
    if(el) el.style.display=k===key?'block':'none';
  });
  if(btn){
    const tabs=btn.closest('.mem-tabs');
    if(tabs) tabs.querySelectorAll('.mem-tab').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
  }
}

function cliMemAdd(clientId, key){
  const inp=document.getElementById(`climem-inp-${key}-${clientId}`);
  if(!inp||!inp.value.trim()) return;
  const c=S.clients.find(x=>x.id===clientId);
  if(!c.memory) c.memory={implicites:[],style:[],refus:[],preferences:[]};
  c.memory[key].push(inp.value.trim());
  saveData();
  openClientDetail(clientId);
  setTimeout(()=>{
    switchCliTab(clientId,'memoire',null);
    document.querySelectorAll(`#cli-main-tabs-${clientId} .stab`)[1]?.classList.add('active');
    document.querySelectorAll(`#cli-main-tabs-${clientId} .stab`)[0]?.classList.remove('active');
    switchCliMemTab(clientId,key,null);
  },10);
}

function cliMemDel(clientId, key, idx){
  const c=S.clients.find(x=>x.id===clientId);
  if(!c.memory) return;
  c.memory[key].splice(idx,1);
  saveData();
  openClientDetail(clientId);
  setTimeout(()=>{
    switchCliTab(clientId,'memoire',null);
    document.querySelectorAll(`#cli-main-tabs-${clientId} .stab`)[1]?.classList.add('active');
    document.querySelectorAll(`#cli-main-tabs-${clientId} .stab`)[0]?.classList.remove('active');
  },10);
}

  m.memory[key].push(inp.value.trim());
  saveData();
  openMissionDetail(missionId);
  // Rerouvrir sur le bon onglet mémoire
  setTimeout(()=>{
    switchMissionTab(missionId,'memoire',null);
    document.querySelectorAll(`#mission-main-tabs-${missionId} .stab`)[1]?.classList.add('active');
    document.querySelectorAll(`#mission-main-tabs-${missionId} .stab`)[0]?.classList.remove('active');
    switchMemTab(missionId,key,document.querySelector(`.mem-tab[onclick*="'${key}'"]`)||document.querySelector('.mem-tab'));
  },10);
}

function memDel(missionId, key, idx){
  const m=S.missions.find(x=>x.id===missionId);
  if(!m.memory) return;
  m.memory[key].splice(idx,1);
  saveData();
  openMissionDetail(missionId);
  setTimeout(()=>{
    switchMissionTab(missionId,'memoire',null);
    document.querySelectorAll(`#mission-main-tabs-${missionId} .stab`)[1]?.classList.add('active');
    document.querySelectorAll(`#mission-main-tabs-${missionId} .stab`)[0]?.classList.remove('active');
  },10);
}

async function analyserCRMemoire(missionId){
  if(!getApiKey()){ alert('Configurez d\'abord votre clé API Anthropic.'); return; }
  const m=S.missions.find(x=>x.id===missionId);
  const acts=S.actions.filter(a=>a.missionId===missionId && a.cr && a.cr.trim());
  if(!acts.length){ alert('Aucun compte-rendu trouvé pour cette mission.'); return; }

  const btn=document.querySelector(`button[onclick="analyserCRMemoire('${missionId}')"]`);
  if(btn){ btn.disabled=true; btn.innerHTML='<i class="ti ti-loader-2"></i> Analyse…'; }

  const crText=acts.map(a=>`[${fmtDate(a.date)} — ${getCandidatName(a.candidatId)}] ${a.cr}`).join('\n\n');
  const cl=getClient(m.clientId);

  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':getApiKey(),'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({
        model:'claude-sonnet-4-6',
        max_tokens:1500,
        messages:[{role:'user',content:`Tu es un chasseur de têtes expert. Analyse ces comptes-rendus d'une mission de recrutement et extrait des insights structurés.

MISSION : ${m.poste} chez ${cl.nom} (${m.ville||''})
BRIEF : ${m.notes||'Non renseigné'}

COMPTES-RENDUS :
${crText}

Extrait les insights suivants et réponds UNIQUEMENT en JSON sans markdown :
{
  "implicites": ["critère implicite 1", "critère implicite 2"...],
  "refus": ["Candidat X refusé — raison", ...],
  "objections": ["objection candidat 1", ...],
  "adn": ["trait commun aux bons profils 1", ...]
}

Sois concis, factuel, basé uniquement sur les CR. Maximum 5 items par catégorie. Ne mets rien si tu n'as pas d'éléments solides.`}]
      })
    });
    const data=await res.json();
    const text=data.content[0].text;
    let json;
    try{ json=JSON.parse(text.replace(/```json|```/g,'').trim()); }
    catch(e){ const match=text.match(/\{[\s\S]*\}/); if(match) json=JSON.parse(match[0]); else throw new Error('Réponse IA invalide'); }

    if(!m.memory) m.memory={implicites:[],refus:[],objections:[],adn:[]};
    // Fusionner sans doublons
    ['implicites','refus','objections','adn'].forEach(k=>{
      if(json[k]) json[k].forEach(item=>{ if(!m.memory[k].includes(item)) m.memory[k].push(item); });
    });
    saveData();
    openMissionDetail(missionId);
    setTimeout(()=>{
      switchMissionTab(missionId,'memoire',null);
      document.querySelectorAll(`#mission-main-tabs-${missionId} .stab`)[1]?.classList.add('active');
      document.querySelectorAll(`#mission-main-tabs-${missionId} .stab`)[0]?.classList.remove('active');
    },10);
    const total=(json.implicites||[]).length+(json.refus||[]).length+(json.objections||[]).length+(json.adn||[]).length;
    if(total===0) alert('Aucun insight extrait — les CR sont peut-être trop courts.');
  }catch(e){
    if(btn){ btn.disabled=false; btn.innerHTML='<i class="ti ti-sparkles"></i> Analyser les CR'; }
    alert('Erreur : '+e.message);
  }
}

{"similaires":[{"id":"ID_EXACT","score":8.5,"justification":"..."},...]}`}]
      })

    const data=await res.json();

    const resultats=json.similaires||[];

    // Afficher dans une section sous les onglets

let voiceRecognition=null;
let voiceActive=false;

function toggleVoice(){
  if(!('webkitSpeechRecognition' in window||'SpeechRecognition' in window)){
    alert('La reconnaissance vocale n\'est pas supportée sur ce navigateur. Utilisez Chrome.');
    return;
  }
  if(voiceActive){ stopVoice(); return; }

  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  voiceRecognition=new SR();
  voiceRecognition.lang='fr-FR';
  voiceRecognition.continuous=false;
  voiceRecognition.interimResults=true;

  const btn=document.getElementById('mic-btn');
  const icon=document.getElementById('mic-icon');
  if(btn){ btn.style.background='#ef4444';btn.style.color='#fff';btn.style.border='none'; }
  if(icon){ icon.className='ti ti-microphone-off'; }
  voiceActive=true;

  voiceRecognition.onresult=(e)=>{
    const transcript=Array.from(e.results).map(r=>r[0].transcript).join('');
    const inp=document.getElementById('search-input');
    if(inp) inp.value=transcript;
    if(e.results[0].isFinal){
      handleVoiceCommand(transcript.toLowerCase().trim());
    }
  };

  voiceRecognition.onerror=()=>stopVoice();
  voiceRecognition.onend=()=>stopVoice();
  voiceRecognition.start();
}

function stopVoice(){
  voiceActive=false;
  if(voiceRecognition) try{ voiceRecognition.stop(); }catch(e){}
  const btn=document.getElementById('mic-btn');
  const icon=document.getElementById('mic-icon');
  if(btn){ btn.style.background='';btn.style.color='';btn.style.border=''; }
  if(icon){ icon.className='ti ti-microphone'; }
}

function handleVoiceCommand(text){
  // Commandes spéciales
  if(text.includes('que faire')||text.includes('priorité')||text.includes('action')){
    closeModal(); openActionEngine(); return;
  }
  if(text.includes('nouveau candidat')||text.includes('ajouter candidat')){
    closeModal(); nav('candidats',null); setTimeout(()=>openCandidatModal(),100); return;
  }
  if(text.includes('nouvelle mission')||text.includes('ajouter mission')){
    closeModal(); nav('missions',null); setTimeout(()=>openMissionModal(),100); return;
  }
  if(text.includes('tableau de bord')||text.includes('accueil')){
    nav('dashboard',null); return;
  }
  if(text.includes('agenda')||text.includes('rendez-vous')||text.includes('rdv')){
    nav('agenda',null); return;
  }
  // Sinon : recherche
  doSearch(text);
}

// Zones de mobilité — permet de matcher "Marseille" avec "PACA", "Sud", "France entière", etc.
const MOBILITE_ZONES={
  'paris':['paris','île-de-france','idf','ile-de-france','75','92','93','94','95','77','78','91','france entière','france entiere','national','toute france'],
  'lyon':['lyon','auvergne','rhône-alpes','rhone-alpes','69','france entière','france entiere','national','toute france'],
  'marseille':['marseille','paca','provence','13','bouches-du-rhône','bouches-du-rhone','sud','france entière','france entiere','national','toute france'],
  'bordeaux':['bordeaux','gironde','33','nouvelle-aquitaine','aquitaine','france entière','france entiere','national','toute france'],
  'toulouse':['toulouse','haute-garonne','31','occitanie','france entière','france entiere','national','toute france'],
  'nantes':['nantes','loire-atlantique','44','pays de la loire','france entière','france entiere','national','toute france'],
  'lille':['lille','nord','59','hauts-de-france','france entière','france entiere','national','toute france'],
  'strasbourg':['strasbourg','bas-rhin','67','alsace','grand-est','france entière','france entiere','national','toute france'],
  'nice':['nice','alpes-maritimes','06','paca','provence','côte d\'azur','cote d\'azur','france entière','france entiere','national','toute france'],
  'rennes':['rennes','ille-et-vilaine','35','bretagne','france entière','france entiere','national','toute france'],
};

function mobiliteMatch(candidat, villeRecherche){
  if(!villeRecherche) return true;
  const vl=villeRecherche.toLowerCase().trim();
  const mob=(candidat.mobilite||'').toLowerCase();
  const villeCand=(candidat.ville||'').toLowerCase();

  // Match direct
  if(mob.includes(vl)||villeCand.includes(vl)) return true;

  // Match via zones
  const zones=MOBILITE_ZONES[vl]||[];
  if(zones.some(z=>mob.includes(z))) return true;

  // Mobilité nationale/internationale couvre tout
  if(mob.includes('france entière')||mob.includes('france entiere')||
     mob.includes('national')||mob.includes('toute france')||
     mob.includes('international')||mob.includes('europe')) return true;

  return false;
}

function parseQuery(q){
  // Découpe la requête en mots-clés, détecte les villes en fin de query
  const mots=q.trim().toLowerCase().split(/\s+/).filter(Boolean);
  const villesConnues=Object.keys(MOBILITE_ZONES);

  // Cherche une ville dans la query
  let ville=null;
  let motsCles=[];
  mots.forEach(m=>{
    if(villesConnues.includes(m)||Object.values(MOBILITE_ZONES).flat().some(z=>z===m)){
      ville=m;
    } else {
      motsCles.push(m);
    }
  });

  // Si pas de ville trouvée, tous les mots sont des mots-clés
  if(!ville) motsCles=mots;

  return{motsCles, ville, original:q.trim()};
}

function matchCandidatIntelligent(c, parsed){
  const {motsCles, ville, original} = parsed;
  const champsCandidats=[c.nom,c.prenom,c.poste,c.societe,c.spe,c.notes,c.email,c.pretentions,c.dispo,c.mobilite,c.ville].map(x=>(x||'').toLowerCase());
  const texte=champsCandidats.join(' ');

  // Tous les mots-clés doivent matcher dans les champs texte
  const motsMatch=motsCles.every(m=>texte.includes(m));

  // La ville doit matcher la mobilité
  const villeMatch=!ville || mobiliteMatch(c, ville);

  return motsMatch && villeMatch;
}

function matchScore(fields,q){
  const ql=q.toLowerCase();
  return fields.some(f=>f&&String(f).toLowerCase().includes(ql));
}

function buildSearchResults(q){
  if(!q.trim())return'';
  const ql=q.trim();
  const parsed=parseQuery(ql);
  let html='';let total=0;

  // Candidats — recherche intelligente mobilité
  if(searchFilters.candidats){
    const hits=S.candidats.filter(c=>matchCandidatIntelligent(c, parsed));
    total+=hits.length;
    if(hits.length){
      html+=`<div class="card"><div class="card-header"><i class="ti ti-users" style="color:var(--blue-t)"></i> Candidats <span class="badge b-blue">${hits.length}</span>${parsed.ville?`<span style="font-size:11px;color:var(--text2);margin-left:8px">📍 Mobiles sur ${parsed.ville.charAt(0).toUpperCase()+parsed.ville.slice(1)}</span>`:''}
      </div>
      <table><thead><tr><th>Nom</th><th>Poste actuel</th><th>Société</th><th>Spécialisation</th><th>Ville</th><th>Mobilité</th><th>Dispo</th><th>Statut</th><th></th></tr></thead><tbody>
      ${hits.map(c=>`<tr>
        <td><button class="link-btn" onclick="openCandidatDetail('${c.id}')">${esc(c.prenom+' '+c.nom)}</button></td>
        <td>${esc(c.poste)}</td><td>${esc(c.societe)}</td><td>${esc(c.spe)}</td>
        <td>${esc(c.ville)}</td>
        <td><span style="font-size:12px;color:${parsed.ville&&mobiliteMatch(c,parsed.ville)?'var(--green-t)':'var(--text2)'}">${esc(c.mobilite)||'—'}</span></td>
        <td>${esc(c.dispo)}</td>
        <td><span class="badge ${STATUT_CD[c.statut]||'b-gray'}">${c.statut}</span></td>
        <td><div style="display:flex;gap:4px">
          <button class="btn sm" title="Lier mission" onclick="openPipelineModal('','${c.id}')"><i class="ti ti-git-merge"></i></button>
          <button class="btn sm" title="Action" onclick="openActionModal('${c.id}','')"><i class="ti ti-phone"></i></button>
        </div></td></tr>`).join('')}
      </tbody></table></div>`;
    }
  }

  // Missions
  if(searchFilters.missions){
    const hits=S.missions.filter(m=>matchScore([m.poste,m.ville,m.remun,m.contrat,m.notes,getClient(m.clientId).nom],ql));
    total+=hits.length;
    if(hits.length){
      html+=`<div class="card"><div class="card-header"><i class="ti ti-briefcase" style="color:var(--blue-t)"></i> Missions <span class="badge b-blue">${hits.length}</span></div>
      <table><thead><tr><th>Poste</th><th>Client</th><th>Statut</th><th>Rémunération</th><th>Ville</th><th></th></tr></thead><tbody>
      ${hits.map(m=>`<tr>
        <td><button class="link-btn" onclick="openMissionDetail('${m.id}')">${esc(m.poste)}</button></td>
        <td>${esc(getClient(m.clientId).nom)}</td>
        <td><span class="badge ${STATUT_MS[m.statut]||'b-gray'}">${m.statut}</span></td>
        <td>${esc(m.remun)||'—'}</td><td>${esc(m.ville)}</td>
        <td><button class="btn sm" onclick="setNavPipeline('${m.id}')"><i class="ti ti-git-merge"></i> Pipeline</button></td>
      </tr>`).join('')}
      </tbody></table></div>`;
    }
  }

  // Clients
  if(searchFilters.clients){
    const hits=S.clients.filter(c=>matchScore([c.nom,c.secteur,c.interlocuteur,c.fonction,c.ville,c.notes,c.email],ql));
    total+=hits.length;
    if(hits.length){
      html+=`<div class="card"><div class="card-header"><i class="ti ti-building" style="color:var(--blue-t)"></i> Clients <span class="badge b-blue">${hits.length}</span></div>
      <table><thead><tr><th>Société</th><th>Secteur</th><th>Interlocuteur</th><th>Ville</th><th>Statut</th><th></th></tr></thead><tbody>
      ${hits.map(c=>`<tr>
        <td><button class="link-btn" onclick="openClientDetail('${c.id}')">${esc(c.nom)}</button></td>
        <td>${esc(c.secteur)}</td><td>${esc((c.contacts&&c.contacts[0]?.nom)||c.interlocuteur||'')} · ${esc((c.contacts&&c.contacts[0]?.fonction)||c.fonction||'')}</td>
        <td>${esc(c.ville)}</td>
        <td><span class="badge ${c.statut==='Actif'?'b-green':c.statut==='Prospect'?'b-amber':'b-gray'}">${c.statut}</span></td>
        <td><button class="btn sm" onclick="openMissionModal('','${c.id}')"><i class="ti ti-plus"></i> Mission</button></td>
      </tr>`).join('')}
      </tbody></table></div>`;
    }
  }

  // Actions / CR
  if(searchFilters.actions){
    const hits=S.actions.filter(a=>matchScore([a.cr,a.type,a.resultat,a.prochaine,getCandidatName(a.candidatId)],ql));
    total+=hits.length;
    if(hits.length){
      html+=`<div class="card"><div class="card-header"><i class="ti ti-phone" style="color:var(--blue-t)"></i> Actions & CR <span class="badge b-blue">${hits.length}</span></div>
      ${hits.map(a=>`<div class="cr-item" style="padding:10px 14px">
        <div class="cr-meta">
          <span class="badge b-blue">${a.type}</span>
          <strong><button class="link-btn" onclick="openCandidatDetail('${a.candidatId}')">${esc(getCandidatName(a.candidatId))}</button></strong>
          <span style="font-size:12px;color:var(--text2)">${fmtDate(a.date)}</span>
          <span class="badge ${a.resultat==='Positif'?'b-green':a.resultat==='Négatif'?'b-red':'b-gray'}">${a.resultat}</span>
          ${a.missionId?`<span class="badge b-gray">${getMission(a.missionId).poste}</span>`:''}
        </div>
        <div class="cr-text">${esc(a.cr)||'—'}</div></div>`).join('')}
      </div>`;
    }
  }

  if(!total) return`<div class="empty"><i class="ti ti-mood-empty" style="font-size:32px;display:block;margin-bottom:10px"></i>Aucun résultat pour "<strong>${esc(q)}</strong>"<br><small style="color:var(--text3);margin-top:6px;display:block">Essayez un autre terme ou vérifiez la mobilité des candidats</small></div>`;
  return`<div class="result-count">${total} résultat${total>1?'s':''} pour "<strong>${esc(q)}</strong>"</div>`+html;
}

function saveApiKeyFromInput(){
  const val=document.getElementById('api-key-input').value.trim();
  if(!val)return alert('Collez votre clé API.');
  setApiKey(val);
  renderImportCV();
}

function changeApiKey(){
  const current=getApiKey();
  const val=prompt('Nouvelle clé API Anthropic (laissez vide pour effacer) :', current);
  if(val===null)return;
  setApiKey(val);
  renderImportCV();
}

function handleCvFilesSelected(fileList){
  if(!getApiKey()){ alert('Configurez d\'abord votre clé API Anthropic ci-dessus.'); return; }
  const files=Array.from(fileList).filter(f=>/\.(pdf|png|jpe?g|webp)$/i.test(f.name));
  if(!files.length)return;
  files.forEach(file=>{
    const item={id:uid('Q'), file, status:'pending', extracted:null, error:null};
    cvImportQueue.push(item);
    processCvFile(item);
  });
  renderCvQueue();
}

function fileToBase64(file){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=()=>resolve(reader.result.split(',')[1]);
    reader.onerror=reject;
    reader.readAsDataURL(file);
  });
}

function guessMediaType(filename,fallback){
  const ext=filename.split('.').pop().toLowerCase();
  return {pdf:'application/pdf',png:'image/png',jpg:'image/jpeg',jpeg:'image/jpeg',webp:'image/webp'}[ext]||fallback||'application/octet-stream';
}

const EXTRACTION_SYSTEM_PROMPT = `Tu es un assistant d'extraction de données pour un ATS (logiciel de recrutement) utilisé par un chasseur de têtes français.

On te fournit le contenu d'un CV. Extrais les informations suivantes et réponds UNIQUEMENT avec un objet JSON valide, sans aucun texte avant ou après, sans balises markdown.

Format attendu exactement :
{
  "nom": "string (nom de famille)",
  "prenom": "string (prénom)",
  "poste": "string (intitulé du poste actuel ou le plus récent)",
  "societe": "string (entreprise actuelle ou la plus récente)",
  "email": "string ou vide",
  "tel": "string ou vide (format français si possible)",
  "ville": "string (ville de résidence, ou vide si non mentionnée)",
  "exp": "string (nombre total d'années d'expérience professionnelle, juste le nombre, ex: '8')",
  "spe": "string (2-4 mots résumant la spécialisation/domaine d'expertise, ex: 'Finance / Industrie')",
  "notes": "string (synthèse de 3-5 lignes : parcours, compétences clés, formations principales — rédigée en français, professionnelle, factuelle)"
}

Règles :
- Si une information est absente du CV, mets une chaîne vide "" (jamais null).
- N'invente JAMAIS d'information qui n'est pas dans le texte.
- "exp" doit être estimé à partir des dates d'expérience visibles dans le CV.`;

async function callExtractionAPI(contentBlock, sourceLabel){
  const res=await fetch('https://api.anthropic.com/v1/messages', {
    method:'POST',
    headers:{
      'Content-Type':'application/json',
      'x-api-key': getApiKey(),
      'anthropic-version':'2023-06-01',
      'anthropic-dangerous-direct-browser-access':'true'
    },
    body:JSON.stringify({
      model:'claude-sonnet-4-5',
      max_tokens:1024,
      system:EXTRACTION_SYSTEM_PROMPT,
      messages:[{
        role:'user',
        content:[ contentBlock, { type:'text', text:`Extrais les informations de ce profil/CV (source : ${sourceLabel}) au format JSON demandé.` } ]
      }]
    })
  });

  const json=await res.json();
  if(!res.ok){
    throw new Error(json.error?.message || `Erreur API (${res.status})`);
  }

  const textBlock=(json.content||[]).find(b=>b.type==='text');
  if(!textBlock) throw new Error('Réponse IA invalide (pas de texte)');

  let extracted;
  try{
    const cleaned=textBlock.text.replace(/```json\s*|\s*```/g,'').trim();
    extracted=JSON.parse(cleaned);
  }catch(e){
    throw new Error('Échec de l\'extraction : réponse IA non structurée');
  }

  return {
    nom:extracted.nom||'', prenom:extracted.prenom||'', poste:extracted.poste||'',
    societe:extracted.societe||'', email:extracted.email||'', tel:extracted.tel||'',
    ville:extracted.ville||'', exp:extracted.exp||'', spe:extracted.spe||'', notes:extracted.notes||''
  };
}

function creerFicheDepuisExtraction(extracted, cvMeta){
  const newCand={
    id:uid('CAN'), nom:extracted.nom, prenom:extracted.prenom,
    poste:extracted.poste, societe:extracted.societe, email:extracted.email, tel:extracted.tel,
    ville:extracted.ville, exp:extracted.exp, spe:extracted.spe, pretentions:'', dispo:'Immédiate', statut:'Actif',
    linkedin:extracted.linkedin||'',
    apec:'',
    notes:extracted.notes,
    cvFilename:cvMeta?.filename||'', cvMediaType:cvMeta?.mediaType||'', cvBase64:cvMeta?.base64||''
  };
  S.candidats.push(newCand);

  const toast=document.createElement('div');
  toast.style.cssText='position:fixed;bottom:24px;right:24px;z-index:9999;background:#166534;color:#fff;border-radius:10px;padding:14px 18px;font-size:13px;font-weight:500;box-shadow:0 4px 16px rgba(0,0,0,.2);display:flex;align-items:center;gap:12px;max-width:380px';
  toast.innerHTML=`<span>✓ <strong>${esc(newCand.prenom)} ${esc(newCand.nom)}</strong> ajouté au vivier automatiquement</span><div style="display:flex;gap:6px"><button onclick="openCandidatDetail('${newCand.id}');this.closest('div[style]').remove()" style="padding:4px 10px;border-radius:6px;border:1px solid rgba(255,255,255,.3);background:rgba(255,255,255,.15);color:#fff;cursor:pointer;font-size:12px">Voir / corriger</button></div>`;
  document.body.appendChild(toast);
  setTimeout(()=>toast.remove(),7000);

  return newCand;
}

async function handlePastedText(){
  if(!getApiKey()){ alert('Configurez d\'abord votre clé API Anthropic ci-dessus.'); return; }
  const textarea=document.getElementById('cv-paste-text');
  const text=textarea.value.trim();
  if(!text||text.length<30){ alert('Collez le texte complet du profil avant d\'analyser.'); return; }

  const btn=event.target.closest('button');
  const originalHtml=btn.innerHTML;
  btn.disabled=true;
  btn.innerHTML='<i class="ti ti-loader-2"></i> Analyse en cours…';

  try{
    const extracted=await callExtractionAPI({ type:'text', text }, 'texte collé (LinkedIn ou autre)');
    if(!extracted.nom){
      alert('L\'IA n\'a pas réussi à identifier un nom dans ce texte. Vérifiez que vous avez bien collé l\'intégralité du profil.');
      return;
    }
    creerFicheDepuisExtraction(extracted, null);
    textarea.value='';
  }catch(e){
    alert('Erreur lors de l\'analyse : '+e.message);
  }finally{
    btn.disabled=false;
    btn.innerHTML=originalHtml;
  }
}

// ── Réception des imports envoyés par l'extension Chrome ───────────────────
// Appelée automatiquement depuis background.js de l'extension, qui injecte
// ce texte directement dans l'onglet ATS ouvert quand vous cliquez sur
// "Importer dans mon ATS" depuis LinkedIn/APEC/Indeed.
window.importerDepuisExtension = async function(text, sourceUrl){
  if(!getApiKey()){
    alert('Import reçu depuis l\'extension, mais aucune clé API Anthropic n\'est configurée.\nAllez dans l\'onglet "Import CV (IA)" pour la renseigner, puis réessayez.');
    nav('importcv', null);
    return;
  }
  // On bascule sur l'onglet Import CV pour que l'utilisateur voie le résultat
  nav('importcv', null);

  const banner=document.createElement('div');
  banner.id='ext-import-banner';
  banner.style.cssText='background:var(--blue-bg,#dbeafe);border:1px solid #93c5fd;border-radius:var(--radius);padding:10px 14px;font-size:13px;color:#1e40af;margin-bottom:12px';
  banner.innerHTML='<i class="ti ti-plug-connected"></i> Profil reçu depuis l\'extension — analyse en cours…';
  document.getElementById('content')?.prepend(banner);

  try{
    const extracted=await callExtractionAPI({ type:'text', text }, sourceUrl||'extension navigateur');
    if(!extracted.nom){
      banner.style.background='#fee2e2';banner.style.color='#991b1b';banner.style.borderColor='#fecaca';
      banner.innerHTML='<i class="ti ti-alert-triangle"></i> Le profil reçu n\'a pas pu être analysé (nom non détecté). Réessayez depuis la page du profil.';
      return;
    }
    const newCand=creerFicheDepuisExtraction(extracted, null);
    if(sourceUrl){
      if(sourceUrl.includes('linkedin.com')){
        newCand.linkedin=newCand.linkedin||sourceUrl;
      } else if(sourceUrl.includes('apec.fr')){
        newCand.apec=newCand.apec||sourceUrl;
      } else {
        newCand.notes=(newCand.notes?newCand.notes+'\n\n':'')+'Source : '+sourceUrl;
      }
      saveData();
    }
    banner.remove();
  }catch(e){
    banner.style.background='#fee2e2';banner.style.color='#991b1b';banner.style.borderColor='#fecaca';
    banner.innerHTML='<i class="ti ti-alert-triangle"></i> Erreur lors de l\'analyse : '+esc(e.message);
  }
};

// ── Polling chrome.storage — remplace l'injection directe (bloquée sur file://) ──
// L'extension écrit le profil dans chrome.storage.local, l'ATS le lit
// toutes les secondes et déclenche l'extraction dès qu'il trouve quelque chose.
(function startStoragePolling() {
  if (typeof chrome === 'undefined' || !chrome.storage) return;
  let lastTimestamp = 0;

  setInterval(async () => {
    try {
      const result = await chrome.storage.local.get('ats_pending_import');
      const pending = result.ats_pending_import;
      if (!pending || pending.timestamp <= lastTimestamp) return;
      lastTimestamp = pending.timestamp;
      // Effacer immédiatement pour ne pas traiter deux fois
      await chrome.storage.local.remove('ats_pending_import');
      // Déclencher l'extraction
      if (typeof window.importerDepuisExtension === 'function') {
        window.importerDepuisExtension(pending.text, pending.sourceUrl);
      }
    } catch(e) {
      // Silencieux si chrome.storage n'est pas disponible
    }
  }, 1000);
})();

async function processCvFile(item){
  try{
    item.status='extracting'; renderCvQueue();

    const fileBase64=await fileToBase64(item.file);
    item.cvBase64=fileBase64;
    item.cvMediaType=item.file.type || guessMediaType(item.file.name);
    const mediaType=item.cvMediaType;
    const isPdf = mediaType==='application/pdf';
    const docBlock = isPdf
      ? { type:'document', source:{ type:'base64', media_type:mediaType, data:fileBase64 } }
      : { type:'image', source:{ type:'base64', media_type:mediaType, data:fileBase64 } };

    const extracted=await callExtractionAPI(docBlock, item.file.name);
    item.extracted=extracted;

    if(!extracted.nom){
      // Sans nom on ne peut pas créer une fiche exploitable : on bascule en validation manuelle exceptionnellement
      item.status='review';
      renderCvQueue();
      return;
    }

    // Création automatique et immédiate de la fiche candidat
    const newCand=creerFicheDepuisExtraction(extracted, { filename:item.file.name, mediaType:item.cvMediaType, base64:item.cvBase64 });
    item.status='saved';
    item.candidatId=newCand.id;
    renderCvQueue();
  }catch(e){
    item.status='error';
    item.error=e.message;
    renderCvQueue();
  }
}

function retryCvFile(id){
  const item=cvImportQueue.find(q=>q.id===id);
  if(!item)return;
  item.error=null;
  processCvFile(item);
}

function dismissCvItem(id){
  cvImportQueue=cvImportQueue.filter(q=>q.id!==id);
  renderCvQueue();
}

function clearCvQueue(){

function confirmCvImport(id){

  toast.innerHTML=`<span>✓ <strong>${esc(newCand.prenom)} ${esc(newCand.nom)}</strong> ajouté au vivier !</span><div style="display:flex;gap:6px"><button onclick="openCandidatDetail('${newCand.id}');this.closest('div[style]').remove()" style="padding:4px 10px;border-radius:6px;border:1px solid rgba(255,255,255,.3);background:rgba(255,255,255,.15);color:#fff;cursor:pointer;font-size:12px">Voir</button></div>`;
  document.body.appendChild(toast);

function telechargerCv(candidatId){
  const c=S.candidats.find(x=>x.id===candidatId);
  if(!c||!c.cvBase64)return alert('Aucun CV enregistré pour ce candidat.');
  try{
    const byteChars=atob(c.cvBase64);
    const byteNumbers=new Array(byteChars.length);
    for(let i=0;i<byteChars.length;i++) byteNumbers[i]=byteChars.charCodeAt(i);
    const byteArray=new Uint8Array(byteNumbers);
    const blob=new Blob([byteArray],{type:c.cvMediaType||'application/octet-stream'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;
    a.download=c.cvFilename||`CV_${c.nom}_${c.prenom}.pdf`;
    a.click();
    URL.revokeObjectURL(url);
  }catch(e){
    alert('Erreur lors de la préparation du fichier : '+e.message);
  }
}

function importBackup(input){
  const file=input.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const data=JSON.parse(e.target.result);
      if(!data.clients||!data.missions||!data.candidats){
        alert('Fichier invalide — ce n\'est pas une sauvegarde ATS.');
        return;
      }
      if(!confirm(`Restaurer la sauvegarde ?\n\nCela remplacera toutes vos données actuelles par :\n- ${data.clients.length} clients\n- ${data.missions.length} missions\n- ${data.candidats.length} candidats\n- ${data.actions?.length||0} actions\n\nCette action est irréversible.`))return;
      Object.assign(S,{
        clients:data.clients||[],
        missions:data.missions||[],
        candidats:data.candidats||[],
        pipeline:data.pipeline||[],
        actions:data.actions||[],
        rdvs:data.rdvs||[]
      });
      saveData();
      render();
      const toast=document.createElement('div');
      toast.style.cssText='position:fixed;bottom:24px;right:24px;z-index:9999;background:#166534;color:#fff;border-radius:10px;padding:12px 18px;font-size:13px;font-weight:500;box-shadow:0 4px 16px rgba(0,0,0,.2)';
      toast.innerHTML=`✓ Sauvegarde restaurée avec succès !`;
      document.body.appendChild(toast);
      setTimeout(()=>toast.remove(),4000);
    }catch(err){
      alert('Erreur lors de la lecture du fichier. Vérifiez que c\'est bien une sauvegarde ATS.');
    }
  };
  reader.readAsText(file);
  input.value='';
}

/* ── STATISTIQUES ── */
function renderStats(){
  document.getElementById('topbar').innerHTML=`<h2>Statistiques</h2>`;
  const msTotal=S.missions.length;
  const msGagnees=S.missions.filter(m=>m.statut==='Gagnée').length;
  const msPerdues=S.missions.filter(m=>m.statut==='Perdue'||m.statut==='Annulée').length;
  const tauxGlobal=msTotal?Math.round(msGagnees/msTotal*100):0;

  // Temps moyen de placement (missions gagnées)
  const tempsMoyen=(() => {
    const times=S.missions.filter(m=>m.statut==='Gagnée'&&m.dateOuv&&m.dateCible).map(m=>{
      const d=(new Date(m.dateCible)-new Date(m.dateOuv))/(1000*60*60*24);
      return d>0?d:null;
    }).filter(Boolean);
    return times.length?Math.round(times.reduce((a,b)=>a+b,0)/times.length):null;
  })();

  // Stats par secteur client
  const parSecteur={};
  S.missions.forEach(m=>{
    const cl=getClient(m.clientId);
    const s=cl.secteur||'Non défini';
    if(!parSecteur[s])parSecteur[s]={total:0,gagnees:0};
    parSecteur[s].total++;
    if(m.statut==='Gagnée')parSecteur[s].gagnees++;
  });

  // Meilleurs clients par volume
  const parClient={};
  S.missions.forEach(m=>{
    if(!parClient[m.clientId])parClient[m.clientId]={total:0,gagnees:0};
    parClient[m.clientId].total++;
    if(m.statut==='Gagnée')parClient[m.clientId].gagnees++;
  });
  const topClients=Object.entries(parClient).sort((a,b)=>b[1].total-a[1].total).slice(0,5);

  // Sources candidats
  const parSource={};
  S.candidats.forEach(c=>{
    const src=c.notes&&c.notes.includes('LinkedIn')?'LinkedIn':c.notes&&c.notes.includes('APEC')?'APEC':'Autre';
    parSource[src]=(parSource[src]||0)+1;
  });

  // Activité par mois (actions)
  const parMois={};
  S.actions.forEach(a=>{
    const m=a.date?a.date.slice(0,7):'';
    if(m)parMois[m]=(parMois[m]||0)+1;
  });
  const moisSorted=Object.keys(parMois).sort().slice(-6);

  const bar=(val,max,color='#1e40af')=>`<div style="background:#f5f5f4;border-radius:4px;height:8px;overflow:hidden"><div style="background:${color};height:8px;width:${max?Math.round(val/max*100):0}%;border-radius:4px"></div></div>`;
  const maxAct=Math.max(...moisSorted.map(m=>parMois[m]),1);
